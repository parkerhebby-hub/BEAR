}

function drawBushSprite(bd, ox, oy) {
  const useLarge = bd.hash % 3 === 0;
  const hasBerrySlot = useLarge && (bd.hash % 5 < 3);
  const bushTX = Math.floor(bd.worldX/CFG.TILE);
  const bushTY = Math.floor((bd.worldY - 1)/CFG.TILE);
  const bushKey = bushTX + ',' + bushTY;
  const eaten = eatenBushes[bushKey];
  const berriesGone = eaten && (now/1000 - eaten) < BERRY_REPLENISH;
  if (eaten && !berriesGone) delete eatenBushes[bushKey];

  let atlas;
  const useBerryType2 = hasBerrySlot && (bd.hash % 7 < 3);
  if (hasBerrySlot && !useBerryType2 && SHEETS.bushBerry.img) {
    atlas = berriesGone ? ATLAS.bushNoBerry : ATLAS.bushBerry;
  } else if (hasBerrySlot && useBerryType2 && SHEETS.berryBush2.img) {
    atlas = berriesGone ? ATLAS.berryBush2None : ATLAS.berryBush2;
  } else if (useLarge) {
    atlas = ATLAS.bushL[0];
  } else {
    atlas = ATLAS.bushS[bd.hash % ATLAS.bushS.length];
  }

  const is2x2 = atlas.w > 20 || atlas.h > 20;
  const behind = isBearBehind(bd.worldX, bd.worldY, atlas.h);
  const doDraw = () => {
    if (is2x2) {
      draw2x2Sprite(atlas, bd.worldX, bd.worldY, ox, oy);
    } else {
      const sx = ((bd.worldX - ox) | 0), sy = ((bd.worldY - oy) | 0);
      const img = SHEETS[atlas.sheet] && SHEETS[atlas.sheet].img;
      if (img) ctx.drawImage(img, atlas.x, atlas.y, atlas.w, atlas.h,
        (sx - (atlas.w >> 1)) | 0, (sy - atlas.h) | 0, atlas.w, atlas.h);
      else { ctx.fillStyle = '#2a6a1e'; ctx.beginPath(); ctx.arc(sx, sy-6, 8, 0, Math.PI*2); ctx.fill(); }
    }
  };
  if (behind) drawWithBearAura(ox, oy, bd.worldX, bd.worldY, atlas.h, atlas.w, doDraw);
  else doDraw();
}

function drawBirdSprite(w, ox, oy) {
  const sx = Math.floor(w.x - ox), sy = Math.floor(w.y - oy);
  const moving = Math.abs(w.vx) > 2 || Math.abs(w.vy) > 2;
  let atlas;
  if (!moving || w.perched) {
    if (!w.peckTimer) w.peckTimer = 2 + Math.random() * 4;
    w.peckTimer -= 1/60;
    const pecking = w.peckTimer < 0.15 && w.peckTimer > 0;
    if (w.peckTimer <= 0) w.peckTimer = 2 + Math.random() * 5;
    atlas = pecking ? ATLAS.birdPerch[1] : ATLAS.birdPerch[0];
  } else if (Math.abs(w.vy) > Math.abs(w.vx)) {
    atlas = w.vy > 0
      ? ATLAS.birdFlyD[w.frame % ATLAS.birdFlyD.length]
      : ATLAS.birdFlyU[w.frame % ATLAS.birdFlyU.length];
  } else {
    atlas = ATLAS.birdFly[w.frame % ATLAS.birdFly.length];
  }
  if (!atlas) return;
  const s = SHEETS[atlas.sheet];
  if (!s || !s.img) return;
  // Half size — integer division for clean pixels
  const dw = (atlas.w >> 1) || 1, dh = (atlas.h >> 1) || 1;
  if (Math.abs(w.vx) > 3) w.lastVx = w.vx;
  const facingRight = moving ? w.vx > 0 : (w.lastVx || -1) > 0;
  ctx.save();
  if (facingRight) {
    ctx.translate(sx, sy); ctx.scale(-1, 1);
    ctx.drawImage(s.img, atlas.x, atlas.y, atlas.w, atlas.h,
      (-(dw >> 1)) | 0, (-(dh >> 1)) | 0, dw, dh);
  } else {
    ctx.drawImage(s.img, atlas.x, atlas.y, atlas.w, atlas.h,
      (sx - (dw >> 1)) | 0, (sy - (dh >> 1)) | 0, dw, dh);
  }
  ctx.restore();
}

function drawButterflySprite(w, ox, oy) {
  const sx = Math.floor(w.x - ox), sy = Math.floor(w.y - oy);
  const bob = Math.sin(now / 250 + w.x * 0.1) * 2;
  const frames = w.bflyType === 2 ? ATLAS.bfly2 : ATLAS.bfly1;
  const atlas = frames[w.frame % frames.length];
  if (!atlas) return;
  const s = SHEETS[atlas.sheet];
  if (!s || !s.img) return;
  // Half scale — fixed anchor from first frame so all frames stay centered
  const refW = frames[0].w, refH = frames[0].h;
  const anchorX = refW >> 2, anchorY = refH >> 2; // quarter = half of half-size
  const dw = (atlas.w >> 1) || 1, dh = (atlas.h >> 1) || 1;
  // Offset each frame so its center aligns with the reference center
  const offX = ((refW - atlas.w) >> 1);
  ctx.drawImage(s.img, atlas.x, atlas.y, atlas.w, atlas.h,
    (sx - anchorX + (offX >> 1)) | 0, ((sy + bob) - anchorY) | 0, dw, dh);
}

function drawBatSprite(w, ox, oy) {
  const sx = Math.floor(w.x - ox), sy = Math.floor(w.y - oy);
  const bob = Math.sin(now / 200 + w.x * 0.15) * 2;
  const atlas = ATLAS.bat[w.frame % ATLAS.bat.length];
  if (!atlas) return;
  const s = SHEETS[atlas.sheet];
  if (!s || !s.img) return;
  // ~12% of original size (64x64 source → 8x8 rendered)
  const dw = (atlas.w >> 3) || 1, dh = (atlas.h >> 3) || 1;
  // Flip based on horizontal direction
  if (Math.abs(w.vx) > 2) w.lastVx = w.vx;
  const facingRight = w.lastVx ? w.lastVx > 0 : w.vx > 0;
  ctx.save();
  if (facingRight) {
    ctx.translate(sx, sy + bob);
    ctx.scale(-1, 1);
    ctx.drawImage(s.img, atlas.x, atlas.y, atlas.w, atlas.h,
      (-(dw >> 1)) | 0, (-(dh >> 1)) | 0, dw, dh);
  } else {
    ctx.drawImage(s.img, atlas.x, atlas.y, atlas.w, atlas.h,
      (sx - (dw >> 1)) | 0, ((sy + bob) - (dh >> 1)) | 0, dw, dh);
  }
  ctx.restore();
}

function drawSquirrelSprite(w, ox, oy) {
  const sx = Math.floor(w.x - ox), sy = Math.floor(w.y - oy);
  const moving = Math.abs(w.vx) > 3 || Math.abs(w.vy) > 3;
  let atlas;
  if (moving) {
    atlas = ATLAS.sqRun[w.frame % ATLAS.sqRun.length];
  } else {
    atlas = ATLAS.sqIdle[0];
  }
  if (!atlas) { ctx.fillStyle='#a06830'; ctx.fillRect(sx-2,sy-3,4,3); return; }
  const s = SHEETS[atlas.sheet];
  if (!s || !s.img) return;
  // Half size — integer division for clean pixels
  const dw = (atlas.w >> 1) || 1, dh = (atlas.h >> 1) || 1;
  if (Math.abs(w.vx) > 5) w.lastVx = w.vx;
  const facingLeft = (w.lastVx || 1) < 0;
  ctx.save();
  if (facingLeft) {
    ctx.translate(sx, sy); ctx.scale(-1, 1);
    ctx.drawImage(s.img, atlas.x, atlas.y, atlas.w, atlas.h,
      (-(dw >> 1)) | 0, (-dh) | 0, dw, dh);
  } else {
    ctx.drawImage(s.img, atlas.x, atlas.y, atlas.w, atlas.h,
      (sx - (dw >> 1)) | 0, (sy - dh) | 0, dw, dh);
  }
  ctx.restore();
}

function drawDogSprite(w, ox, oy) {
  const sx = Math.floor(w.x - ox), sy = Math.floor(w.y - oy);
  let dirRow = 0;
  if (Math.abs(w.vx) > Math.abs(w.vy)) dirRow = w.vx > 0 ? 2 : 1;
  else dirRow = w.vy > 0 ? 0 : 3;
  if (SHEETS.dog && SHEETS.dog.img && ATLAS.dog[dirRow]) {
    const frames = ATLAS.dog[dirRow];
    const moving = Math.abs(w.vx) > 1 || Math.abs(w.vy) > 1;
    drawSprite(ctx, frames[moving ? w.frame % frames.length : 0], sx, sy, 0.5, 1.0);
  } else { ctx.fillStyle = '#a08040'; ctx.fillRect(sx-4, sy-8, 8, 8); }
}

function drawCabinSprite(cd, ox, oy) {
  const sx = Math.floor(cd.worldX - ox), sy = Math.floor(cd.worldY - oy);
  // Select sprite by cabin type (set during chunk generation)
  let atlas;
  if (cd.cabinType === 'stone') atlas = ATLAS.cabinStone;
  else if (cd.cabinType === 'log') atlas = ATLAS.cabinLog;
  else if (cd.cabinType === 'abandoned') atlas = ATLAS.cabinAbandoned;
  else if (cd.cabinType === 'trailer') atlas = cd.hash % 2 === 0 ? ATLAS.trailer1 : ATLAS.trailer2;
  else atlas = ATLAS.cabinLog; // fallback

  if (!SHEETS[atlas.sheet] || !SHEETS[atlas.sheet].img) {
    ctx.fillStyle = '#6a4a2e'; ctx.fillRect(sx - 30, sy - 60, 60, 60); return;
  }
  const behind = isBearBehind(cd.worldX, cd.worldY, atlas.h);
  const doDraw = () => { drawSprite(ctx, atlas, sx, sy, 0.5, 1.0); };
  if (behind) drawWithBearAura(ox, oy, cd.worldX, cd.worldY, atlas.h, atlas.w, doDraw);
  else doDraw();
}

// ============================================================
// WILDLIFE UPDATE
// ============================================================
function updateWildlife(dt) {
  if (!bear) return;
  // Don't spawn birds/squirrels/butterflies at night (fish and dogs are ok)
  const isNight = dayNightDarkness > 0.4;
  if (wildlife.length < 12 && Math.random() < 0.4 * dt && !isNight) spawnWildlife();
  // Spawn bats at night
  // Count bats inline instead of creating filtered array
  if (isNight && Math.random() < 0.5 * dt) {
    let batCount = 0;
    for (let i = 0; i < wildlife.length; i++) if (wildlife[i].kind === 'bat') batCount++;
    if (batCount < 6) spawnBat();
  }

  for (let i = wildlife.length - 1; i >= 0; i--) {
    const w = wildlife[i];
    w.lifetime -= dt;
    if (w.lifetime <= 0) { wildlife.splice(i, 1); continue; }
    // Despawn birds, squirrels, butterflies at night (they go to sleep)
    if (isNight && (w.kind === 'bird' || w.kind === 'squirrel' || w.kind === 'butterfly')) {
      w.lifetime -= dt * 3; // fade out faster at night
      if (w.lifetime <= 0) { wildlife.splice(i, 1); continue; }
    }
    w.animTimer += dt;
    if (w.animTimer > w.frameSpeed) { w.animTimer = 0; w.frame = (w.frame + 1) % w.frameCount; }
    switch (w.kind) {
      case 'bird':
        if (!w.perchTimer) w.perchTimer = 0;
        if (w.perched) {
          // Sitting still, perched
          w.vx = 0; w.vy = 0;
          w.perchTimer -= dt;
          if (w.perchTimer <= 0) {
            w.perched = false;
            const a = Math.random() * Math.PI * 2;
            const sp = 25 + Math.random() * 30;
            w.vx = Math.cos(a) * sp; w.vy = Math.sin(a) * sp;
          }
        } else {
          w.x += w.vx * dt;
          w.y += w.vy * dt + Math.sin(w.lifetime * 2) * 0.3;
          // Chance to perch after flying for a while
          w.perchTimer += dt;
          if (w.perchTimer > 2 + Math.random() * 3 && Math.random() < 0.3 * dt) {
            // Don't perch on water
            const bt = getTileAt(w.x, w.y);
            if (bt !== T.WATER_S && bt !== T.WATER_D) {
              w.perched = true;
              w.perchTimer = 3 + Math.random() * 5;
            }
          }
        }
        break;
      case 'butterfly':
        w.turnTimer -= dt;
        if (w.turnTimer <= 0) {
          w.turnTimer = 0.5 + Math.random() * 1.5;
          w.vx = (Math.random()-0.5) * 20;
          w.vy = (Math.random()-0.5) * 20;
        }
        w.x += w.vx * dt;
        w.y += w.vy * dt + Math.sin(now/300 + w.x) * 0.3;
        break;
      case 'bat':
        // Erratic swooping flight
        w.turnTimer -= dt;
        if (w.turnTimer <= 0) {
          w.turnTimer = 0.3 + Math.random() * 0.8;
          w.vx += (Math.random() - 0.5) * 40;
          w.vy += (Math.random() - 0.5) * 30;
          // Clamp speed
          const bspd = Math.sqrt(w.vx*w.vx + w.vy*w.vy);
          if (bspd > 60) { w.vx = (w.vx/bspd)*60; w.vy = (w.vy/bspd)*60; }
          if (bspd < 15) { const ba = Math.random()*Math.PI*2; w.vx = Math.cos(ba)*25; w.vy = Math.sin(ba)*25; }
        }
        w.x += w.vx * dt;
        w.y += w.vy * dt + Math.sin(now/200 + w.x) * 0.5;
        // Bats despawn faster during daytime
        if (dayNightDarkness < 0.3) {
          w.lifetime -= dt * 4;
        }
        break;
      case 'squirrel':
        if (!w.turnTimer) w.turnTimer = 0;
        w.turnTimer -= dt;
        if (w.turnTimer <= 0) {
          w.turnTimer = 1.5 + Math.random() * 3;
          if (Math.random() < 0.4) {
            // Stop and idle
            w.vx = 0; w.vy = 0;
            w.idlePose = Math.random() < 0.5 ? 'sit' : 'stand';
          } else {
            // Run predominantly left-to-right with slight vertical drift
            const sp = 15 + Math.random() * 20;
            const dir = Math.random() < 0.5 ? 1 : -1; // random left or right
            w.vx = dir * sp;
            w.vy = (Math.random() - 0.5) * sp * 0.3; // small vertical component
            w.idlePose = null;
          }
        }
        w.x += w.vx * dt; w.y += w.vy * dt;
        // Squirrels can't walk on water — bounce back
        { const st = getTileAt(w.x, w.y);
          if (st === T.WATER_S || st === T.WATER_D) {
            w.x -= w.vx * dt; w.y -= w.vy * dt;
            w.vx = -w.vx; w.vy = -w.vy; w.turnTimer = 0;
          }
        }
        break;
      case 'dog':
        const dxH = w.homeX-w.x, dyH = w.homeY-w.y;
        const distH = Math.sqrt(dxH*dxH+dyH*dyH);
        if (distH > 60) { w.vx=(dxH/distH)*20; w.vy=(dyH/distH)*20; }
        else if (Math.random() < 0.5*dt) { const a=Math.random()*Math.PI*2; w.vx=Math.cos(a)*20; w.vy=Math.sin(a)*20; }
        w.x += w.vx*dt; w.y += w.vy*dt;
        break;
    }
    // Clamp to map bounds
    w.x = Math.max(8, Math.min(CFG.MAP_PX-8, w.x));
    w.y = Math.max(8, Math.min(CFG.MAP_PX-8, w.y));
    // Only despawn if fully outside the viewport with generous margin
    const scrX = w.x - camX, scrY = w.y - camY;
    const margin = 80; // pixels beyond screen edge before despawn
    const offScreen = scrX < -margin || scrX > W + margin || scrY < -margin || scrY > H + margin;
    // Must be off screen AND far from bear to despawn
    if (offScreen && (Math.abs(w.x-bear.x) > W + 200 || Math.abs(w.y-bear.y) > H + 200)) {
      wildlife.splice(i, 1);
    }
  }
}

function spawnWildlife() {
  if (!bear) return;
  const roll = Math.random();
  if (roll < 0.45) {
    // Bird — fly across screen
    const side = Math.floor(Math.random()*4);
    let x, y, vx, vy;
    const spd = 30+Math.random()*25;
    if (side===0)      { x=bear.x+(Math.random()-0.5)*W; y=bear.y-H/2-20; vx=(Math.random()-0.5)*10; vy=spd; }
    else if (side===1) { x=bear.x+W/2+20; y=bear.y+(Math.random()-0.5)*H; vx=-spd; vy=(Math.random()-0.5)*10; }
    else if (side===2) { x=bear.x+(Math.random()-0.5)*W; y=bear.y+H/2+20; vx=(Math.random()-0.5)*10; vy=-spd; }
    else               { x=bear.x-W/2-20; y=bear.y+(Math.random()-0.5)*H; vx=spd; vy=(Math.random()-0.5)*10; }
    wildlife.push({ kind:'bird', x, y, vx, vy,
      frame:0, frameCount:4, frameSpeed:0.12, animTimer:0, lifetime:8+Math.random()*7 });
  } else if (roll < 0.6) {
    // Butterfly — wander near bear
    const a = Math.random() * Math.PI * 2, d = 30 + Math.random() * 80;
    const btype = Math.random() < 0.5 ? 1 : 2;
    wildlife.push({ kind:'butterfly', x:bear.x+Math.cos(a)*d, y:bear.y+Math.sin(a)*d,
      vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, turnTimer:1,
      bflyType: btype,
      frame:0, frameCount: btype===1 ? 4 : 3, frameSpeed:0.1, animTimer:0,
      lifetime:12+Math.random()*15 });
  } else if (roll < 0.8) {
    // Squirrel — spawn near a tree
    for (const key in chunks) {
      const [kcx,kcy] = key.split(',').map(Number);
      const S = CFG.CHUNK, chunk = chunks[key];
      const allTrees = chunk.largeTreePositions ? chunk.treePositions.concat(chunk.largeTreePositions) : chunk.treePositions;
      if (!allTrees.length) continue;
      const tp = allTrees[Math.floor(Math.random()*allTrees.length)];
      const wx = (kcx*S+tp.x)*CFG.TILE+8, wy = (kcy*S+tp.y)*CFG.TILE+CFG.TILE;
      const dx = wx-bear.x, dy = wy-bear.y;
      if (dx*dx+dy*dy < 300*300 && dx*dx+dy*dy > 60*60) {
        if (!wildlife.some(w => w.kind==='squirrel' && Math.abs(w.x-wx)<30 && Math.abs(w.y-wy)<30)) {
          wildlife.push({ kind:'squirrel', x:wx, y:wy, vx:0, vy:0, turnTimer:0.5, idlePose:'sit',
            frame:0, frameCount:4, frameSpeed:0.2, animTimer:0, lifetime:15+Math.random()*20 });
          return;
        }
      }
    }
  }
  // Dog spawning disabled — sprite file removed from disk
}

function spawnBat() {
  if (!bear) return;
  // Bats fly in from screen edges, erratic swooping flight
  const side = Math.floor(Math.random() * 4);
  let x, y, vx, vy;
  const spd = 25 + Math.random() * 30;
  if (side === 0)      { x = bear.x + (Math.random()-0.5)*W; y = bear.y - H/2 - 30; vx = (Math.random()-0.5)*20; vy = spd; }
  else if (side === 1) { x = bear.x + W/2 + 30; y = bear.y + (Math.random()-0.5)*H; vx = -spd; vy = (Math.random()-0.5)*20; }
  else if (side === 2) { x = bear.x + (Math.random()-0.5)*W; y = bear.y + H/2 + 30; vx = (Math.random()-0.5)*20; vy = -spd; }
  else                 { x = bear.x - W/2 - 30; y = bear.y + (Math.random()-0.5)*H; vx = spd; vy = (Math.random()-0.5)*20; }
  wildlife.push({ kind:'bat', x, y, vx, vy, lastVx: vx, turnTimer: 0.5,
    frame:0, frameCount:4, frameSpeed:0.1, animTimer:0, lifetime:10+Math.random()*12 });
}

// ── Sound Perception Rendering ──────────────────────────────
function renderSoundRings(ox, oy) {
  const focusMult = focusListening ? CFG.SOUND_FOCUS_ALPHA_MULT : 1;
  for (const w of soundWaves) {
    const sx = (w.x - ox) | 0, sy = (w.y - oy) | 0;
    const r = w.radius | 0;
    if (sx + r < -20 || sx - r > W + 20 || sy + r < -20 || sy - r > H + 20) continue;
    const a = Math.min(1, w.alpha * 0.35 * focusMult);
    if (a < 0.01) continue;
    ctx.strokeStyle = `rgba(${w.color[0]},${w.color[1]},${w.color[2]},${a})`;
    ctx.lineWidth = CFG.SOUND_RING_WIDTH;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function renderSoundIndicators() {
  // Disabled — direction indicators above bear removed
}

function renderFocusVignette(dt) {
  focusVignette += ((focusListening ? 1 : 0) - focusVignette) * Math.min(1, 5 * dt);
  if (focusVignette > 0.01) {
    const grad = ctx.createRadialGradient(W/2, H/2, W * 0.25, W/2, H/2, W * 0.6);
    grad.addColorStop(0, 'rgba(40,60,80,0)');
    grad.addColorStop(1, `rgba(40,60,80,${(0.35 * focusVignette).toFixed(3)})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
}

function renderHUD() {
  if (!bear) return;
  const b = bear;
  // Scale HUD to always render at base resolution (640x360) regardless of zoom
  const hudScale = W / 640;
  ctx.save();
  ctx.scale(hudScale, hudScale);
  // Use base dimensions for all HUD layout
  const HW = 640, HH = 360;
  const bx = 16, by = 8, bw = 56, bh = 6, gap = 3;

  // Health
  drawBar(bx, by, bw, bh, b.hp / CFG.MAX_HP, '#c03030', '#400808', 'heart');
  // Stamina
  drawBar(bx, by + bh + gap, bw, bh, b.stam / CFG.MAX_STAM, '#30a030', '#083008', 'bolt');
  // Hunger
  drawBar(bx, by + (bh + gap) * 2, bw, bh, b.hunger / CFG.MAX_HUNGER, '#c08030', '#402808', 'fish');

  // Active buffs
  let buffX = bx;
  const buffY = by + (bh + gap) * 3 + 2;
  for (const buff of b.buffs) {
    let col = '#aaa';
    let label = '';
    switch (buff.type) {
      case 'speed':      col = '#40ff40'; label = 'SPD'; break;
      case 'slow':       col = '#ff4040'; label = 'SLW'; break;
      case 'stam_regen': col = '#40a0ff'; label = 'SRG'; break;
      case 'stam_drain': col = '#a04040'; label = 'SDR'; break;
      case 'nausea':     col = '#a0a040'; label = 'NSA'; break;
    }
    ctx.fillStyle = col;
    ctx.font = '5px monospace';
    ctx.fillText(label, buffX, buffY + 4);
    buffX += 22;
  }

  // Time-of-day indicator — above minimap
  {
    const tdX = HW - 76, tdY = 10, tdR = 6; // left of minimap
    // Background pill
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.arc(tdX, tdY + tdR, tdR + 2, 0, Math.PI * 2); ctx.fill();
    // Progress arc
    const cycleProgress = dayTime / DAY_CYCLE_TOTAL;
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(tdX, tdY + tdR, tdR, 0, Math.PI * 2); ctx.stroke();
    const isNight = dayNightDarkness > 0.5;
    ctx.strokeStyle = isNight ? '#6688cc' : '#ffcc44';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(tdX, tdY + tdR, tdR, -Math.PI / 2, -Math.PI / 2 + cycleProgress * Math.PI * 2); ctx.stroke();
    // Sun or moon icon
    if (isNight) {
      ctx.fillStyle = '#aaccff';
      ctx.beginPath(); ctx.arc(tdX, tdY + tdR, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(10,10,40,0.8)';
      ctx.beginPath(); ctx.arc(tdX + 1.5, tdY + tdR - 1, 3, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = '#ffcc44';
      ctx.beginPath(); ctx.arc(tdX, tdY + tdR, 2.5, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Minimap — top-right corner (clickable)
  const mmS = 56, mmX = HW - mmS - 6, mmY = 6;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(mmX, mmY, mmS, mmS);
  ctx.strokeStyle = 'rgba(200,160,96,0.4)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(mmX, mmY, mmS, mmS);
  // Zone ring circles (4 inner rings — outermost removed)
  const mmCx = mmX + mmS/2, mmCy = mmY + mmS/2;
  for (let ring = 2; ring <= 5; ring++) {
    const rr = (mmS/2) * (1 - (ring-1)/5);
    const cols = ['#2a4a2a','#4a6a2a','#6a8a2a','#8a6a2a','#8a4040'];
    ctx.strokeStyle = cols[ring-1];
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.arc(mmCx, mmCy, rr, 0, Math.PI*2);
    ctx.stroke();
  }
  // Bear position dot
  const bearMmX = mmX + (b.x / CFG.MAP_PX) * mmS;
  const bearMmY = mmY + (b.y / CFG.MAP_PX) * mmS;
  ctx.fillStyle = '#ffcc40';
  ctx.fillRect(bearMmX - 1.5, bearMmY - 1.5, 3, 3);
  // Zone label
  const bZone = getZoneInfo(Math.floor(b.x / (CFG.TILE*CFG.CHUNK)), Math.floor(b.y / (CFG.TILE*CFG.CHUNK)));
  const zoneNames = ['','Wilderness','Backcountry','Campgrounds','Outpost','Resort'];
  ctx.fillStyle = '#ccc';
  ctx.font = '5px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(zoneNames[bZone.zone] || '', mmX + mmS/2, mmY + mmS + 7);
  ctx.textAlign = 'left';

  // ── Bear Paw HUD (6 pre-positioned 64x64 overlay sprites) ──
  if (PAW_DARK.pawPad) {
    const pawScale = 2.25; // 64 * 2.25 = 144px rendered (50% larger than 1.5)
    // Position so pad bottom (y=58 in source) sits 6px above screen bottom
    const pawAnchorX = HW - 144;  // right-aligned with margin
    const pawAnchorY = HH - 6 - 58 * pawScale;  // pad bottom at HH-6

    const sprintActive = sprintHeld || b.state === 'sprint';
    const actives = {
      paw1:   false,                              // toe 1: interact
      paw2:   b.attackCD > 0 && !input._heavy,    // toe 2: light attack
      paw3:   b.attackCD > 0 && input._heavy,     // toe 3: heavy attack
      paw4:   b.climbing,                         // toe 4: climb
      paw5:   sneakHeld,                          // toe 5: sneak
      pawPad: sprintActive,                       // pad: sprint
    };

    const depressY = 4; // pixels to shift down when active

    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.imageSmoothingEnabled = false;

    // Draw pad first (behind toes), then toes on top
    const drawOrder = ['pawPad','paw1','paw2','paw3','paw4','paw5'];
    const dw = (64 * pawScale) | 0;
    const dh = (64 * pawScale) | 0;
    for (const key of drawOrder) {
      const active = actives[key];
      const img = active ? PAW_DARK[key] : SHEETS[key].img;
      if (!img) continue;
      const dx = pawAnchorX | 0;
      const dy = ((pawAnchorY) + (active ? depressY : 0)) | 0;
      ctx.drawImage(img, 0, 0, 64, 64, dx, dy, dw, dh);
    }

    ctx.imageSmoothingEnabled = true;
    ctx.restore();

    // Compute hitbox positions from PAW_HIT centers (in 64px source space → screen)
    const toeR = 10, padR = 22;
    for (const key of PAW_KEYS) {
      const h = PAW_HIT[key];
      const sx = pawAnchorX + h.cx * pawScale;
      const sy = pawAnchorY + h.cy * pawScale;
      const btnName = key === 'paw1' ? 'interact' : key === 'paw2' ? 'light' :
                      key === 'paw3' ? 'heavy' : key === 'paw4' ? 'climb' :
                      key === 'paw5' ? 'sneak' : 'sprint';
      const r = key === 'pawPad' ? padR : toeR;
      HUD_BUTTONS[btnName] = { x: sx * hudScale, y: sy * hudScale, r: r * hudScale };
    }
  }

  // Cabin door prompt (caves are automatic — no prompt needed)
  const nearDoor = isNearCabinDoor();
  if (nearDoor) {
    const label = interiorState ? '[E] EXIT' : '[E] ENTER';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(HW/2 - 30, HH - 28, 60, 14);
    ctx.fillStyle = '#f0d080';
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, HW/2, HH - 18);
    ctx.textAlign = 'left';
  }

  // Sound perception directional indicators
  renderSoundIndicators();

  ctx.restore(); // restore pre-HUD scale transform
}

function drawBar(x, y, w, h, pct, fg, bg, icon) {
  pct = Math.max(0, Math.min(1, pct));
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = fg;
  ctx.fillRect(x, y, Math.floor(w * pct), h);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(x, y, w, h);
  // Draw pixel-art icon to the left of the bar
  const ix = x - 9, iy = y - 1;
  drawHUDIcon(icon, ix, iy);
}

function drawHUDIcon(type, x, y) {
  const sz = 7; // icon draw size in HUD coords (matches bar height ~6px)
  if (type === 'heart') {
    const img = SHEETS.hudHealth && SHEETS.hudHealth.img;
    if (img) { ctx.drawImage(img, 0, 0, img.width, img.height, x - 1, y - 1, sz + 1, sz + 1); return; }
  } else if (type === 'fish') {
    const img = SHEETS.hudHunger && SHEETS.hudHunger.img;
    if (img) { ctx.drawImage(img, 0, 0, img.width, img.height, x - 1, y - 1, sz + 1, sz + 1); return; }
  }
  // Fallback: procedural lightning bolt for stamina
  if (type === 'bolt') {
    const p = (px, py, c) => { ctx.fillStyle = c; ctx.fillRect(x + px, y + py, 1, 1); };
    const c = '#ffdd44', d = '#ccaa22', h = '#ffff88';
    p(3,0,c); p(4,0,c);
    p(2,1,h); p(3,1,c);
    p(1,2,c); p(2,2,c); p(3,2,c); p(4,2,c);
    p(2,3,c); p(3,3,d);
    p(1,4,d); p(2,4,d);
    p(0,5,d);
  }
}

function isNearCabinDoor() {
  if (!bear || bear.climbing || transition || transitionCooldown > 0) return false;
  const TS = CFG.TILE, CS = CFG.CHUNK, fo = CFG.BEAR_FOOT_OFS;
  const footTX = Math.floor(bear.x / TS);
  const footTY = Math.floor((bear.y + fo) / TS);

  if (interiorState) {
    if (interiorState.map.isCave) return false; // caves use auto exit, no prompt
    const et = interiorState.map.exitTrigger;
    return footTX >= et.tx - 1 && footTX < et.tx + et.tw + 1 && footTY >= et.ty - 1 && footTY < et.ty + et.th;
  }

  const ccx = Math.floor(bear.x / (TS * CS));
  const ccy = Math.floor((bear.y + fo) / (TS * CS));
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const key = chunkKey(ccx + dx, ccy + dy);
      const chunk = chunks[key];
      if (!chunk || !chunk.cabinPositions) continue;
      for (const cp of chunk.cabinPositions) {
        const doorWTX = (ccx + dx) * CS + cp.doorTile.x;
        const doorWTY = (ccy + dy) * CS + cp.doorTile.y;
        if (Math.abs(footTX - doorWTX) <= 1 && Math.abs(footTY - doorWTY) <= 1) return true;
      }
    }
  }
  return false;
}

// ── Pause Menu Slider Geometry ──────────────────────────────
// All in base 640x360 coordinates (HUD scale)
const PAUSE_SLIDER_X = 220;    // left edge of slider track
const PAUSE_SLIDER_W = 200;    // track width
const PAUSE_SLIDER_H = 8;     // track height
const PAUSE_SLIDER_KNOB = 12; // knob diameter
const PAUSE_SLIDERS = [
  { key: 'music',   label: 'Music',   y: 0 },
  { key: 'sfx',     label: 'SFX',     y: 0 },
  { key: 'ambient', label: 'Ambient', y: 0 },
];

function getVolForKey(k) {
  if (k === 'music') return volMusic;
  if (k === 'sfx') return volSFX;
  return volAmbient;
}

function setVolForKey(k, v) {
  v = Math.max(0, Math.min(1, v));
  if (k === 'music')  { volMusic = v;   if (busMusicGain) busMusicGain.gain.value = v;   localStorage.setItem('vol_music', v.toFixed(2)); }
  if (k === 'sfx')    { volSFX = v;     if (busSFXGain) busSFXGain.gain.value = v;       localStorage.setItem('vol_sfx', v.toFixed(2)); }
  if (k === 'ambient'){ volAmbient = v;  if (busAmbientGain) busAmbientGain.gain.value = v; localStorage.setItem('vol_ambient', v.toFixed(2)); }
}

function renderPause() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;

  // Title
  ctx.fillStyle = '#c8a060';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', cx, H * 0.24);

  // Sliders — centered, proportional to canvas
  const sliderW = W * 0.32;
  const sliderH = H * 0.022;
  const knobSz  = H * 0.035;
  const sliderX = cx - sliderW / 2;
  const baseY   = H * 0.36;
  const spacing  = H * 0.105;
  ctx.font = '10px monospace';

  for (let i = 0; i < PAUSE_SLIDERS.length; i++) {
    const s = PAUSE_SLIDERS[i];
    const y = baseY + i * spacing;
    s.y = y; // store for hit detection
    s._sliderX = sliderX;
    s._sliderW = sliderW;
    s._knobSz = knobSz;

    // Label
    ctx.fillStyle = '#c8a060';
    ctx.textAlign = 'right';
    ctx.fillText(s.label, sliderX - 10, y + 4);

    // Track background
    ctx.fillStyle = '#3a3020';
    ctx.fillRect(sliderX, y - sliderH / 2, sliderW, sliderH);

    // Filled portion
    const vol = getVolForKey(s.key);
    ctx.fillStyle = '#8a6a30';
    ctx.fillRect(sliderX, y - sliderH / 2, sliderW * vol, sliderH);

    // Track border
    ctx.strokeStyle = '#c8a060';
    ctx.lineWidth = 1;
    ctx.strokeRect(sliderX, y - sliderH / 2, sliderW, sliderH);

    // Knob
    const knobX = sliderX + sliderW * vol;
    ctx.fillStyle = '#e8c878';
    ctx.fillRect(knobX - knobSz / 2, y - knobSz / 2, knobSz, knobSz);
    ctx.strokeStyle = '#c8a060';
    ctx.strokeRect(knobX - knobSz / 2, y - knobSz / 2, knobSz, knobSz);

    // Percentage label
    ctx.fillStyle = '#8a7a5a';
    ctx.textAlign = 'left';
    ctx.fillText(Math.round(vol * 100) + '%', sliderX + sliderW + 10, y + 4);
  }

  // God Mode toggle
  const godY = baseY + PAUSE_SLIDERS.length * spacing + 10;
  const godLabel = 'God Mode';
  const godState = CFG.GOD_MODE ? 'ON' : 'OFF';
  const boxSz = sliderH + 4;
  const godBoxX = cx - 30;
  const godBoxY = godY - boxSz / 2;

  ctx.fillStyle = '#c8a060';
  ctx.font = '10px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(godLabel, godBoxX - 10, godY + 4);

  // Checkbox
  ctx.fillStyle = CFG.GOD_MODE ? '#8a6a30' : '#3a3020';
  ctx.fillRect(godBoxX, godBoxY, boxSz, boxSz);
  ctx.strokeStyle = '#c8a060';
  ctx.lineWidth = 1;
  ctx.strokeRect(godBoxX, godBoxY, boxSz, boxSz);
  if (CFG.GOD_MODE) {
    ctx.fillStyle = '#e8c878';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('✓', godBoxX + boxSz / 2, godY + 4);
  }
  ctx.fillStyle = '#8a7a5a';
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(godState, godBoxX + boxSz + 8, godY + 4);

  // Store hit zone for click detection
  pauseGodModeBtn = { x: godBoxX, y: godBoxY, w: boxSz, h: boxSz };

  // Resume hint
  ctx.fillStyle = '#8a7a5a';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Press ESC to resume', cx, godY + 28);
  ctx.textAlign = 'left';
}

// Hit-test a mouse position (in canvas pixels) against pause sliders
function pauseSliderHitTest(canvasX, canvasY) {
  for (const s of PAUSE_SLIDERS) {
    if (s._sliderX == null) continue;
    const pad = (s._knobSz || 12);
    if (canvasX >= s._sliderX - pad && canvasX <= s._sliderX + s._sliderW + pad &&
        canvasY >= s.y - pad && canvasY <= s.y + pad) {
      return s;
    }
  }
  return null;
}

function pauseSliderSetFromMouse(canvasX) {
  if (!pauseSliderDragging) return;
  // Find the matching slider to get its geometry
  const s = PAUSE_SLIDERS.find(sl => sl.key === pauseSliderDragging);
  if (!s || s._sliderX == null) return;
  const val = (canvasX - s._sliderX) / s._sliderW;
  setVolForKey(pauseSliderDragging, val);
}

// Pre-rendered full map canvas (generated once, updated when new chunks load)
let fullMapCanvas = null;
let fullMapChunkCount = 0;

function buildFullMapCanvas() {
  const chunkPx = CFG.CHUNK * CFG.TILE; // 512px per chunk
  const totalPx = CFG.MAP_CHUNKS * chunkPx; // 16384px total
  // Render at reduced resolution: 1 pixel per tile (1024x1024)
  const mapPx = CFG.MAP_TILES; // 1024
  if (!fullMapCanvas) {
    fullMapCanvas = document.createElement('canvas');
    fullMapCanvas.width = mapPx;
    fullMapCanvas.height = mapPx;
  }
  const mc = fullMapCanvas.getContext('2d');
  mc.imageSmoothingEnabled = false;

  // Draw each loaded chunk scaled down
  const scale = mapPx / totalPx; // 1024/16384 = 1/16 — each 16px tile = 1px
  for (const key in chunks) {
    const cc = chunkCanvases[key];
    if (!cc) continue;
    const [cx, cy] = key.split(',').map(Number);
    const dx = cx * chunkPx * scale;
    const dy = cy * chunkPx * scale;
    const dw = chunkPx * scale; // 32px on the map canvas
    mc.drawImage(cc, Math.floor(dx), Math.floor(dy), Math.ceil(dw), Math.ceil(dw));
  }
  // Fill unloaded areas with dark
  mc.fillStyle = '#0a0e0a';
  for (let cy = 0; cy < CFG.MAP_CHUNKS; cy++) {
    for (let cx = 0; cx < CFG.MAP_CHUNKS; cx++) {
      if (!chunkCanvases[chunkKey(cx, cy)]) {
        mc.fillRect(cx * 32, cy * 32, 32, 32);
      }
    }
  }
  fullMapChunkCount = Object.keys(chunkCanvases).length;
}

function renderFullMap() {
  // Generate all missing chunks (256 for 16x16 map — fast enough)
  const MC = CFG.MAP_CHUNKS;
  for (let cy = 0; cy < MC; cy++) for (let cx = 0; cx < MC; cx++) {
    const key = chunkKey(cx, cy);
    if (!chunks[key]) { const c = generateChunk(cx, cy); if (c) { chunks[key] = c; prerenderChunk(cx, cy); } }
  }

  // Rebuild map canvas if chunks changed
  if (!fullMapCanvas || Object.keys(chunkCanvases).length !== fullMapChunkCount) {
    buildFullMapCanvas();
  }

  // Fit the square map into the screen (letterboxed)
  const fitSize = Math.min(W, H - 20);
  const mapX = (W - fitSize) / 2;
  const mapY = (H - 20 - fitSize) / 2 + 10;

  // Draw the actual world
  ctx.drawImage(fullMapCanvas, 0, 0, fullMapCanvas.width, fullMapCanvas.height,
    Math.floor(mapX), Math.floor(mapY), Math.ceil(fitSize), Math.ceil(fitSize));

  const tileToScreen = fitSize / CFG.MAP_TILES;

  // Zone boundary dashed rings + labels overlaid on real map
  const mapCx = mapX + fitSize / 2, mapCy = mapY + fitSize / 2;
  const mapR = fitSize / 2;
  const ringBoundaries = [0.78, 0.58, 0.38, 0.18];
  const ringLabels = ['Wilderness', 'Backcountry', 'Campgrounds', 'Outpost', 'Resort'];
  const labelRadii = [0.89, 0.68, 0.48, 0.28, 0.06];
  ctx.textAlign = 'center';
  ctx.setLineDash([5, 6]);
  ctx.lineWidth = 1.5;
  for (let i = 0; i < ringBoundaries.length; i++) {
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(mapCx, mapCy, ringBoundaries[i] * mapR, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.font = '6px monospace';
  for (let i = 0; i < ringLabels.length; i++) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText(ringLabels[i], mapCx, mapCy - labelRadii[i] * mapR);
  }

  // Human dots
  for (const h of humans) {
    if (!h.alive) continue;
    const hpx = mapX + (h.x / CFG.MAP_PX) * fitSize;
    const hpy = mapY + (h.y / CFG.MAP_PX) * fitSize;
    ctx.fillStyle = HCLASS[h.classKey].armed ? '#ff4040' : '#ff8040';
    ctx.fillRect(Math.floor(hpx), Math.floor(hpy), 2, 2);
  }

  // Bear — pulsing yellow dot
  const bearPx = mapX + (bear.x / CFG.MAP_PX) * fitSize;
  const bearPy = mapY + (bear.y / CFG.MAP_PX) * fitSize;
  const pulse = 2.5 + Math.sin(now / 300) * 1.5;
  ctx.fillStyle = 'rgba(255,200,60,0.2)';
  ctx.beginPath(); ctx.arc(bearPx, bearPy, pulse + 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffcc40';
  ctx.beginPath(); ctx.arc(bearPx, bearPy, pulse, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,200,60,0.6)';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.arc(bearPx, bearPy, pulse + 2, 0, Math.PI * 2); ctx.stroke();

  // Viewport rectangle
  const vpW = (W / CFG.MAP_PX) * fitSize;
  const vpH = (H / CFG.MAP_PX) * fitSize;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(bearPx - vpW / 2, bearPy - vpH / 2, vpW, vpH);

  // Title + instructions
  ctx.fillStyle = '#c8a060';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('PARK MAP', W / 2, mapY - 3);
  ctx.fillStyle = '#8a8a6a';
  ctx.font = '7px monospace';
  ctx.fillText('Click or press M / ESC to close', W / 2, mapY + fitSize + 10);
  ctx.textAlign = 'left';
}

function renderGameOver() {
  ctx.fillStyle = 'rgba(10,0,0,0.82)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;
  let ly = 50;

  // Title
  ctx.fillStyle = '#c04040';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('DEAD', cx, ly);
  ly += 24;

  // Divider
  ctx.strokeStyle = 'rgba(200,100,80,0.3)';
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(cx - 100, ly); ctx.lineTo(cx + 100, ly); ctx.stroke();
  ly += 16;

  // Stats
  const s = bear ? bear.stats : {};
  ctx.font = '8px monospace';
  const stats = [
    ['Distance Travelled', Math.floor(s.tilesWalked || 0) + ' tiles'],
    ['Deepest Reach', sessionDist + ' tiles'],
    ['Humans Eaten', String(s.humansEaten || 0)],
    ['Berries Eaten', String(s.berriesEaten || 0)],
    ['Fish Eaten', String(s.fishEaten || 0)],
    ['Garbage Eaten', String(s.garbageEaten || 0)],
    ['Other Food Eaten', String(s.foodEaten || 0)],

  for (const [label, value] of stats) {

    ctx.textAlign = 'left';

  // Divider
  ctx.strokeStyle = 'rgba(200,100,80,0.3)';
  ctx.beginPath(); ctx.moveTo(cx - 100, ly); ctx.lineTo(cx + 100, ly); ctx.stroke();

  // Best
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8a7a5a';
  ctx.font = '8px monospace';
  ctx.fillText('Best Reach: ' + bestDist + ' tiles', cx, ly);
  ly += 20;

  // Retry prompt
  const blink = Math.floor(now / 600) % 2;
  if (blink) {
    ctx.fillStyle = '#8a8a6a';
    ctx.fillText('PRESS ENTER TO RETRY', cx, ly);
  }
  ctx.textAlign = 'left';
}

// ============================================================
// TRANSITION STATE MACHINE (Interior Entry/Exit)
// ============================================================
function startTransition(type, data) {
  if (transition) return; // already transitioning
  bear.vx = 0; bear.vy = 0;
  clearInputFlags();

  let onSwap;
  if (type === 'enter') onSwap = () => swapToInterior(data);
  else if (type === 'enter_cave') onSwap = () => swapToCaveInterior(data);
  else onSwap = () => swapToExterior();

  transition = {
    phase: 'FADE_OUT',
    timer: 0,
    duration: 0.3,
    fadeAlpha: 0,
    onSwap
  };
}

function updateTransition(dt2) {
  clearInputFlags();
  transition.timer += dt2;
  const t = Math.min(1, transition.timer / transition.duration);

  if (transition.phase === 'FADE_OUT') {
    transition.fadeAlpha = t;  // 0 → 1
    if (t >= 1) {
      transition.onSwap();  // swap map while fully black
      transition.phase = 'FADE_IN';
      transition.timer = 0;
    }
  } else if (transition.phase === 'FADE_IN') {
    transition.fadeAlpha = 1 - t;  // 1 → 0
    if (t >= 1) {
      transition = null;
      transitionCooldown = 0.5;
    }
  }
}

function swapToInterior(data) {
  // Save exterior state
  const map = createCabinInterior(data.type, data.hash);

  interiorState = {
    id: data.type + '_' + data.hash,
    map,
    exteriorBearX: bear.x,
    exteriorBearY: bear.y,
    exteriorCamX: camX,
    exteriorCamY: camY
  };

  // Position bear at interior spawn — just inside the door, facing north
  const doorX = map.exitTrigger.tx;
  bear.x = (doorX + 1) * CFG.TILE;  // center of the 2-tile-wide door
  bear.y = (map.height - 2) * CFG.TILE + CFG.TILE / 2 - CFG.BEAR_FOOT_OFS;
  bear.facingX = 0;
  bear.facingY = -1; // facing north (into the room)
  bear.state = 'idle';
  bear.vx = 0; bear.vy = 0;

  // Reset particles
  particles.length = 0;
}

function swapToCaveInterior(data) {
  const map = createCaveInterior(data.caveHash);

  interiorState = {
    id: 'cave_' + data.caveHash,
    map,
    exteriorBearX: data.doorWorldX,
    exteriorBearY: data.doorWorldY,
    exteriorCamX: camX,
    exteriorCamY: camY,
    caveSpawnPoint: data.cp || null
  };

  // Position bear at interior spawn — just inside the door, facing north
  const doorX = map.exitTrigger.tx;
  bear.x = (doorX + 1) * CFG.TILE;  // center of the 2-tile-wide door
  bear.y = (map.height - 2) * CFG.TILE + CFG.TILE / 2 - CFG.BEAR_FOOT_OFS;
  bear.facingX = 0;
  bear.facingY = -1; // facing north (into the cave)
  bear.state = 'idle';
  bear.vx = 0; bear.vy = 0;

  particles.length = 0;
}

function swapToExterior() {
  if (!interiorState) return;
  const cp = interiorState.caveSpawnPoint;
  if (cp) {
    // Exit onto grass row below cave (row 5 of 6x6 layout, center)
    const TS = CFG.TILE;
    const exitX = (cp.tx + 3) * TS;
    const exitY = (cp.ty + 5) * TS + (TS >> 1) - CFG.BEAR_FOOT_OFS;
    // Ensure chunks around exit point exist before placing bear
    ensureChunks(exitX, exitY + CFG.BEAR_FOOT_OFS);
    bear.x = exitX;
    bear.y = exitY;
  } else {
    bear.x = interiorState.exteriorBearX;
    bear.y = interiorState.exteriorBearY + CFG.TILE;
  }
  bear.facingX = 0;
  bear.facingY = 1; // facing south (away from cave)
  bear.state = 'idle';
  bear.vx = 0; bear.vy = 0;
  bear._wasOnCaveTrigger = false; // allow re-entry after walking away

  // Compute camera from exit position
  camX = Math.max(0, Math.min(CFG.MAP_PX - W, bear.x - W / 2));
  camY = Math.max(0, Math.min(CFG.MAP_PX - H, bear.y - H / 2 - 48));

  interiorState = null;
  particles.length = 0;
}

// GAME STATE
// ============================================================
let gameState = 'TITLE';
let lastTime = 0;
let dt = 0;
let now = 0; // cached now — updated once per frame, use instead of now
let loadProgress = 0, loadTotal = 0, loadCX = 0, loadCY = 0;

function pickCaveSpawn() {
  if (caveSpawnPoints.length === 0) return { x: CFG.MAP_CENTER_PX, y: CFG.MAP_CENTER_PX, tx: 256, ty: 256 };
  return caveSpawnPoints[Math.floor(Math.random() * caveSpawnPoints.length)];
}

function pickEdgeSpawn() {
  const CS = CFG.CHUNK, TS = CFG.TILE, MC = CFG.MAP_CHUNKS;
  // Minimum distance from edge so viewport stays on-map (half viewport + margin)
  const minPx = Math.max(W, H) / 2 + TS * 2;
  const minTile = Math.ceil(minPx / TS);
  const edge = Math.floor(Math.random() * 4);
  let cx, cy;
  // Spawn on edge chunks but avoid corners too close to map boundary
  switch (edge) {
    case 0: cx = 1 + Math.floor(Math.random() * (MC - 2)); cy = 1; break; // top edge, 2nd row
    case 1: cx = 1 + Math.floor(Math.random() * (MC - 2)); cy = MC - 2; break; // bottom edge
    case 2: cx = 1; cy = 1 + Math.floor(Math.random() * (MC - 2)); break; // left edge
    case 3: cx = MC - 2; cy = 1 + Math.floor(Math.random() * (MC - 2)); break; // right edge
  }
  // Ensure chunk is generated
  const key = chunkKey(cx, cy);
  if (!chunks[key]) { chunks[key] = generateChunk(cx, cy); prerenderChunk(cx, cy); }
  const chunk = chunks[key];
  // Find walkable tile, ensuring it's far enough from map edge
  for (let attempt = 0; attempt < 100; attempt++) {
    const lx = Math.floor(Math.random() * CS);
    const ly = Math.floor(Math.random() * CS);
    if (chunk && TDATA[chunk.tiles[ly * CS + lx]].walk) {
      const wx = (cx * CS + lx) * TS + TS / 2;
      const wy = (cy * CS + ly) * TS + TS / 2;
      // Ensure viewport won't go off-map
      if (wx >= minPx && wx <= CFG.MAP_PX - minPx &&
          wy >= minPx && wy <= CFG.MAP_PX - minPx) {
        return { x: wx, y: wy };
      }
    }
  }
  // Fallback: center of the chosen chunk (guaranteed safe for inner chunks)
  return { x: (cx * CS + CS/2) * TS, y: (cy * CS + CS/2) * TS };
}

const FIXED_SEED = 42; // fixed seed — same map every time until user provides their own

function updateLoading() {
  const MC = CFG.MAP_CHUNKS; // 16
  const chunksPerFrame = 4; // generate 4 chunks per frame for smooth loading animation
  for (let i = 0; i < chunksPerFrame; i++) {
    if (loadCX >= MC && loadCY >= MC) break; // done
    if (loadCY >= MC) break; // done
    const key = chunkKey(loadCX, loadCY);
    if (!chunks[key]) {
      const chunk = generateChunk(loadCX, loadCY);
      if (chunk) { chunks[key] = chunk; prerenderChunk(loadCX, loadCY); }
    }
    loadProgress++;
    loadCX++;
    if (loadCX >= MC) { loadCX = 0; loadCY++; }
  }
  // All chunks generated
  if (loadCY >= MC) {
    buildHumansList();
    camX = Math.max(0, Math.min(CFG.MAP_PX - W, bear.x - W/2));
    camY = Math.max(0, Math.min(CFG.MAP_PX - H, bear.y - H/2 - 48));
    spawnFadeAlpha = 1; // fade from black on spawn (emerging from cave)
    gameState = 'PLAYING';
    lastTime = 0;
  }
}

function updateBackgroundGen() {
  if (loadCY >= CFG.MAP_CHUNKS) return; // all done
  const MC = CFG.MAP_CHUNKS;
  for (let i = 0; i < 4; i++) {
    if (loadCY >= MC) break;
    const key = chunkKey(loadCX, loadCY);
    if (!chunks[key]) {
      const chunk = generateChunk(loadCX, loadCY);
      if (chunk) { chunks[key] = chunk; prerenderChunk(loadCX, loadCY); }
    }
    loadProgress++;
    loadCX++;
    if (loadCX >= MC) { loadCX = 0; loadCY++; }
  }
  if (loadCY >= MC) {
    buildHumansList();
  }
}

function startGame() {
  // Reuse existing map if seed hasn't changed
  const needNewMap = worldSeed !== FIXED_SEED || Object.keys(chunks).length === 0;
  worldSeed = FIXED_SEED;
  if (needNewMap) {
    for (const k in chunks) { delete chunks[k]; delete chunkCanvases[k]; }
    cachedStreams = null;
    fullMapCanvas = null;
    fullMapChunkCount = 0;
  }
  drops = [];
  particles = [];
  wildlife = [];
  boneDrops = [];
  goreDrops = [];
  bloodStains = [];
  fireflies = [];
  dayTime = 0;
  dayNightDarkness = 0;
  weatherState = 'CLEAR';
  weatherTimer = CFG.WEATHER_CLEAR_MIN + Math.random() * (CFG.WEATHER_CLEAR_MAX - CFG.WEATHER_CLEAR_MIN);
  weatherTransition = 0;
  weatherTransDir = 1;
  weatherIntensity = 0;
  weatherCloudAlpha = 0;
  weatherRainDensity = 0;
  weatherNextRain = false;
  resetMusicSystem();
  resetAmbientAudio();
  resetForestAudio();
  resetFootsteps();
  for (const k in eatenMushrooms) delete eatenMushrooms[k];
  bear = mkBear();
  // Pick a random cave and spawn bear INSIDE the cave interior
  const cp = pickCaveSpawn();
  const caveHash = cp.tx * 1000 + cp.ty;
  const caveMap = createCaveInterior(caveHash);

  interiorState = {
    id: 'cave_' + caveHash,
    map: caveMap,
    exteriorBearX: cp.x,
    exteriorBearY: cp.y,
    exteriorCamX: 0,
    exteriorCamY: 0,
    caveSpawnPoint: cp
  };

  // Position bear inside cave, facing south (toward exit)
  const doorX = caveMap.exitTrigger.tx;
  bear.x = (doorX + 1) * CFG.TILE;
  bear.y = 2 * CFG.TILE - CFG.BEAR_FOOT_OFS; // near top of cave
  bear.facingX = 0;
  bear.facingY = 1; // facing south toward exit
  bear.state = 'idle';
  bear._wasOnCaveTrigger = true;

  // If all chunks already loaded (e.g. retry), just play
  if (Object.keys(chunks).length >= CFG.MAP_CHUNKS * CFG.MAP_CHUNKS) {
    buildHumansList();
    spawnFadeAlpha = 1;
    gameState = 'PLAYING';
    lastTime = 0;
  } else {
    // Start background world generation (no loading screen — bear is in cave)
    loadProgress = 0;
    loadTotal = CFG.MAP_CHUNKS * CFG.MAP_CHUNKS;
    loadCX = 0;
    loadCY = 0;
    spawnFadeAlpha = 1; // fade from black
    gameState = 'PLAYING';
    lastTime = 0;
  }
}

function update() {
  // Transition takes priority — freeze gameplay during fade
  if (transition) { updateTransition(dt); return; }
  if (transitionCooldown > 0) transitionCooldown -= dt;
  // Fade spawn overlay (emerging from cave)
  if (spawnFadeAlpha > 0) spawnFadeAlpha = Math.max(0, spawnFadeAlpha - dt / 0.6); // 0.6s fade
  switch (gameState) {
    case 'LOADING':
      updateLoading();
      break;
    case 'PLAYING':
      if (loadCY < CFG.MAP_CHUNKS) updateBackgroundGen();
      updateBear(dt);
      if (!interiorState) ensureChunks(bear.x, bear.y);
      updateCamera(dt);
      if (!interiorState) updateHumans(dt);
      // Sound perception: emit waves from humans & update propagation
      if (!interiorState) {
        for (const h of humans) emitSoundWave(h);
        updateSoundWaves(dt);
      }
      updateParticles(dt);
      // Fade blood stains over 1-2 in-game days
      for (let i = bloodStains.length - 1; i >= 0; i--) {
        bloodStains[i].life -= dt;
        bloodStains[i].age += dt;
        if (bloodStains[i].life <= 0) bloodStains.splice(i, 1);
      }
      updateDayNight(dt);
      updateWeather(dt);
      updateMusicSystem(dt);
      updateAmbientAudio(dt);
      updateForestAudio(dt);
      updateFootsteps(dt);
      updateRunningLoop(dt);
      updateBushRustle(dt);
      if (!interiorState) updateWildlife(dt);
      // Buff: stam regen boost
      for (const buff of bear.buffs) {
        if (buff.type === 'stam_regen') {
          bear.stam = Math.min(CFG.MAX_STAM, bear.stam + buff.strength * dt);
        }
        if (buff.type === 'stam_drain') {
          bear.stam = Math.max(0, bear.stam - buff.strength * dt);
        }
      }
      break;
  }
}

// Global key handlers for state transitions
window.addEventListener('keydown', e => {
  if (transition) return; // block all state changes during fade transitions
  if (e.code === 'Enter') {
    if (gameState === 'TITLE' || gameState === 'GAME_OVER') startGame();
  }
  if (e.code === 'Escape') {
    if (gameState === 'PLAYING') gameState = 'PAUSED';
    else if (gameState === 'PAUSED') { gameState = 'PLAYING'; lastTime = 0; }
    else if (gameState === 'MAP') { gameState = 'PLAYING'; lastTime = 0; }
  }
  if (e.code === 'KeyM' && gameState === 'MAP' && now - mapOpenedAt > 300) { gameState = 'PLAYING'; lastTime = 0; }
  if (e.code === 'KeyM' && gameState === 'PLAYING' && !interiorState) { gameState = 'MAP'; mapOpenedAt = now; }
  // Zoom toggle: - to zoom out, = to zoom in (centered on viewport)
  if ((e.code === 'Minus' || e.code === 'Equal') && gameState === 'PLAYING') {
    let newLvl = zoomLevel;
    if (e.code === 'Minus' && zoomLevel < ZOOM_SIZES.length - 1) newLvl++;
    if (e.code === 'Equal' && zoomLevel > 0) newLvl--;
    if (newLvl !== zoomLevel) {
      const cWX = camX + W / 2, cWY = camY + H / 2;
      zoomLevel = newLvl;
      resize();
      camX = Math.max(0, Math.min(CFG.MAP_PX - W, Math.round(cWX - W / 2)));
      camY = Math.max(0, Math.min(CFG.MAP_PX - H, Math.round(cWY - H / 2)));
    }
  }
});

// Scroll wheel zoom — centered on viewport center to prevent tile jumping
window.addEventListener('wheel', e => {
  if (gameState !== 'PLAYING') return;
  e.preventDefault();
  let newLevel = zoomLevel;
  if (e.deltaY > 0 && zoomLevel < ZOOM_SIZES.length - 1) newLevel = zoomLevel + 1;
  else if (e.deltaY < 0 && zoomLevel > 0) newLevel = zoomLevel - 1;
  if (newLevel === zoomLevel) return;
  // Preserve the world point at viewport center across zoom change
  const oldW = W, oldH = H;
  const centerWX = camX + oldW / 2;
  const centerWY = camY + oldH / 2;
  zoomLevel = newLevel;
  resize();
  // Re-center camera so the same world point stays at viewport center
  camX = Math.round(centerWX - W / 2);
  camY = Math.round(centerWY - H / 2);
  camX = Math.max(0, Math.min(CFG.MAP_PX - W, camX));
  camY = Math.max(0, Math.min(CFG.MAP_PX - H, camY));
}, { passive: false });

// ============================================================
// MAIN LOOP
// ============================================================
function loop(ts) {
  if (lastTime > 0 && ts - lastTime < 12) { requestAnimationFrame(loop); return; }
  dt = Math.min((ts - lastTime) / 1000, 1/20);
  if (lastTime === 0) dt = 1/60;
  lastTime = ts;
  now = ts; // cache timestamp — use 'now' instead of now everywhere
  try { update(); render(); } catch(e) { console.error('Loop error:', e); }
  requestAnimationFrame(loop);
}

loadAllSprites().then(() => {
  console.log('Sprites loaded:', Object.keys(SHEETS).filter(k => SHEETS[k].img).length, '/', Object.keys(SHEETS).length);
  parseMapTemplate();
  parseCaveLayout();
  parseCampsiteLayouts();
  parseLodgeLayouts();
  sliceBearPaw();
  requestAnimationFrame(loop);
});
</script>
