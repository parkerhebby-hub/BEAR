    f.y += f.vy * dt + Math.sin(now / 1000 + f.phase) * 0.3;
    f.vx += (Math.random() - 0.5) * 2 * dt;
    f.vy += (Math.random() - 0.5) * 2 * dt;
    // Clamp drift speed
    f.vx = Math.max(-10, Math.min(10, f.vx));
    f.vy = Math.max(-8, Math.min(8, f.vy));
    f.life -= dt;
    // Fade faster at dawn
    if (dayNightDarkness < 0.15) f.life -= dt * 4;
    // Despawn if too far from camera
    if (bear && (Math.abs(f.x - bear.x) > W || Math.abs(f.y - bear.y) > H)) f.life = 0;
    if (f.life <= 0) { fireflies.splice(i, 1); }
  }
}

// ============================================================
// WEATHER UPDATE
// ============================================================
function updateWeather(dt) {
  // Advance transition (fade in or out)
  const fadeDur = weatherTransDir > 0 ? CFG.WEATHER_FADE_IN : CFG.WEATHER_FADE_OUT;
  weatherTransition = Math.min(1, Math.max(0, weatherTransition + weatherTransDir * dt / fadeDur));

  // Smoothstep the transition into intensity
  const t = weatherTransition;
  weatherIntensity = t * t * (3 - 2 * t);

  // Compute visual values from intensity + state
  switch (weatherState) {
    case 'CLEAR':
      weatherCloudAlpha = 0;
      weatherRainDensity = 0;
      break;
    case 'OVERCAST':
      weatherCloudAlpha = weatherIntensity * CFG.WEATHER_CLOUD_ALPHA;
      weatherRainDensity = 0;
      break;
    case 'RAIN':
      weatherCloudAlpha = weatherIntensity * CFG.WEATHER_RAIN_ALPHA;
      weatherRainDensity = weatherIntensity;
      break;
  }

  // Count down state timer
  weatherTimer -= dt;
  if (weatherTimer > 0) return;

  // State transitions
  switch (weatherState) {
    case 'CLEAR':
      // Begin overcast
      weatherState = 'OVERCAST';
      weatherTimer = CFG.WEATHER_OVERCAST_MIN + Math.random() * (CFG.WEATHER_OVERCAST_MAX - CFG.WEATHER_OVERCAST_MIN);
      weatherTransition = 0;
      weatherTransDir = 1;
      weatherNextRain = Math.random() < CFG.WEATHER_RAIN_CHANCE;
      break;

    case 'OVERCAST':
      if (weatherNextRain && weatherTransDir > 0) {
        // Escalate to rain
        weatherState = 'RAIN';
        weatherTimer = CFG.WEATHER_RAIN_MIN + Math.random() * (CFG.WEATHER_RAIN_MAX - CFG.WEATHER_RAIN_MIN);
        weatherTransition = weatherIntensity; // carry over intensity
        weatherTransDir = 1;
      } else if (weatherTransDir > 0) {
        // Start fading out (no rain)
        weatherTransDir = -1;
        weatherTimer = CFG.WEATHER_FADE_OUT;
      } else {
        // Fade complete → clear
        weatherState = 'CLEAR';
        weatherTimer = CFG.WEATHER_CLEAR_MIN + Math.random() * (CFG.WEATHER_CLEAR_MAX - CFG.WEATHER_CLEAR_MIN);
        weatherTransition = 0;
        weatherIntensity = 0;
      }
      break;

    case 'RAIN':
      if (weatherTransDir > 0) {
        // Start fading out rain
        weatherTransDir = -1;
        weatherTimer = CFG.WEATHER_FADE_OUT;
      } else {
        // Rain faded → brief overcast tail that clears
        weatherState = 'OVERCAST';
        weatherTimer = 10 + Math.random() * 15;
        weatherTransition = weatherIntensity;
        weatherTransDir = -1; // already fading out
        weatherNextRain = false;
      }
      break;
  }
}

// ============================================================
// CAMERA
// ============================================================
let camX = 0, camY = 0;
// Middle-click pan state (desktop map survey)
let panActive = false, panStartX = 0, panStartY = 0;
let panCamStartX = 0, panCamStartY = 0, panDetached = false;

function updateCamera(dt) {
  // Interior: center camera on the small interior map
  if (interiorState) {
    const iw = interiorState.map.width * CFG.TILE;
    const ih = interiorState.map.height * CFG.TILE;
    camX = Math.round((iw - W) / 2);
    camY = Math.round((ih - H) / 2);
    return;
  }
  // If camera is detached (middle-click pan), don't follow bear
  if (panDetached) return;
  // Center bear in viewport, clamped so camera never leaves the map
  // Round target to integer to prevent float→round oscillation cycle
  const tx = Math.round(bear.x - W / 2);
  const ty = Math.round(bear.y - H / 2 - 48);
  // Smooth lerp — same rate for both axes to prevent diagonal jiggle
  const lerpFactor = Math.min(1, 3.0 * dt);
  const dx = tx - camX, dy = ty - camY;
  // Snap when close enough to prevent float oscillation
  if (Math.abs(dx) < 1 && Math.abs(dy) < 1) {
    camX = tx; camY = ty;
  } else {
    camX = Math.round(camX + dx * lerpFactor);
    camY = Math.round(camY + dy * lerpFactor);
  }
  // Clamp to map boundaries
  camX = Math.max(0, Math.min(CFG.MAP_PX - W, camX));
  camY = Math.max(0, Math.min(CFG.MAP_PX - H, camY));
}

// ============================================================
// SCORE
// ============================================================
let bestDist = parseInt(localStorage.getItem('bear_best') || '0');
let sessionDist = 0;

function saveScore() {
  // Score = penetration toward center (tiles)
  const dx = bear.x - CFG.MAP_CENTER_PX;
  const dy = bear.y - CFG.MAP_CENTER_PX;
  const distFromCenter = Math.sqrt(dx*dx + dy*dy) / CFG.TILE;
  sessionDist = Math.max(0, Math.floor(CFG.MAP_CENTER_TILE - distFromCenter));
  if (sessionDist > bestDist) {
    bestDist = sessionDist;
    localStorage.setItem('bear_best', String(bestDist));
  }
}

// ============================================================
// RENDER
// ============================================================
function render() {
  ctx.fillStyle = '#1a2a1a';
  ctx.fillRect(0, 0, W, H);

  // Nausea wobble
  const hasNausea = bear && bear.buffs.some(b => b.type === 'nausea');

  ctx.save();
  if (hasNausea) {
    const t = now / 1000;
    ctx.translate(Math.sin(t * 3) * 3, Math.cos(t * 2.5) * 2);
  }

  switch (gameState) {
    case 'TITLE':    renderTitle(); break;
    case 'LOADING':  renderLoadingScreen(loadTotal > 0 ? loadProgress / loadTotal : 0); break;
    case 'PLAYING':  renderGame();  break;
    case 'PAUSED':   renderGame(); renderPause(); break;
    case 'MAP':      renderGame(); renderFullMap(); break;
    case 'GAME_OVER': renderGame(); renderGameOver(); break;
  }

  ctx.restore();

  // Fade overlay for interior transitions (drawn on top of everything)
  if (transition && transition.fadeAlpha > 0) {
    ctx.globalAlpha = transition.fadeAlpha;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
  // Spawn fade-from-black (bear emerging from cave)
  if (spawnFadeAlpha > 0) {
    ctx.globalAlpha = spawnFadeAlpha;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
}

function renderTitle() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Draw MAIN_TITLE.png centered, scaled to fit
  const img = SHEETS.mainTitle && SHEETS.mainTitle.img;
  if (img) {
    const iw = img.width, ih = img.height;
    const scale = Math.max(W / iw, H / ih);
    const dw = (iw * scale) | 0;
    const dh = (ih * scale) | 0;
    const dx = ((W - dw) >> 1);
    const dy = ((H - dh) >> 1);
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  // Blinking prompt
  const blink = Math.floor(now / 600) % 2;
  if (blink) {
    ctx.fillStyle = '#8a8a6a';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PRESS ENTER TO BEGIN', W / 2, H - 14);
    ctx.textAlign = 'left';
  }
}

function renderLoadingScreen(progress) {
  // Dark forest background (same as title)
  ctx.fillStyle = '#0a1a0a';
  ctx.fillRect(0, 0, W, H);

  // Trees silhouettes
  for (let i = 0; i < 20; i++) {
    const x = (i * 37 + 10) % W;
    const h = 80 + (i * 13 % 60);
    ctx.fillStyle = `rgba(10,30,10,${0.5 + (i%3)*0.15})`;
    ctx.beginPath();
    ctx.moveTo(x, H - 60);
    ctx.lineTo(x - 15, H - 60);
    ctx.lineTo(x - 5, H - 60 - h);
    ctx.lineTo(x + 5, H - 60 - h);
    ctx.lineTo(x + 15, H - 60);
    ctx.fill();
  }

  // Ground
  ctx.fillStyle = '#1a2a0a';
  ctx.fillRect(0, H - 60, W, 60);

  // Bear silhouette with idle bob
  const bob = Math.sin(now / 400) * 2;
  ctx.fillStyle = '#3a2a1a';
  const bx = W/2, by = H/2 + 10 + bob;
  // Body
  ctx.beginPath();
  ctx.ellipse(bx, by, 20, 12, 0, 0, Math.PI*2);
  ctx.fill();
  // Head
  ctx.beginPath();
  ctx.arc(bx + 14, by - 4, 8, 0, Math.PI*2);
  ctx.fill();
  // Ears
  ctx.beginPath(); ctx.arc(bx+18, by-11, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+12, by-11, 4, 0, Math.PI*2); ctx.fill();

  // Walking legs animation
  const legPhase = now / 300;
  const legSwing = Math.sin(legPhase) * 3;
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect((bx - 12 + legSwing)|0, (by + 8)|0, 4, 6);
  ctx.fillRect((bx + 4 - legSwing)|0, (by + 8)|0, 4, 6);
  ctx.fillRect((bx - 6 - legSwing)|0, (by + 9)|0, 4, 5);
  ctx.fillRect((bx + 10 + legSwing)|0, (by + 9)|0, 4, 5);

  // Progress bar
  const barW = 120, barH = 8;
  const barX = (W - barW) / 2, barY = H/2 + 50;
  // Background
  ctx.fillStyle = '#1a1008';
  ctx.fillRect(barX|0, barY|0, barW, barH);
  // Fill
  ctx.fillStyle = '#c8a060';
  ctx.fillRect(barX|0, barY|0, (barW * progress)|0, barH);
  // Border
  ctx.strokeStyle = '#5a4a30';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX|0, barY|0, barW, barH);

  // Text
  ctx.fillStyle = '#8a7a5a';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GENERATING WORLD...', W/2, barY + 22);
  ctx.fillStyle = '#6a6a4a';
  ctx.font = '7px monospace';
  ctx.fillText(`${loadProgress} / ${loadTotal}`, W/2, barY + 34);
  ctx.textAlign = 'left';
}

function renderInterior() {
  if (!interiorState) return;
  const TS = CFG.TILE;
  const m = interiorState.map;
  const isCave = !!m.isCave;
  const ox = Math.floor(camX), oy = Math.floor(camY);

  // Black background (void around interior)
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // Draw interior tiles
  for (let ty = 0; ty < m.height; ty++) {
    for (let tx = 0; tx < m.width; tx++) {
      const tile = m.tiles[ty * m.width + tx];
      const sx = tx * TS - ox, sy = ty * TS - oy;
      if (sx > W || sy > H || sx + TS < 0 || sy + TS < 0) continue;
      const td = TDATA[tile];
      if (tile === T.CABIN) {
        // Wood wall
        ctx.fillStyle = '#4a3020';
        ctx.fillRect(sx, sy, TS, TS);
        ctx.fillStyle = '#3a2018';
        ctx.fillRect(sx, sy + 7, TS, 1);
      } else if (tile === T.DIRT && isCave) {
        // Cave debris / bones spot
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(sx, sy, TS, TS);
        ctx.fillStyle = '#d8c8a0';
        ctx.fillRect(sx + 3, sy + 5, 4, 2);
        ctx.fillRect(sx + 8, sy + 8, 3, 2);
        ctx.fillStyle = '#c0b080';
        ctx.fillRect(sx + 6, sy + 3, 2, 5);
      } else if (tile === T.DIRT) {
        // Wood floor
        ctx.fillStyle = '#6a5030';
        ctx.fillRect(sx, sy, TS, TS);
        ctx.fillStyle = '#5a4028';
        ctx.fillRect(sx, sy, TS, 1);
        ctx.fillRect(sx, sy + 8, TS, 1);
      } else if (tile === T.CAMPFIRE) {
        // Fireplace
        ctx.fillStyle = '#3a3a3a';
        ctx.fillRect(sx, sy, TS, TS);
        ctx.fillStyle = '#c06020';
        ctx.fillRect(sx + 4, sy + 4, 8, 8);
        ctx.fillStyle = '#f0a030';
        ctx.fillRect(sx + 6, sy + 6, 4, 4);
      } else if (tile === T.GARBAGE) {
        ctx.fillStyle = '#5a4a30';
        ctx.fillRect(sx, sy, TS, TS);
        ctx.fillStyle = '#8a7a60';
        ctx.fillRect(sx + 3, sy + 3, 10, 10);
      } else if (tile === T.GRASS) {
        // Abandoned cabin — overgrown floor patch
        ctx.fillStyle = '#3a5a2a';
        ctx.fillRect(sx, sy, TS, TS);
      } else if (tile === T.CAVE_WALL) {
        // Dark stone wall
        ctx.fillStyle = '#3a3a3a';
        ctx.fillRect(sx, sy, TS, TS);
        // Procedural stone texture
        const sh = (tx * 17 + ty * 31) % 5;
        if (sh < 2) { ctx.fillStyle = '#333'; ctx.fillRect(sx + (sh*3)%8, sy + (sh*5)%10, 3, 2); }
        if (sh === 3) { ctx.fillStyle = '#444'; ctx.fillRect(sx+4, sy+6, 2, 3); }
      } else if (tile === T.CAVE_FLOOR) {
        // Dark cave floor
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(sx, sy, TS, TS);
        const fh = (tx * 11 + ty * 23) % 7;
        if (fh < 2) { ctx.fillStyle = '#252525'; ctx.fillRect(sx + fh*4, sy + 3, 2, 2); }
      } else if (tile === T.VOID) {
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(sx, sy, TS, TS);
      } else if (td) {
        ctx.fillStyle = td.col || '#333';
        ctx.fillRect(sx, sy, TS, TS);
      }
    }
  }

  // Draw bear
  if (bear) {
    drawBear(bear, ox, oy);
  }

  // Night overlay
  renderNightOverlay(ox, oy);

  // Fireflies (if any)
  renderFireflies(ox, oy);

  // HUD
  renderHUD();
}

function renderGame() {
  if (interiorState) { renderInterior(); return; }
  const TS = CFG.TILE, CS = CFG.CHUNK;
  const ox = Math.floor(camX), oy = Math.floor(camY);

  // Draw chunk terrain (pre-rendered)
  const startCX = Math.floor(ox / (TS * CS)) - 2;
  const startCY = Math.floor(oy / (TS * CS)) - 2;
  const endCX = Math.floor((ox + W) / (TS * CS)) + 2;
  const endCY = Math.floor((oy + H) / (TS * CS)) + 2;

  for (let cy = startCY; cy <= endCY; cy++) {
    for (let cx = startCX; cx <= endCX; cx++) {
      const key = chunkKey(cx, cy);
      const cc = chunkCanvases[key];
      if (cc) {
        const dx = cx * CS * TS - ox;
        const dy = cy * CS * TS - oy;
        ctx.drawImage(cc, Math.floor(dx), Math.floor(dy));
      }
    }
  }

  // Animated water tiles — draw over baked chunk terrain
  // Skip shallow water tiles adjacent to land (those have baked water edge sprites)
  const waterImg = SHEETS.waterAnim && SHEETS.waterAnim.img;
  if (waterImg) {
    const waterFrame = Math.floor(now / 250) % 4; // 4 frames at 250ms each
    const wfx = waterFrame * 16; // source X in the strip
    for (let cy2 = startCY; cy2 <= endCY; cy2++) {
      for (let cx2 = startCX; cx2 <= endCX; cx2++) {
        const ck = chunkKey(cx2, cy2);
        const chunk = chunks[ck];
        if (!chunk) continue;
        const chunkPxX = cx2 * CS * TS - ox;
        const chunkPxY = cy2 * CS * TS - oy;
        // Skip chunks fully off-screen
        if (chunkPxX + CS * TS < 0 || chunkPxX > W || chunkPxY + CS * TS < 0 || chunkPxY > H) continue;
        const tiles = chunk.tiles;
        for (let y = 0; y < CS; y++) {
          const py = chunkPxY + y * TS;
          if (py + TS < 0 || py > H) continue;
          for (let x = 0; x < CS; x++) {
            const t = tiles[y * CS + x];
            if (t !== T.WATER_S && t !== T.WATER_D) continue;
            // Skip shallow water tiles adjacent to land — preserve baked water edge sprites
            if (t === T.WATER_S) {
              const isLand = (ti) => { const td = TDATA[ti]; return td && td.walk && !td.swim && ti !== T.WATER_S; };
              const hasEdge =
                (y > 0 && isLand(tiles[(y-1)*CS+x])) ||
                (y < CS-1 && isLand(tiles[(y+1)*CS+x])) ||
                (x > 0 && isLand(tiles[y*CS+(x-1)])) ||
                (x < CS-1 && isLand(tiles[y*CS+(x+1)]));
              if (hasEdge) continue;
            }
            const px = chunkPxX + x * TS;
            if (px + TS < 0 || px > W) continue;
            ctx.drawImage(waterImg, wfx, 0, 16, 16, px | 0, py | 0, TS, TS);
          }
        }
      }
    }
  }

  // Collect all renderables for Y-sort
  const renderList = [];

  // Bear — sort by visual feet position (sprite anchor offset)
  if (bear) {
    renderList.push({ type: 'bear', y: bear.y + CFG.BEAR_FOOT_OFS + CFG.BEAR_H / 2, obj: bear });
  }

  // Humans — sort by feet (skip sheltered humans hiding indoors at night)
  for (const h of humans) {
    if (!h.alive || h._sheltered) continue;
    renderList.push({ type: 'human', y: h.y + 7, obj: h });
  }

  // Blood stains on ground (render below entities)
  for (const bs of bloodStains) {
    renderList.push({ type: 'bloodStain', y: bs.y - 1, obj: bs });
  }

  // Drops
  for (const d of drops) {
    renderList.push({ type: 'drop', y: d.y, obj: d });
  }

  // Bone drops from kills
  for (const bd of boneDrops) {
    renderList.push({ type: 'bone', y: bd.y, obj: bd });
  }
  // Gore drops (intestines, legs, human bones) from kills
  for (const gd of goreDrops) {
    renderList.push({ type: 'goreItem', y: gd.y, obj: gd });
  }

  // Splash animation when bear is MOVING in shallow water — aligned to bear feet
  if (bear && getTileAt(bear.x, bear.y + CFG.BEAR_FOOT_OFS) === T.WATER_S &&
      (bear.state === 'walk' || bear.state === 'sprint' || bear.state === 'swim')) {
    renderList.push({ type: 'splash', y: bear.y + CFG.BEAR_FOOT_OFS + CFG.BEAR_H/2, obj: { x: bear.x, y: bear.y + CFG.BEAR_FOOT_OFS } });
  }

  // Trees and bushes from visible chunks — Y-sorted with entities
  // At high zoom levels (4+5), skip small ground cover to reduce draw calls
  const skipGroundCover = zoomLevel >= 3;
  if (spritesLoaded) {
    for (let cy2 = startCY; cy2 <= endCY; cy2++) {
      for (let cx2 = startCX; cx2 <= endCX; cx2++) {
        const key = chunkKey(cx2, cy2);
        const chunk = chunks[key];
        if (!chunk) continue;
        // Trees — tall sprites (~91px) anchored at base, extend far above Y
        for (const tp of chunk.treePositions) {
          const worldX = (cx2 * CS + tp.x) * TS + TS/2;
          const worldY = (cy2 * CS + tp.y) * TS + TS/2; // center of tile
          const scrY = worldY - oy;
          if (scrY < -120 || scrY > H + 100) continue;
          const scrX = worldX - ox;
          if (scrX < -60 || scrX > W + 60) continue;
          renderList.push({ type:'tree', y:worldY, obj:{worldX, worldY, hash:tp.hash} });
        }
        // Large trees — wider frustum margins for 1.5x sprites
        if (chunk.largeTreePositions) {
          for (const tp of chunk.largeTreePositions) {
            const worldX = (cx2 * CS + tp.x) * TS + TS/2;
            const worldY = (cy2 * CS + tp.y) * TS + TS/2;
            const scrY = worldY - oy;
            if (scrY < -160 || scrY > H + 100) continue;
            const scrX = worldX - ox;
            if (scrX < -80 || scrX > W + 80) continue;
            renderList.push({ type:'largeTree', y:worldY, obj:{worldX, worldY, hash:tp.hash} });
          }
        }
        // Bushes
        // Cabins
        if (chunk.cabinPositions) {
          for (const cp of chunk.cabinPositions) {
            const worldX = (cx2 * CS + cp.x) * TS + TS * 2.5;
            const worldY = (cy2 * CS + cp.y) * TS + TS * 6;
            const scrY = worldY - oy;
            if (scrY < -120 || scrY > H + 120) continue;
            renderList.push({ type:'cabin', y:worldY, obj:{worldX, worldY, hash:cp.hash, cabinType:cp.cabinType} });
          }
        }
        // Lodge buildings
        if (chunk.lodgePositions) {
          for (const lp of chunk.lodgePositions) {
            // Lodge sprite is 192x160. Tile footprint is lp.w x lp.h.
            // Anchor at bottom-center of the tile footprint
            const worldX = (cx2 * CS + lp.x) * TS + (lp.w * TS) / 2;
            const worldY = (cy2 * CS + lp.y + lp.h) * TS;
            const scrY = worldY - oy;
            if (scrY < -200 || scrY > H + 200) continue;
            renderList.push({ type:'lodge', y:worldY, obj:{worldX, worldY, hash:lp.hash, w:lp.w, h:lp.h} });
          }
        }
        // Picnic benches
        if (chunk.picnicBenchPositions) {
          for (const pb of chunk.picnicBenchPositions) {
            const worldX = (cx2 * CS + pb.x) * TS + TS; // center of 2-wide pair
            const worldY = (cy2 * CS + pb.y) * TS + TS; // bottom of tile
            const scrY = worldY - oy;
            if (scrY < -40 || scrY > H + 40) continue;
            renderList.push({ type:'picnicBench', y:worldY, obj:{worldX, worldY, hash:pb.hash, vertical: pb.vertical} });
          }
        }
        if (!skipGroundCover && chunk.bushPositions) {
          for (const bp of chunk.bushPositions) {
            const worldX = (cx2 * CS + bp.x) * TS + TS/2;
            const worldY = (cy2 * CS + bp.y) * TS + TS;
            const scrY = worldY - oy;
            if (scrY < -44 || scrY > H + 50) continue;
            const scrX = worldX - ox;
            if (scrX < -40 || scrX > W + 40) continue;
            renderList.push({ type:'bush', y:worldY, obj:{worldX, worldY, hash:bp.hash} });
          }
        }
        // Fallen trunks
        if (!skipGroundCover && chunk.fallenPositions) {
          for (const fp of chunk.fallenPositions) {
            const worldX = (cx2 * CS + fp.x) * TS + TS/2;
            const worldY = (cy2 * CS + fp.y) * TS + TS;
            const scrY = worldY - oy;
            if (scrY < -20 || scrY > H + 50) continue;
            renderList.push({ type:'fallen', y:worldY, obj:{worldX, worldY, hash:fp.hash} });
          }
        }
        // Rocks, logs, garbage, small trees, ferns — sprite-based, Y-sorted
        // At high zoom, only render structures (campfires, tents, trailers) — skip ground clutter
        const spritePositions = skipGroundCover ? [
          [chunk.campfirePositions, 'campfire'],
          [chunk.tentPositions, 'tent'],
          [chunk.trailerPositions, 'trailer'],
          [chunk.woodBundlePositions, 'woodBundle'],
        ] : [
          [chunk.rockPositions, 'rock'],
          [chunk.logPositions, 'logItem'],
          [chunk.garbagePositions, 'garbageItem'],
          [chunk.smallTreePositions, 'smallTree'],
          [chunk.fernPositions, 'fern'],
          [chunk.smallFernPositions, 'smallFern'],
          [chunk.stump2x2Positions, 'stump2x2'],
          [chunk.logLgPositions, 'logLg'],
          [chunk.logsSmPositions, 'logsSm'],
          [chunk.campfirePositions, 'campfire'],
          [chunk.tentPositions, 'tent'],
          [chunk.trailerPositions, 'trailer'],
          [chunk.woodBundlePositions, 'woodBundle'],
        ];
        for (const [posArr, typeName] of spritePositions) {
          if (!posArr) continue;
          for (const sp of posArr) {
            const worldX = (cx2 * CS + sp.x) * TS + TS/2;
            let worldY = (cy2 * CS + sp.y) * TS + TS;
            // Tents: sp.y is bottom-left row of pink block; anchor sprite at bottom
            if (typeName === 'tent') worldY = (cy2 * CS + sp.y + 1) * TS;
            // Trailers: anchor at bottom of footprint (sp.y is top, sp.h is height)
            if (typeName === 'trailer') {
              worldY = (cy2 * CS + sp.y + sp.h) * TS;
            }
            const scrY = worldY - oy;
            if (scrY < -100 || scrY > H + 100) continue;
            const scrX = worldX - ox;
            if (scrX < -40 || scrX > W + 40) continue;
            renderList.push({ type:typeName, y:worldY, obj:{worldX, worldY, hash:sp.hash, w:sp.w, h:sp.h} });
          }
        }
      }
    }
  }

  // Wildlife (bats and flying birds excluded — they render above trees/darkness)
  for (const w of wildlife) {
    if (w.kind === 'bat') continue;
    // Flying birds render above everything; perched/idle birds stay Y-sorted on ground
    if (w.kind === 'bird' && !w.perched) continue;
    renderList.push({ type: w.kind, y: w.y, obj: w });
  }

  // Sort by Y
  renderList.sort((a, b) => a.y - b.y);

  // Pre-compute whether bear is obscured by any nearby tall sprite
  let bearObscured = false;
  if (bear && spritesLoaded) {
    const bfx = Math.floor(bear.x / TS), bfy = Math.floor((bear.y + CFG.BEAR_FOOT_OFS) / TS);
    const bcx = Math.floor(bfx / CS), bcy = Math.floor(bfy / CS);
    outer: for (let ddy = -1; ddy <= 1; ddy++) for (let ddx = -1; ddx <= 1; ddx++) {
      const ck = chunkKey(bcx+ddx, bcy+ddy);
      const ch = chunks[ck];
      if (!ch) continue;
      for (const tp of ch.treePositions) {
        const wx = ((bcx+ddx)*CS+tp.x)*TS+TS/2, wy = ((bcy+ddy)*CS+tp.y)*TS+TS/2;
        if (isBearBehind(wx, wy, 90)) { bearObscured = true; break outer; }
      }
      if (ch.largeTreePositions) for (const tp of ch.largeTreePositions) {
        const wx = ((bcx+ddx)*CS+tp.x)*TS+TS/2, wy = ((bcy+ddy)*CS+tp.y)*TS+TS/2;
        if (isBearBehind(wx, wy, 140)) { bearObscured = true; break outer; }
      }
    }
  }

  // Render sorted entities
  for (const r of renderList) {
    switch (r.type) {
      case 'bear':      drawBear(r.obj, ox, oy); break;
      case 'human':     drawHuman(r.obj, ox, oy); break;
      case 'drop':      drawDrop(r.obj, ox, oy); break;
      case 'tree':      drawTreeSprite(r.obj, ox, oy); break;
      case 'largeTree': drawLargeTreeSprite(r.obj, ox, oy); break;
      case 'bush':      drawBushSprite(r.obj, ox, oy); break;
      case 'bird':      drawBirdSprite(r.obj, ox, oy); break;
      case 'squirrel':  drawSquirrelSprite(r.obj, ox, oy); break;
      case 'butterfly': drawButterflySprite(r.obj, ox, oy); break;
      case 'bat':       drawBatSprite(r.obj, ox, oy); break;
      case 'dog':       drawDogSprite(r.obj, ox, oy); break;
      case 'cabin':     drawCabinSprite(r.obj, ox, oy); break;
      case 'fallen':      drawFallenSprite(r.obj, ox, oy); break;
      case 'rock':        drawRockSprite(r.obj, ox, oy); break;
      case 'logItem':     drawLogSprite(r.obj, ox, oy); break;
      case 'garbageItem': drawGarbageSprite(r.obj, ox, oy); break;
      case 'smallTree':   drawSmallTreeSprite(r.obj, ox, oy); break;
      case 'fern':        drawFernSprite(r.obj, ox, oy); break;
      case 'smallFern':   drawSmallFernSprite(r.obj, ox, oy); break;
      case 'goreItem':    drawGoreSprite(r.obj, ox, oy); break;
      case 'stump2x2':   drawStump2x2(r.obj, ox, oy); break;
      case 'logLg':       drawLogLg(r.obj, ox, oy); break;
      case 'logsSm':      drawLogsSm(r.obj, ox, oy); break;
      case 'campfire':    drawCampfireAnim(r.obj, ox, oy); break;
      case 'tent':        drawTentSprite(r.obj, ox, oy); break;
      case 'lodge':       drawLodgeSprite(r.obj, ox, oy); break;
      case 'trailer':     drawTrailerSprite(r.obj, ox, oy); break;
      case 'picnicBench': drawPicnicBench(r.obj, ox, oy); break;
      case 'woodBundle':  drawWoodBundle(r.obj, ox, oy); break;
      case 'bone':        drawBoneSprite(r.obj, ox, oy); break;
      case 'bloodStain':  drawBloodStain(r.obj, ox, oy); break;
      case 'splash':
        if (!bearObscured) drawSplashAnim(r.obj, ox, oy);
        break;
    }
  }

  // Particles — hide bear-spawned particles when bear is behind tall sprites
  for (const p of particles) {
    let alpha = p.life / p.maxLife;
    if (bearObscured && bear) {
      const pdx = p.x - bear.x, pdy = p.y - (bear.y + CFG.BEAR_FOOT_OFS);
      if (pdx*pdx + pdy*pdy < 40*40) alpha *= 0.15;
    }
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.col;
    ctx.fillRect(Math.floor(p.x - ox), Math.floor(p.y - oy), Math.ceil(p.size), Math.ceil(p.size));
  }
  ctx.globalAlpha = 1;

  // Sound perception rings — world space, before overlays
  renderSoundRings(ox, oy);

  // Cloud cover overlay — before night so they stack
  renderCloudCover();

  // Night overlay — darkness with light source punch-throughs
  renderNightOverlay(ox, oy);

  // Focus listening vignette — after darkness, before fireflies
  renderFocusVignette(dt);

  // Fireflies — rendered ON TOP of darkness so they glow
  renderFireflies(ox, oy);

  // Bats + flying birds — rendered above trees and darkness (they fly overhead)
  for (const w of wildlife) {
    if (w.kind === 'bat') drawBatSprite(w, ox, oy);
    else if (w.kind === 'bird' && !w.perched) drawBirdSprite(w, ox, oy);
  }

  // Rain — rendered on top of darkness (visible at night, like Minecraft)
  renderRain();

  // HUD
  renderHUD();
}

// ============================================================
// WEATHER RENDERING
// ============================================================
function renderCloudCover() {
  if (weatherCloudAlpha < 0.005) return;
  if (interiorState) return;
  // Cool gray overlay simulating cloud cover
  ctx.fillStyle = `rgba(40,45,50,${weatherCloudAlpha.toFixed(3)})`;
  ctx.fillRect(0, 0, W, H);
}

function renderRain() {
  if (weatherRainDensity < 0.01) return;
  if (interiorState) return;

  // Scale rain count with viewport area relative to base 640x360
  const areaScale = (W * H) / (640 * 360);
  const count = (CFG.WEATHER_RAIN_COUNT * weatherRainDensity * areaScale) | 0;
  const len = CFG.WEATHER_RAIN_LENGTH;
  const windX = CFG.WEATHER_RAIN_WIND * (len / 600); // horizontal offset per streak

  // Fast seeded PRNG from frame time — new positions each frame = falling illusion
  let seed = (now * 13397) & 0xFFFFFF;

  // Batch all streaks into one path for performance
  const alpha = (0.2 + 0.1 * weatherRainDensity).toFixed(2);
  ctx.strokeStyle = `rgba(180,200,220,${alpha})`;
  ctx.lineWidth = 1;
  ctx.beginPath();

  for (let i = 0; i < count; i++) {
    seed = (seed * 16807 + 12345) & 0x7FFFFFFF;
    const x = seed % W;
    seed = (seed * 16807 + 12345) & 0x7FFFFFFF;
    const y = seed % H;
    ctx.moveTo(x, y);
    ctx.lineTo(x + windX, y + len);
  }
  ctx.stroke();
}

// ============================================================
// NIGHT OVERLAY + FIREFLIES
// ============================================================
function punchLight(lctx, sx, sy, radius, intensity) {
  const grad = lctx.createRadialGradient(sx, sy, 0, sx, sy, radius);
  grad.addColorStop(0, `rgba(0,0,0,${intensity})`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  lctx.fillStyle = grad;
  lctx.beginPath(); lctx.arc(sx, sy, radius, 0, Math.PI * 2); lctx.fill();
}

function renderNightOverlay(ox, oy) {
  if (dayNightDarkness < 0.01) return;

  // Interior: sheltered, dimmer darkness with interior light sources
  if (interiorState) {
    const alpha = dayNightDarkness * CFG.NIGHT_MAX_DARK * 0.4; // interiors are sheltered
    const lctx = lightMapCtx;
    lctx.globalCompositeOperation = 'source-over';
    lctx.clearRect(0, 0, W, H);
    lctx.fillStyle = `rgba(10, 10, 40, ${alpha.toFixed(3)})`;
    lctx.fillRect(0, 0, W, H);
    lctx.globalCompositeOperation = 'destination-out';
    // Punch light for interior light sources (campfires, etc.)
    for (const ls of interiorState.map.lightSources) {
      const sx = (ls.tx * CFG.TILE + CFG.TILE / 2 - ox) | 0;
      const sy = (ls.ty * CFG.TILE + CFG.TILE / 2 - oy) | 0;
      const flicker = Math.sin(now / 400) * 5;
      punchLight(lctx, sx, sy, 80 + flicker, 0.9);
    }
    // Ambient interior light at center
    punchLight(lctx, W / 2, H / 2, 100, 0.5);
    lctx.globalCompositeOperation = 'source-over';
    ctx.drawImage(lightMapCanvas, 0, 0);
    return;
  }

  const alpha = dayNightDarkness * CFG.NIGHT_MAX_DARK;
  const lctx = lightMapCtx;

  // Step 1: Fill with dark blue overlay
  lctx.globalCompositeOperation = 'source-over';
  lctx.clearRect(0, 0, W, H);
  lctx.fillStyle = `rgba(10, 10, 40, ${alpha.toFixed(3)})`;
  lctx.fillRect(0, 0, W, H);

  // Step 2: Punch light holes
  lctx.globalCompositeOperation = 'destination-out';

  // Campfires + lanterns from visible chunks
  const CS = CFG.CHUNK, TS = CFG.TILE;
  const minCX = Math.floor(ox / (CS * TS)) - 1, maxCX = Math.ceil((ox + W) / (CS * TS)) + 1;
  const minCY = Math.floor(oy / (CS * TS)) - 1, maxCY = Math.ceil((oy + H) / (CS * TS)) + 1;
  for (let cy2 = minCY; cy2 <= maxCY; cy2++) {
    for (let cx2 = minCX; cx2 <= maxCX; cx2++) {
      const chunk = chunks[cx2 + ',' + cy2];
      if (!chunk) continue;
      // Campfires
      if (chunk.campfirePositions) {
        for (const cp of chunk.campfirePositions) {
          const wx = (cx2 * CS + cp.x) * TS + TS / 2;
          const wy = (cy2 * CS + cp.y) * TS + TS;
          const sx = (wx - ox) | 0, sy = (wy - oy - 4) | 0;
          const flicker = Math.sin(now / 400 + cp.x) * 5;
          punchLight(lctx, sx, sy, 55 + flicker, 0.95);
        }
      }
      // Tents (faint warm glow from inside)
      if (chunk.tentPositions) {
        for (const tp of chunk.tentPositions) {
          const wx = (cx2 * CS + tp.x) * TS + TS * 1.5;
          const wy = (cy2 * CS + tp.y) * TS + TS * 2.5;
          const sx = (wx - ox) | 0, sy = (wy - oy) | 0;
          punchLight(lctx, sx, sy, 28, 0.35);
        }
      }
      // Trailers (faint glow like tents)
      if (chunk.trailerPositions) {
        for (const tp of chunk.trailerPositions) {
          const wx = (cx2 * CS + tp.x) * TS + (tp.w * TS) / 2;
          const wy = (cy2 * CS + tp.y) * TS - (tp.h * TS) / 2;
          const sx = (wx - ox) | 0, sy = (wy - oy) | 0;
          punchLight(lctx, sx, sy, 35, 0.45);
        }
      }
      // Lodge (warm glow from windows)
      if (chunk.lodgePositions) {
        for (const lp of chunk.lodgePositions) {
          const wx = (cx2 * CS + lp.x) * TS + (lp.w * TS) / 2;
          const wy = (cy2 * CS + lp.y) * TS + (lp.h * TS) / 2;
          const sx = (wx - ox) | 0, sy = (wy - oy) | 0;
          punchLight(lctx, sx, sy, 80, 0.6);
        }
      }
    }
  }

  lctx.globalCompositeOperation = 'source-over';

  // Step 3: Composite onto main canvas
  ctx.drawImage(lightMapCanvas, 0, 0);
}

function renderFireflies(ox, oy) {
  if (fireflies.length === 0) return;
  for (const f of fireflies) {
    const sx = (f.x - ox) | 0, sy = (f.y - oy) | 0;
    if (sx < -10 || sx > W + 10 || sy < -10 || sy > H + 10) continue;
    const alpha = (f.life / f.maxLife) * f.brightness;
    const pulse = 0.5 + 0.5 * Math.sin(now / 300 + f.phase);
    const glowAlpha = alpha * pulse;

    // Bright dot only — no aura
    ctx.globalAlpha = glowAlpha;
    ctx.fillStyle = '#ffff88';
    ctx.fillRect(sx, sy, (f.size | 0) || 1, (f.size | 0) || 1);
  }
  ctx.globalAlpha = 1;
}

function drawBear(b, ox, oy) {
  const sx = (b.x - ox) | 0, sy = (b.y - oy) | 0;
  // Use bear.state for swimming — matches updateBear's hysteresis, prevents desync flicker
  const swimming = b.state === 'swim';
  const moving = b.state === 'walk' || b.state === 'sprint' || b.state === 'sneak' || b.state === 'swim';

  ctx.save();
  if (b.hurtTimer > 0 && Math.floor(b.hurtTimer * 10) % 2) ctx.globalAlpha = 0.3;

  // Swimming in deep water — show head + upper body above waterline with ripple
  if (swimming) {
    // Sprite layout: top at sy-80, bottom at sy-16, feet at sy-34, body center ~sy-54
    // Waterline at bear's mid-body: show head + shoulders (~55% of sprite)
    const spriteTop = sy - 80;
    const visibleH = 38; // show top 38px of 64px sprite (head + shoulders + upper body)
    const waterlineY = spriteTop + visibleH; // where the water surface cuts across

    // Water ripple at the waterline
    const bob = Math.sin(now / 400) * 1.5; // gentle bobbing
    ctx.fillStyle = 'rgba(60,140,200,0.3)';
    ctx.beginPath(); ctx.ellipse(sx, waterlineY + bob, 24, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(100,180,220,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(sx, waterlineY + bob, 24, 8, 0, 0, Math.PI*2); ctx.stroke();
    // Smaller inner ripple
    ctx.strokeStyle = 'rgba(150,210,240,0.3)';
    ctx.beginPath(); ctx.ellipse(sx, waterlineY + bob, 16, 5, 0, 0, Math.PI*2); ctx.stroke();

    // Clip sprite to only show above waterline
    ctx.beginPath(); ctx.rect(sx - 40, spriteTop - 4, 80, visibleH + 4 + bob); ctx.clip();
  }

  // 8-direction frame-animated bear from PNG sprite strips
  if (b.climbing) ctx.globalAlpha = 0.5;

  // Resolve direction
  const dir = getBearDir8(b.facingX, b.facingY);

  // Pick strip set: jump > eat > run > walk
  let strip;
  if (b.jumping) {
    strip = BEAR_STRIPS.jump;
  } else if (b.state === 'eat') {
    strip = BEAR_STRIPS.eat;
  } else if (b.state === 'sprint') {
    strip = BEAR_STRIPS.run;
  } else {
    strip = BEAR_STRIPS.walk;
  }

  const sheetKey = strip[dir] || strip['S'];
  const stripImg = SHEETS[sheetKey] && SHEETS[sheetKey].img;

  if (stripImg) {
    // Pick frame from the strip
    const fw = strip.fw, fh = 60; // each frame is 60x60
    const numFrames = strip.frames;
    // Animation speed: walk=0.15s, run=0.1s per frame
    let useFrame;
    if (b.jumping) {
      // Jump: play through animation once based on elapsed time
      const elapsed = (now - b.jumpStart) / 1000;
      useFrame = Math.min(numFrames - 1, Math.floor(elapsed / 0.08));
    } else if (b.state === 'eat') {
      // Eat: play through animation based on elapsed time since eat started
      // For human meat (double duration), slow frames to fill the time
      const elapsed = (now - (b.eatStart || 0)) / 1000;
      const eatSpeed = b.eatTimer > 1.5 ? 0.24 : 0.12; // double frame time for long eats
      useFrame = Math.min(numFrames - 1, Math.floor(elapsed / eatSpeed));
    } else {
      const speed = b.state === 'sprint' ? 0.1 : 0.15;
      const frame = Math.floor(now / (speed * 1000)) % numFrames;
      useFrame = moving ? frame : 0;
    }

    // Draw frame scaled to 64x64, anchored so visual feet align with bear.y
    // Bear body in 60x60 source has feet at ~row 43/60 → 18px dead space below at 64px
    const dw = 64, dh = 64;
    const bx = (sx - (dw >> 1)) | 0;
    // Jump arc — parabolic rise/fall peaking at midpoint of jump
    let jumpOfs = 0;
    if (b.jumping) {
      const t = Math.min(1, (now - b.jumpStart) / (7 * 80)); // 0→1 over jump duration
      const jumpPeak = (dir === 'N' || dir === 'S') ? 7 : 14;
      jumpOfs = Math.sin(t * Math.PI) * jumpPeak; // reduced arc for N/S
    }
    const by = (sy - 16 - dh - jumpOfs) | 0;
    // Ground shadow — direction-aware, fades at night, shrinks during jump
    {
      const nightFade = 1 - dayNightDarkness;
      if (nightFade > 0.02) {
        // Shadow shape varies by facing direction
        let sw = 14, sh = 5, sxOfs = 0;
        switch (dir) {
          case 'E':  sw = 16; sh = 5; sxOfs = -2; break;
          case 'W':  sw = 16; sh = 5; sxOfs = 2;  break;
          case 'N': case 'S': sw = 12; sh = 6; break;
          case 'NE': sw = 14; sh = 5; sxOfs = 1;  break;
          case 'NW': sw = 14; sh = 5; sxOfs = -1; break;
          case 'SE': sw = 14; sh = 5; sxOfs = 1;  break;
          case 'SW': sw = 14; sh = 5; sxOfs = -1; break;
        }
        const baseAlpha = 0.22 * nightFade;
        const jumpAlpha = jumpOfs > 1 ? Math.max(0, 1 - jumpOfs / 16) : 1;
        const jScale = jumpOfs > 1 ? (1 - jumpOfs / 40) : 1;
        ctx.globalAlpha = baseAlpha * jumpAlpha;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse((sx + sxOfs) | 0, (sy - 36) | 0, (sw * jScale) | 0, (sh * jScale) | 0, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
    ctx.drawImage(stripImg, useFrame * fw, 0, fw, fh, bx, by, dw, dh);
  } else {
    // Fallback
    ctx.fillStyle = '#5a3a1e';
    ctx.beginPath(); ctx.ellipse(sx, sy, 10, 7, 0, 0, Math.PI*2); ctx.fill();
  }

  // Attack swipe effects — offset to bear body center
  const swipeY = sy + CFG.BEAR_FOOT_OFS + 8; // slightly above visual feet = body center
  if (b.state === 'light' && b.attackCD > CFG.LIGHT_CD * 0.4) {
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
    ctx.globalAlpha = (b.attackCD / CFG.LIGHT_CD);
    const swR = CFG.LIGHT_RANGE;
    ctx.beginPath();
    ctx.arc(sx + b.facingX * swR * 0.6, swipeY + b.facingY * swR * 0.6, swR * 0.5, b.facing - 0.6, b.facing + 0.6);
    ctx.stroke(); ctx.globalAlpha = 1;
  }
  if (b.state === 'heavy' && b.attackCD > CFG.HEAVY_CD * 0.5) {
    const prog = b.attackCD / CFG.HEAVY_CD;
    ctx.strokeStyle = '#ff6030'; ctx.lineWidth = 3; ctx.globalAlpha = prog;
    const swR = CFG.HEAVY_RANGE;
    ctx.beginPath();
    ctx.arc(sx + b.facingX * swR * 0.5, swipeY + b.facingY * swR * 0.5, swR * 0.7, b.facing - 1.0, b.facing + 1.0);
    ctx.stroke();
    ctx.strokeStyle = '#ffcc80'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(sx + b.facingX * swR * 0.5, swipeY + b.facingY * swR * 0.5, swR * 0.4, b.facing - 0.8, b.facing + 0.8);
    ctx.stroke(); ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawHuman(h, ox, oy) {
  if (h._sheltered) return; // hidden inside shelter at night
  const sx = Math.floor(h.x - ox), sy = Math.floor(h.y - oy);

  // Resolve 8-direction from velocity or last facing
  const moving = Math.abs(h.vx) > 1 || Math.abs(h.vy) > 1;
  let dir8;
  if (moving) {
    // Use getBearDir8 logic for 8 directions from velocity
    const fx = h.vx, fy = h.vy;
    const ax = Math.abs(fx), ay = Math.abs(fy);
    const diag = ax > 0.3 && ay > 0.3;
    if (diag) {
      if (fy > 0 && fx > 0) dir8 = 'SE';
      else if (fy > 0 && fx < 0) dir8 = 'SW';
      else if (fy < 0 && fx > 0) dir8 = 'NE';
      else dir8 = 'NW';
    } else if (ay > ax) {
      dir8 = fy > 0 ? 'S' : 'N';
    } else {
      dir8 = fx > 0 ? 'E' : 'W';
    }
    h._lastDir8 = dir8;
  } else {
    dir8 = h._lastDir8 || 'S';
  }

  // Determine if running (fleeing or investigating at speed > walk)
  const cls = HCLASS[h.classKey];
  const speed = Math.sqrt(h.vx*h.vx + h.vy*h.vy);
  const isRunning = moving && speed > cls.speed * 1.1;

  // Pick the right strip: idle / walk / run
  const fh = 80, fw = 80;
  const dw = 48, dh = 48; // render size — original import scale

  if (!moving) {
    // Idle — use rotations strip (8 frames = 8 directions)
    const idleImg = SHEETS.humanIdle && SHEETS.humanIdle.img;
    if (idleImg) {
      const frameIdx = HUMAN_IDLE_DIR_INDEX[dir8] || 0;
      const bx = (sx - (dw >> 1)) | 0;
      const by = (sy - dh + 12) | 0; // bottom-center anchor, offset for feet
      ctx.drawImage(idleImg, frameIdx * fw, 0, fw, fh, bx, by, dw, dh);
    } else {
      ctx.fillStyle = '#cc9955'; ctx.fillRect(sx-4, sy-6, 8, 12);
    }
  } else {
    // Walk or run animation
    const strip = isRunning ? HUMAN_STRIPS.run : HUMAN_STRIPS.walk;
    const sheetKey = strip[dir8] || strip['S'];
    const stripImg = SHEETS[sheetKey] && SHEETS[sheetKey].img;
    if (stripImg) {
      const numFrames = strip.frames;
      const animSpeed = isRunning ? 0.1 : 0.15; // seconds per frame
      const frame = Math.floor(now / (animSpeed * 1000)) % numFrames;
      const bx = (sx - (dw >> 1)) | 0;
      const by = (sy - dh + 12) | 0;
      ctx.drawImage(stripImg, frame * fw, 0, fw, fh, bx, by, dw, dh);
    } else {
      ctx.fillStyle = '#cc9955'; ctx.fillRect(sx-4, sy-6, 8, 12);
    }
  }

  // Class identifier dot (temporary — for sprite variant planning)
  const classCol = CLASS_COLORS[h.classKey];
  if (classCol) {
    ctx.fillStyle = classCol;
    ctx.beginPath();
    ctx.arc(sx, sy - 38, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // AI state indicator
  const stateInfo = getStateIndicator(h.aiState);
  if (stateInfo) {
    ctx.fillStyle = stateInfo.col;
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(stateInfo.icon, sx, sy - 30);
    ctx.textAlign = 'left';
  }
}

function getStateIndicator(state) {
  switch (state) {
    case 'SUSPICIOUS':    return { icon: '?',  col: '#ffff40' };
    case 'INVESTIGATING': return { icon: '??', col: '#ffa040' };
    case 'ALERT':         return { icon: '!',  col: '#ff4040' };
    case 'PANICKED':      return { icon: '!!', col: '#ff40ff' };
    case 'DEFENSIVE':     return { icon: '!!!',col: '#ff0000' };
    default: return null;
  }
}

function drawDrop(d, ox, oy) {
  const sx = Math.floor(d.x - ox), sy = Math.floor(d.y - oy);
  const bob = 0;
  // Glow
  ctx.fillStyle = 'rgba(255,220,100,0.15)';
  ctx.beginPath();
  ctx.arc(sx, sy + bob, 8, 0, Math.PI*2);
  ctx.fill();
  // Try sprite from FOOD_SPRITE mapping
  const fAtlas = FOOD_SPRITE[d.key];
  if (fAtlas && spritesLoaded) {
    drawSprite(ctx, fAtlas, sx, sy + bob, 0.5, 0.5);
  } else {
    ctx.fillStyle = d.key === 'HUMAN_MEAT' ? '#8a2020' :
                    d.key === 'GARBAGE' ? '#606060' :
                    d.key === 'FISH' ? '#6090b0' :
                    d.key === 'BERRIES' ? '#4040a0' : '#c0a060';
    ctx.fillRect(sx - 3, sy - 3 + bob, 6, 6);
    ctx.fillStyle = '#fff';
    ctx.font = '5px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(d.key.charAt(0), sx, sy + 2 + bob);
    ctx.textAlign = 'left';
  }
}

// ============================================================
// SPRITE-BASED DRAWING — Trees, Bushes, Wildlife
// ============================================================
function isBearBehind(worldX, worldY, spriteH) {
  if (!bear) return false;
  const dx = Math.abs(bear.x - worldX);
  const bearFeet = bear.y + CFG.BEAR_FOOT_OFS + CFG.BEAR_H / 2;
  // Bear is "behind" if its feet are above the object's base but within the sprite height
  return dx < 24 && bearFeet < worldY && bearFeet > worldY - spriteH * 0.7;
}

// ── Bear aura transparency (localized radial fade around bear) ──
// Clip-based: draws sprite in many thin concentric rings with smoothly
// graduated alpha, creating a natural blurred/dithered look.
// Min alpha = 0.50 (bear always at most 50% visible through sprite).
const BEAR_AURA_R = 28;        // outer radius of transparency zone (game pixels)
const BEAR_AURA_RINGS = 8;     // number of rings for smooth gradient
const BEAR_AURA_MIN_A = 0.50;  // minimum sprite alpha at center (never fully transparent)

function drawWithBearAura(ox, oy, sprWorldX, sprWorldY, sprH, sprW, drawCall) {
  // Bear screen position — aim at torso (20px above feet)
  const bsx = bear.x - ox;
  const bsy = (bear.y + CFG.BEAR_FOOT_OFS - 20) - oy;
  const R = BEAR_AURA_R;
  const N = BEAR_AURA_RINGS;
  // 1. Draw full-opacity sprite OUTSIDE the aura circle
  ctx.save();
  ctx.beginPath();
  ctx.rect(bsx - sprW - R, bsy - sprH - R, (sprW + R) * 2, (sprH + R) * 2);
  ctx.arc(bsx, bsy, R, 0, Math.PI * 2, true);
  ctx.clip('evenodd');
  drawCall();
  ctx.restore();
  // 2. Draw N concentric rings from outer edge (full alpha) to center (min alpha)
  //    Alpha eases smoothly: outer rings nearly opaque, inner rings settle at min
  for (let i = 0; i < N; i++) {
    const outerT = i / N;       // 0 = outermost ring
    const innerT = (i + 1) / N; // 1 = center
    const rOuter = R * (1 - outerT);
    const rInner = R * (1 - innerT);
    // Smooth ease-in curve: alpha drops faster near edge, flattens near center
    const t = (outerT + innerT) * 0.5; // midpoint of ring
    const ease = t * t; // quadratic ease-in
    const alpha = 1 - (1 - BEAR_AURA_MIN_A) * ease;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(bsx, bsy, rOuter, 0, Math.PI * 2);
    if (rInner > 0.5) {
      ctx.arc(bsx, bsy, rInner, 0, Math.PI * 2, true);
      ctx.clip('evenodd');
    } else {
      ctx.clip();
    }
    drawCall();
    ctx.restore();
  }
}

function drawTreeSprite(td, ox, oy) {
  const sx = Math.floor(td.worldX - ox), sy = Math.floor(td.worldY - oy);
  const treeIdx = td.hash % ATLAS.trees.length;
  const atlas = ATLAS.trees[treeIdx];
  const stumpIdx = treeIdx < 2 ? 0 : 1;
  const stump = ATLAS.stumpOverlay[stumpIdx];
  const behind = isBearBehind(td.worldX, td.worldY, atlas.h + stump.h);
  const doDraw = () => {
    const baseY = sy + CFG.TILE / 2;
    drawSprite(ctx, stump, sx, baseY, 0.5, 1.0);
    const treeBottomY = baseY - stump.h + 5;
    if (!drawSprite(ctx, atlas, sx + 1, treeBottomY, 0.5, 1.0)) {
      ctx.fillStyle = '#3a2a1a'; ctx.fillRect(sx-3, sy-40, 6, 40);
      ctx.fillStyle = '#1e5a12'; ctx.beginPath(); ctx.arc(sx, sy-40, 16, 0, Math.PI*2); ctx.fill();
    }
  };
  if (behind) drawWithBearAura(ox, oy, td.worldX, td.worldY, atlas.h + stump.h, atlas.w, doDraw);
  else doDraw();
}

function drawLargeTreeSprite(td, ox, oy) {
  const sx = Math.floor(td.worldX - ox), sy = Math.floor(td.worldY - oy);
  const scale = CFG.LARGE_TREE_SCALE;
  const treeIdx = td.hash % ATLAS.trees.length;
  const atlas = ATLAS.trees[treeIdx];
  const stumpIdx = treeIdx < 2 ? 0 : 1;
  const stump = ATLAS.stumpOverlay[stumpIdx];
  const sw = Math.floor(stump.w * scale), sh = Math.floor(stump.h * scale);
  const tw = Math.floor(atlas.w * scale), th = Math.floor(atlas.h * scale);
  const behind = isBearBehind(td.worldX, td.worldY, th + sh);
  const doDraw = () => {
    const baseY = sy + CFG.TILE / 2;
    const stumpImg = SHEETS[stump.sheet] && SHEETS[stump.sheet].img;
    if (stumpImg) {
      ctx.drawImage(stumpImg, stump.x, stump.y, stump.w, stump.h,
        (sx - sw/2) | 0, (baseY - sh) | 0, sw, sh);
    }
    const treeBottomY = baseY - sh + Math.floor(5 * scale);
    const treeImg = SHEETS[atlas.sheet] && SHEETS[atlas.sheet].img;
    if (treeImg) {
      ctx.drawImage(treeImg, atlas.x, atlas.y, atlas.w, atlas.h,
        (sx + 1 - tw/2) | 0, (treeBottomY - th) | 0, tw, th);
    } else {
      ctx.fillStyle = '#3a2a1a'; ctx.fillRect(sx-4, sy-60, 8, 60);
      ctx.fillStyle = '#1e5a12'; ctx.beginPath(); ctx.arc(sx, sy-60, 24, 0, Math.PI*2); ctx.fill();
    }
  };
  if (behind) drawWithBearAura(ox, oy, td.worldX, td.worldY, th + sh, tw, doDraw);
  else doDraw();
}

function draw2x2Sprite(atlas, worldX, worldY, ox, oy) {
  // 2x2 sprites: base centered at bottom of 2-tile block
  // worldX is left tile center, worldY is top tile bottom
  // Horizontal center = worldX + TILE/2 (center of 2 tiles)
  // Vertical base = worldY + TILE (bottom of 2nd tile row)
  const cx2 = ((worldX + CFG.TILE/2 - ox) | 0); // center of 2-tile width
  const by2 = ((worldY + CFG.TILE - oy) | 0);     // bottom of 2-tile height
  const img = SHEETS[atlas.sheet] && SHEETS[atlas.sheet].img;
  if (img) ctx.drawImage(img, atlas.x, atlas.y, atlas.w, atlas.h,
    (cx2 - (atlas.w >> 1)) | 0, (by2 - atlas.h) | 0, atlas.w, atlas.h);
  return !!img;
}

function drawFernSprite(fd, ox, oy) {

function drawGoreSprite(gd, ox, oy) {

function drawCampfireAnim(cf, ox, oy) {
  const sx = Math.floor(cf.worldX - ox), sy = Math.floor(cf.worldY - oy) + 6;
  // Campfire base sprite — shifted down 6px for tile alignment
  drawSprite(ctx, ATLAS.campfireBase, sx, sy, 0.5, 1.0);
  // Fire animation on top — 4 frames cycling, also shifted down 6px
  const frame = Math.floor(now / 150) % ATLAS.fire.length;
  drawSprite(ctx, ATLAS.fire[frame], sx, sy - 6, 0.5, 1.0);
  // Smoke rising above fire — 7 frames, slower
  const smokeFrame = Math.floor(now / 200) % ATLAS.smoke.length;
  drawSprite(ctx, ATLAS.smoke[smokeFrame], sx, sy - 18, 0.5, 1.0);
  // Light aura glow — intensifies at night
  ctx.save();
  const nightBoost = 1 + dayNightDarkness * 1.5;
  const glowR = (30 + Math.sin(now / 400) * 5) * nightBoost;
  const glowA = Math.min(0.15 * nightBoost, 0.5);
  const grad = ctx.createRadialGradient(sx, sy - 4, 2, sx, sy - 4, glowR);
  grad.addColorStop(0, `rgba(255,160,40,${glowA.toFixed(2)})`);
  grad.addColorStop(1, 'rgba(255,100,20,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(sx, sy - 4, glowR, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawBoneSprite(bd, ox, oy) {

function drawBloodStain(bs, ox, oy) {
  const sx = Math.floor(bs.x - ox), sy = Math.floor(bs.y - oy);
  const fadeAlpha = Math.min(0.75, 0.75 * (bs.life / bs.maxLife));
  // Grow from 16x16 to 32x32 over ~8 seconds
  const growT = Math.min(1, (bs.age || 0) / 8);
  const sz = (16 + 16 * growT) | 0; // current pool size in pixels
  const half = sz >> 1;
  ctx.save();
  ctx.globalAlpha = fadeAlpha;
  // Pixel-art blood pool: define rows as horizontal spans from center
  // Each row has a width ratio based on an irregular oval shape
  // Use a seeded pattern so each pool looks slightly different
  const seed = ((bs.x * 73 + bs.y * 37) >>> 0) % 100;
  const rows = [
    0.00, 0.20, 0.40, 0.55, 0.70, 0.80, 0.88, 0.94,
    1.00, 1.00, 0.96, 0.90, 0.82, 0.72, 0.58, 0.38,
  ];
  // Dark outer blood
  ctx.fillStyle = '#4a0c0c';
  for (let r = 0; r < rows.length; r++) {
    const t = r / (rows.length - 1); // 0..1 top to bottom
    const rowScale = rows[r] * growT;
    if (rowScale <= 0) continue;
    const rw = Math.max(1, (half * rowScale) | 0);
    const ry = (sy - half + (r * sz / rows.length)) | 0;
    // Offset odd rows slightly for irregular edge
    const jitter = ((seed + r * 7) % 3) - 1;
    ctx.fillRect(sx - rw + jitter, ry, rw * 2, (sz / rows.length + 1) | 0);
  }
  // Mid-tone inner pool (slightly smaller)
  ctx.fillStyle = '#5a1010';
  const innerScale = 0.7;
  for (let r = 2; r < rows.length - 2; r++) {
    const rowScale = rows[r] * growT * innerScale;
    if (rowScale <= 0) continue;
    const rw = Math.max(1, (half * rowScale) | 0);
    const ry = (sy - half + (r * sz / rows.length)) | 0;
    ctx.fillRect(sx - rw, ry, rw * 2, (sz / rows.length + 1) | 0);
  }
  // Bright wet center highlight (fresh blood sheen)
  if (bs.age < 30) {
    const sheen = Math.max(0, 1 - (bs.age || 0) / 30);
    ctx.globalAlpha = fadeAlpha * sheen * 0.4;
    ctx.fillStyle = '#8a2020';
    const cw = Math.max(1, (half * 0.35 * growT) | 0);
    const ch = Math.max(1, (half * 0.25 * growT) | 0);
    ctx.fillRect(sx - cw, sy - ch, cw * 2, ch * 2);
  }
  ctx.restore();
}

function drawLanternSprite(ld, ox, oy) {
  const sx = Math.floor(ld.worldX - ox), sy = Math.floor(ld.worldY - oy);
  drawSprite(ctx, ATLAS.lantern, sx, sy, 0.5, 1.0);
  // Lantern glow — intensifies at night
  ctx.save();
  const lnBoost = 1 + dayNightDarkness * 1.5;
  const glowR = (24 + Math.sin(now / 500) * 3) * lnBoost;
  const lnA = Math.min(0.12 * lnBoost, 0.4);
  const grad = ctx.createRadialGradient(sx, sy - 8, 1, sx, sy - 8, glowR);
  grad.addColorStop(0, `rgba(255,200,80,${lnA.toFixed(2)})`);
  grad.addColorStop(1, 'rgba(255,150,40,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(sx, sy - 8, glowR, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawLodgeSprite(ld, ox, oy) {

function drawTrailerSprite(td, ox, oy) {

function drawPicnicBench(pb, ox, oy) {

  const a = ATLAS.picnicBench;

}

  const dx = (sx - (a.w >> 1)) | 0, dy = (sy - a.h) | 0;

function drawSplashAnim(sd, ox, oy) {
