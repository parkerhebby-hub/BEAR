let spritesLoaded = false;

function loadAllSprites() {
  return new Promise(resolve => {
    const entries = Object.values(SHEETS);
    let rem = entries.length;
    for (const e of entries) {
      const img = new Image();
      img.onload = () => { e.img = img; if (--rem === 0) { spritesLoaded = true; resolve(); } };
      img.onerror = () => { console.warn('Sprite fail:', e.src); if (--rem === 0) { spritesLoaded = true; resolve(); } };
      img.src = e.src;
    }
  });
}

function sliceBearPaw() {
  // Create darkened 64x64 variants for each paw piece (depressed/active state)
  for (const key of PAW_KEYS) {
    const img = SHEETS[key] && SHEETS[key].img;
    if (!img) continue;
    const dc = document.createElement('canvas');
    dc.width = 64; dc.height = 64;
    const dx = dc.getContext('2d');
    dx.imageSmoothingEnabled = false;
    dx.drawImage(img, 0, 0);
    dx.globalCompositeOperation = 'source-atop';
    dx.fillStyle = 'rgba(0,0,0,0.45)';
    dx.fillRect(0, 0, 64, 64);
    PAW_DARK[key] = dc;
  }
}

function drawSprite(target, atlas, sx, sy, ax, ay) {
  const s = SHEETS[atlas.sheet];
  if (!s || !s.img) return false;
  // Bitwise OR to force integer pixels — prevents sub-pixel blur on all sprites
  target.drawImage(s.img, atlas.x, atlas.y, atlas.w, atlas.h,
    (sx - (atlas.w * ax)) | 0, (sy - (atlas.h * ay)) | 0, atlas.w, atlas.h);
  return true;
}

function spriteVar(wtx, wty, count, salt) {
  return (((wtx * 73856093) ^ (wty * 19349669) ^ (salt || 0)) >>> 0) % count;
}

// ============================================================
// DYNAMIC AMBIENT MUSIC SYSTEM
// ============================================================
//
// Architecture:
//   1. Ring Detection — determines which zone the bear is in, with hysteresis
//   2. Music State Machine — handles delayed playback, fades, crossfades, silence
//   3. Audio Engine — manages Web Audio nodes for smooth gain control
//
// Flow:
//   silence → (random delay) → fade-in ring track → playing →
//   (track ends OR ring change) → fade-out / crossfade → silence → repeat
//

// ── Audio Engine ────────────────────────────────────────────
// Lazy-initialized on first user interaction (browsers require gesture for AudioContext)
let audioCtx = null;           // Web AudioContext (created on first interaction)
let audioUnlocked = false;     // whether AudioContext has been unlocked by user gesture

// ── Sound Perception System ───────────────────────────────────
const soundWaves = [];         // active waves: { x, y, radius, maxRadius, color, alpha, speed, born }
let soundIndicators = [];      // populated each frame: { angle, dist, normDist, color, strength, time }
let focusListening = false;    // Tab toggle
let focusVignette = 0;         // 0→1 for vignette fade-in

// ── Master Bus Gain Nodes ──────────────────────────────────
// All audio routes through one of these buses so sliders can control volume
let busMusicGain  = null;      // music bus (ring tracks + ambient forest)
let busSFXGain    = null;      // SFX bus (footsteps, attack sounds)
let busAmbientGain = null;     // ambient bus (river, fire, wind)

// User-adjustable volumes (0-1), persisted to localStorage
let volMusic   = parseFloat(localStorage.getItem('vol_music')   ?? '0.8');
let volSFX     = parseFloat(localStorage.getItem('vol_sfx')     ?? '0.8');
let volAmbient = parseFloat(localStorage.getItem('vol_ambient') ?? '0.8');

// Slider drag state for pause menu
let pauseSliderDragging = null; // 'music' | 'sfx' | 'ambient' | null
let pauseGodModeBtn = null;     // { x, y, w, h } hit zone for god mode checkbox

// Active music channel(s) — supports two for crossfading
// Each channel: { source, gainNode, audio, track, volume }
let musicA = null;             // primary music channel
let musicB = null;             // secondary channel (used during crossfade)

// ── Ring Detection State ────────────────────────────────────
let musicCurrentRing = 0;      // the ring music is currently playing for (0 = none)
let musicDetectedRing = 0;     // the ring the bear is physically in right now
let musicRingTimer = 0;        // seconds the bear has been in musicDetectedRing continuously
let musicStableRing = 0;       // ring confirmed as stable (after MUSIC_RING_SETTLE)

// ── Music State Machine ─────────────────────────────────────
// States: 'SILENT' → 'WAITING' → 'FADING_IN' → 'PLAYING' → 'FADING_OUT' → 'SILENT'
//         During ring change while playing: 'CROSSFADING' → 'PLAYING'
let musicState = 'SILENT';     // current state
let musicSilenceTimer = 0;     // countdown during WAITING state (random delay)
let musicFadeProgress = 0;     // 0-1 progress through current fade
let musicFadeDuration = 0;     // duration of current fade in seconds

// ── Audio Engine Functions ──────────────────────────────────

// Initialize AudioContext on first user gesture
function initAudioContext() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Create master bus gain nodes
    busMusicGain = audioCtx.createGain();
    busMusicGain.gain.value = volMusic;
    busMusicGain.connect(audioCtx.destination);

    busSFXGain = audioCtx.createGain();
    busSFXGain.gain.value = volSFX;
    busSFXGain.connect(audioCtx.destination);

    busAmbientGain = audioCtx.createGain();
    busAmbientGain.gain.value = volAmbient;
    busAmbientGain.connect(audioCtx.destination);

    audioUnlocked = true;
    preloadSFX();
  } catch (e) {
    console.warn('Web Audio not supported:', e);
  }
}

// Create a music channel: loads audio, connects through gain node
function createMusicChannel(trackPath) {
  if (!audioCtx) return null;
  const audio = new Audio(trackPath);
  audio.crossOrigin = 'anonymous';
  audio.loop = false; // we manage looping/silence ourselves
  const source = audioCtx.createMediaElementSource(audio);
  const gainNode = audioCtx.createGain();
  gainNode.gain.value = 0; // start silent, we fade in
  source.connect(gainNode);
  gainNode.connect(busMusicGain || audioCtx.destination);
  return { source, gainNode, audio, track: trackPath, volume: 0 };
}

// Set channel volume (0-1, scaled by master volume)
function setChannelVolume(channel, vol) {
  if (!channel) return;
  channel.volume = vol;
  channel.gainNode.gain.value = vol * CFG.MUSIC_VOLUME;
}

// Stop and clean up a channel
function destroyMusicChannel(channel) {
  if (!channel) return;
  try {
    channel.audio.pause();
    channel.audio.currentTime = 0;
    channel.source.disconnect();
    channel.gainNode.disconnect();
  } catch (e) { /* ignore cleanup errors */ }
}

// ── Ring Detection ──────────────────────────────────────────

function updateMusicRingDetection(dt) {
  if (!bear) return;
  // Get bear's current ring/zone
  const cx = Math.floor(bear.x / (CFG.TILE * CFG.CHUNK));
  const cy = Math.floor(bear.y / (CFG.TILE * CFG.CHUNK));
  const info = getZoneInfo(cx, cy);
  const currentRing = info.zone;

  if (currentRing === musicDetectedRing) {
    // Bear is still in the same ring — accumulate stability time
    musicRingTimer += dt;
  } else {
    // Bear entered a different ring — reset stability timer
    musicDetectedRing = currentRing;
    musicRingTimer = 0;
  }

  // Only update stable ring after bear has been there long enough (hysteresis)
  if (musicRingTimer >= CFG.MUSIC_RING_SETTLE) {
    musicStableRing = musicDetectedRing;
  }
}

// ── Music State Machine ─────────────────────────────────────

function updateMusicSystem(dt) {
  // Don't run music system until audio is unlocked
  if (!audioCtx || !audioUnlocked) return;
  // Don't run during interiors
  if (interiorState) {
    // Fade out if playing inside a cabin
    if (musicState === 'PLAYING' || musicState === 'FADING_IN') {
      musicState = 'FADING_OUT';
      musicFadeProgress = 0;
      musicFadeDuration = CFG.MUSIC_FADE_OUT;
    }
    return;
  }

  // Update ring detection
  updateMusicRingDetection(dt);

  switch (musicState) {
    // ── SILENT: no music, nothing queued ──
    case 'SILENT':
      // Transition to WAITING with a random delay
      musicState = 'WAITING';
      musicSilenceTimer = CFG.MUSIC_DELAY_MIN +
        Math.random() * (CFG.MUSIC_DELAY_MAX - CFG.MUSIC_DELAY_MIN);
      break;

    // ── WAITING: counting down silence before next track ──
    case 'WAITING':
      musicSilenceTimer -= dt;
      if (musicSilenceTimer <= 0 && musicStableRing > 0) {
        // Time to play — randomly pick a track for the current stable ring
        const tracks = CFG.MUSIC_TRACKS[musicStableRing];
        if (!tracks || !tracks.length) { musicState = 'SILENT'; break; }
        const trackPath = tracks[Math.floor(Math.random() * tracks.length)];

        musicA = createMusicChannel(trackPath);
        if (!musicA) { musicState = 'SILENT'; break; }

        musicCurrentRing = musicStableRing;
        musicA.audio.play().catch(() => {}); // autoplay may fail silently
        musicState = 'FADING_IN';
        musicFadeProgress = 0;
        musicFadeDuration = CFG.MUSIC_FADE_IN;
      }
      break;

    // ── FADING_IN: track is playing, volume ramping up ──
    case 'FADING_IN':
      musicFadeProgress = Math.min(1, musicFadeProgress + dt / musicFadeDuration);
      setChannelVolume(musicA, smoothstep(musicFadeProgress));

      if (musicFadeProgress >= 1) {
        musicState = 'PLAYING';
      }
      // Check if ring changed during fade-in
      if (musicStableRing !== musicCurrentRing && musicStableRing > 0) {
        startCrossfade();
      }
      // Check if track ended during fade-in
      if (musicA && musicA.audio.ended) {
        musicState = 'FADING_OUT';
        musicFadeProgress = 0;
        musicFadeDuration = CFG.MUSIC_FADE_OUT;
      }
      break;

    // ── PLAYING: track is at full volume ──
    case 'PLAYING':
      // Check if the track has ended naturally
      if (musicA && musicA.audio.ended) {
        musicState = 'FADING_OUT';
        musicFadeProgress = 0;
        musicFadeDuration = CFG.MUSIC_FADE_OUT;
        break;
      }
      // Check if ring changed — initiate crossfade
      if (musicStableRing !== musicCurrentRing && musicStableRing > 0) {
        startCrossfade();
      }
      break;

    // ── CROSSFADING: old track fading out, new track fading in ──
    case 'CROSSFADING':
      musicFadeProgress = Math.min(1, musicFadeProgress + dt / musicFadeDuration);
      const t = smoothstep(musicFadeProgress);
      // Old track (musicB) fades out, new track (musicA) fades in
      setChannelVolume(musicB, 1 - t);
      setChannelVolume(musicA, t);

      if (musicFadeProgress >= 1) {
        // Crossfade complete — destroy old channel
        destroyMusicChannel(musicB);
        musicB = null;
        musicState = 'PLAYING';
      }
      // If the new track ends during crossfade, just fade everything out
      if (musicA && musicA.audio.ended) {
        destroyMusicChannel(musicB);
        musicB = null;
        musicState = 'FADING_OUT';
        musicFadeProgress = 0;
        musicFadeDuration = CFG.MUSIC_FADE_OUT;
      }
      break;

    // ── FADING_OUT: track ending, volume ramping down ──
    case 'FADING_OUT':
      musicFadeProgress = Math.min(1, musicFadeProgress + dt / musicFadeDuration);
      setChannelVolume(musicA, 1 - smoothstep(musicFadeProgress));
      if (musicB) setChannelVolume(musicB, 0); // ensure secondary is silent

      if (musicFadeProgress >= 1) {
        // Fade complete — clean up and enter silence + cooldown
        destroyMusicChannel(musicA);
        destroyMusicChannel(musicB);
        musicA = null;
        musicB = null;
        musicCurrentRing = 0;
        musicState = 'WAITING';
        // Apply cooldown on top of normal random delay
        musicSilenceTimer = CFG.MUSIC_COOLDOWN +
          CFG.MUSIC_DELAY_MIN + Math.random() * (CFG.MUSIC_DELAY_MAX - CFG.MUSIC_DELAY_MIN);
      }
      break;
  }
}

// ── Crossfade Helper ────────────────────────────────────────

function startCrossfade() {
  const tracks = CFG.MUSIC_TRACKS[musicStableRing];
  if (!tracks || !tracks.length) return;
  const newTrackPath = tracks[Math.floor(Math.random() * tracks.length)];

  // Move current track to channel B (fading out)
  destroyMusicChannel(musicB); // clean up any existing B
  musicB = musicA;

  // Create new track on channel A (fading in)
  musicA = createMusicChannel(newTrackPath);
  if (!musicA) {
    // Failed to create — just fade out old track
    musicA = musicB;
    musicB = null;
    musicState = 'FADING_OUT';
    musicFadeProgress = 0;
    musicFadeDuration = CFG.MUSIC_FADE_OUT;
    return;
  }

  musicCurrentRing = musicStableRing;
  musicA.audio.play().catch(() => {});
  musicState = 'CROSSFADING';
  musicFadeProgress = 0;
  musicFadeDuration = CFG.MUSIC_CROSSFADE;
}

// Smoothstep for natural-feeling fades (same as day/night uses)
function smoothstep(t) {
  return t * t * (3 - 2 * t);
}

// ── Music System Reset ──────────────────────────────────────

function resetMusicSystem() {
  destroyMusicChannel(musicA);
  destroyMusicChannel(musicB);
  musicA = null;
  musicB = null;
  musicCurrentRing = 0;
  musicDetectedRing = 0;
  musicRingTimer = 0;
  musicStableRing = 0;
  musicState = 'SILENT';
  musicSilenceTimer = 0;
  musicFadeProgress = 0;
  musicFadeDuration = 0;
}

// ── Unlock Audio on First User Interaction ──────────────────
// Browsers require a user gesture before AudioContext can play.
// We hook into the first click/keydown to initialize.
function unlockAudio() {
  if (audioUnlocked) return;
  initAudioContext();
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

// ============================================================
// SPATIAL AMBIENT AUDIO SYSTEM
// ============================================================
//
// Architecture:
//   1. Ambient Channels — looping audio sources with gain nodes
//   2. Distance Calculation — per-frame distance to rivers, campfires, etc.
//   3. Volume Smoothing — lerp volumes to prevent pops and clicks
//
// Sound sources:
//   - River: uses getStreamAt() for distance to nearest procedural stream
//   - Campfire: scans nearby chunks for campfirePositions, finds closest
//   - Wind: always-on subtle background, slight volume variation
//

// ── Ambient Channel Pool ────────────────────────────────────
// Each channel: { audio, source, gainNode, currentVol, targetVol, playing }
let ambRiver = null;       // river/water loop
let ambFire  = null;       // campfire crackle loop
let ambWind  = null;       // wind loop
let ambTalking = null;     // campsite people talking loop
let ambientInitialized = false;

// Create a looping ambient channel (shares audioCtx with music system)
function createAmbientChannel(filePath) {
  if (!audioCtx || !filePath) return null;
  const audio = new Audio(filePath);
  audio.crossOrigin = 'anonymous';
  audio.loop = true;        // ambient sounds loop forever
  audio.preload = 'auto';
  const source = audioCtx.createMediaElementSource(audio);
  const gainNode = audioCtx.createGain();
  gainNode.gain.value = 0;  // start silent
  source.connect(gainNode);
  gainNode.connect(busAmbientGain || audioCtx.destination);
  return {
    audio, source, gainNode,
    currentVol: 0,           // current smoothed volume (0-1)
    targetVol: 0,            // target volume this frame (0-1)
    playing: false,          // whether audio element is playing
  };
}

// Initialize all ambient channels (called once after audioCtx is ready)
function initAmbientAudio() {
  if (ambientInitialized || !audioCtx) return;
  ambRiver   = createAmbientChannel(CFG.AMBIENT_RIVER_FILE);
  ambFire    = createAmbientChannel(CFG.AMBIENT_FIRE_FILE);
  ambWind    = createAmbientChannel(CFG.AMBIENT_WIND_FILE);
  ambTalking = createAmbientChannel(CFG.AMBIENT_TALKING_FILE);
  ambientInitialized = true;
}

// ── Distance Helpers ────────────────────────────────────────

// River distance: uses existing getStreamAt() which returns distance in tiles
function getRiverDistance() {
  if (!bear) return 9999;
  const tx = Math.floor(bear.x / CFG.TILE);
  const ty = Math.floor(bear.y / CFG.TILE);
  return getStreamAt(tx, ty); // distance in tiles to nearest stream
}

// Campfire distance: scan nearby chunks, find closest campfire in world pixels
function getClosestCampfireDistance() {
  if (!bear) return 9999;
  const TS = CFG.TILE, CS = CFG.CHUNK;
  const bcx = Math.floor(bear.x / (TS * CS));
  const bcy = Math.floor(bear.y / (TS * CS));
  const range = CFG.AMBIENT_UPDATE_RANGE;
  let minDist = 9999;

  // Only scan chunks within update range
  for (let dy = -range; dy <= range; dy++) {
    for (let dx = -range; dx <= range; dx++) {
      const ck = chunkKey(bcx + dx, bcy + dy);
      const ch = chunks[ck];
      if (!ch || !ch.campfirePositions) continue;
      for (const cf of ch.campfirePositions) {
        const wx = ((bcx + dx) * CS + cf.x) * TS + (TS >> 1);
        const wy = ((bcy + dy) * CS + cf.y) * TS + (TS >> 1);
        const ddx = bear.x - wx, ddy = bear.y - wy;
        const dist = Math.sqrt(ddx * ddx + ddy * ddy);
        if (dist < minDist) minDist = dist;
      }
    }
  }
  return minDist;
}

// ── Volume Computation ──────────────────────────────────────

// Compute target volume given distance and radius params
// Uses quadratic falloff: volume = baseVol * (1 - t)^2
function computeSpatialVolume(distance, minR, maxR, baseVol) {
  if (distance >= maxR) return 0;
  if (distance <= minR) return baseVol;
  const t = (distance - minR) / (maxR - minR);
  return baseVol * (1 - t) * (1 - t); // quadratic falloff
}

// ── Channel Volume Update ───────────────────────────────────

// Smoothly lerp channel volume toward target, apply gain
function updateChannelVolume(channel, dt) {
  if (!channel) return;
  const speed = CFG.AMBIENT_LERP_SPEED;

  // Lerp current toward target
  const diff = channel.targetVol - channel.currentVol;
  if (Math.abs(diff) < 0.001) {
    channel.currentVol = channel.targetVol;
  } else {
    channel.currentVol += diff * Math.min(1, speed * dt);
  }

  // Apply master volume and set gain
  const finalVol = channel.currentVol * CFG.AMBIENT_MASTER;
  channel.gainNode.gain.value = finalVol;

  // Auto-play/pause to save resources when silent
  if (channel.currentVol > 0.001 && !channel.playing) {
    channel.audio.play().catch(() => {});
    channel.playing = true;
  } else if (channel.currentVol < 0.001 && channel.playing) {
    // Don't pause immediately — keep playing so it resumes smoothly
    // Only pause if silent for a while (handled by browser efficiently)
  }
}

// ── Main Ambient Update ─────────────────────────────────────

function updateAmbientAudio(dt) {
  if (!audioCtx || !audioUnlocked) return;
  if (!ambientInitialized) initAmbientAudio();
  if (!bear) return;

  // Don't play ambient sounds in interiors
  if (interiorState) {
    if (ambRiver)   ambRiver.targetVol = 0;
    if (ambFire)    ambFire.targetVol = 0;
    if (ambWind)    ambWind.targetVol = 0;
    if (ambTalking) ambTalking.targetVol = 0;
    updateChannelVolume(ambRiver, dt);
    updateChannelVolume(ambFire, dt);
    updateChannelVolume(ambWind, dt);
    updateChannelVolume(ambTalking, dt);
    return;
  }

  // ── River volume ──
  if (ambRiver) {
    const riverDist = getRiverDistance(); // in tiles
    ambRiver.targetVol = computeSpatialVolume(
      riverDist,
      CFG.AMBIENT_RIVER_MIN_R,
      CFG.AMBIENT_RIVER_MAX_R,
      CFG.AMBIENT_RIVER_VOL
    );
    // Slight random flutter to prevent looping fatigue (±3%)
    ambRiver.targetVol *= 0.97 + Math.sin(now / 2000) * 0.03;
  }

  // ── Campfire volume ──
  if (ambFire) {
    const fireDist = getClosestCampfireDistance(); // in world pixels
    ambFire.targetVol = computeSpatialVolume(
      fireDist,
      CFG.AMBIENT_FIRE_MIN_R,
      CFG.AMBIENT_FIRE_MAX_R,
      CFG.AMBIENT_FIRE_VOL
    );
    // Crackle variation — faster flutter for fire
    ambFire.targetVol *= 0.94 + Math.sin(now / 800) * 0.04 + Math.sin(now / 1300) * 0.02;
  }

  // ── Wind volume ──
  if (ambWind) {
    // Wind is always present but subtly varies over time
    const windBase = CFG.AMBIENT_WIND_VOL;
    // Slow drift: wind swells and fades over ~30s cycles
    const windSwell = 0.6 + 0.4 * (
      Math.sin(now / 15000) * 0.5 +
      Math.sin(now / 23000 + 1.7) * 0.3 +
      Math.sin(now / 7000 + 0.5) * 0.2
    );
    ambWind.targetVol = windBase * windSwell;
    // Slightly louder wind at night (eerie atmosphere)
    ambWind.targetVol *= 1 + dayNightDarkness * 0.3;
  }

  // ── Campsite people talking volume ──
  if (ambTalking) {
    const talkDist = getClosestCampfireDistance(); // people gather near campfires
    ambTalking.targetVol = computeSpatialVolume(
      talkDist,
      CFG.AMBIENT_TALKING_MIN_R,
      CFG.AMBIENT_TALKING_MAX_R,
      CFG.AMBIENT_TALKING_VOL
    );
    // Slight chatter variation
    ambTalking.targetVol *= 0.92 + Math.sin(now / 3000) * 0.05 + Math.sin(now / 5000) * 0.03;
    // Quieter at night (people sleeping)
    ambTalking.targetVol *= 1 - dayNightDarkness * 0.7;
  }

  // ── Clamp total ambient volume ──
  const totalTarget = (ambRiver ? ambRiver.targetVol : 0) +
                      (ambFire ? ambFire.targetVol : 0) +
                      (ambWind ? ambWind.targetVol : 0) +
                      (ambTalking ? ambTalking.targetVol : 0);
  if (totalTarget > CFG.AMBIENT_MAX_TOTAL) {
    const scale = CFG.AMBIENT_MAX_TOTAL / totalTarget;
    if (ambRiver)   ambRiver.targetVol *= scale;
    if (ambFire)    ambFire.targetVol *= scale;
    if (ambWind)    ambWind.targetVol *= scale;
    if (ambTalking) ambTalking.targetVol *= scale;
  }

  // ── Smooth all channels ──
  updateChannelVolume(ambRiver, dt);
  updateChannelVolume(ambFire, dt);
  updateChannelVolume(ambWind, dt);
  updateChannelVolume(ambTalking, dt);
}

// ── Ambient Audio Reset ─────────────────────────────────────

function resetAmbientAudio() {
  if (ambRiver)   { ambRiver.currentVol = 0;   ambRiver.targetVol = 0;   ambRiver.gainNode.gain.value = 0; }
  if (ambFire)    { ambFire.currentVol = 0;    ambFire.targetVol = 0;    ambFire.gainNode.gain.value = 0; }
  if (ambWind)    { ambWind.currentVol = 0;    ambWind.targetVol = 0;    ambWind.gainNode.gain.value = 0; }
  if (ambTalking) { ambTalking.currentVol = 0; ambTalking.targetVol = 0; ambTalking.gainNode.gain.value = 0; }
}

// ============================================================
// AMBIENT FOREST SYSTEM (always-playing background layer)
// ============================================================
// Four looping tracks: day/night × clear/rain.
// Crossfades between them based on dayNightDarkness and weatherState.

let forestA = null;            // currently audible forest channel
let forestB = null;            // channel fading out during crossfade
let forestCurrentKey = null;   // 'DAY_CLEAR' | 'DAY_RAIN' | 'NIGHT_CLEAR' | 'NIGHT_RAIN'
let forestFadeProgress = 0;    // 0-1 crossfade progress
let forestFading = false;      // whether a crossfade is in progress
let forestInitialized = false;

function createForestChannel(key) {
  if (!audioCtx) return null;
  const path = CFG.FOREST_TRACKS[key];
  if (!path) return null;
  const audio = new Audio(path);
  audio.crossOrigin = 'anonymous';
  audio.loop = true;
  audio.preload = 'auto';
  const source = audioCtx.createMediaElementSource(audio);
  const gainNode = audioCtx.createGain();
  gainNode.gain.value = 0;
  source.connect(gainNode);
  gainNode.connect(busAmbientGain || audioCtx.destination);
  return { audio, source, gainNode, key };
}

function destroyForestChannel(ch) {
  if (!ch) return;
  try { ch.audio.pause(); ch.audio.src = ''; } catch(e) {}
  try { ch.gainNode.disconnect(); } catch(e) {}
  try { ch.source.disconnect(); } catch(e) {}
}

function getForestKey() {
  const isNight = dayNightDarkness > 0.5;
  const isRain = weatherState === 'RAIN';
  if (isNight) return isRain ? 'NIGHT_RAIN' : 'NIGHT_CLEAR';
  return isRain ? 'DAY_RAIN' : 'DAY_CLEAR';
}

function initForestAudio() {
  if (forestInitialized || !audioCtx) return;
  const key = getForestKey();
  forestA = createForestChannel(key);
  forestCurrentKey = key;
  if (forestA) {
    forestA.gainNode.gain.value = CFG.FOREST_VOLUME;
    forestA.audio.play().catch(() => {});
  }
  forestInitialized = true;
}

function updateForestAudio(dt) {
  if (!audioCtx || !audioUnlocked) return;
  if (!forestInitialized) initForestAudio();

  const targetKey = getForestKey();

  // Start crossfade if target changed and not already fading
  if (targetKey !== forestCurrentKey && !forestFading) {
    forestFading = true;
    forestFadeProgress = 0;
    // Move current to B (fading out), create new A
    destroyForestChannel(forestB);
    forestB = forestA;
    forestA = createForestChannel(targetKey);
    forestCurrentKey = targetKey;
    if (forestA) {
      forestA.gainNode.gain.value = 0;
      forestA.audio.play().catch(() => {});
    }
  }

  // Process crossfade
  if (forestFading) {
    forestFadeProgress += dt / CFG.FOREST_CROSSFADE;
    if (forestFadeProgress >= 1) {
      forestFadeProgress = 1;
      forestFading = false;
      destroyForestChannel(forestB);
      forestB = null;
    }
    const t = forestFadeProgress;
    const smooth = t * t * (3 - 2 * t); // smoothstep
    if (forestA) forestA.gainNode.gain.value = smooth * CFG.FOREST_VOLUME;
    if (forestB) forestB.gainNode.gain.value = (1 - smooth) * CFG.FOREST_VOLUME;
  } else {
    // Steady state — keep A at full volume
    if (forestA) forestA.gainNode.gain.value = CFG.FOREST_VOLUME;
  }

  // Mute in interiors
  if (interiorState) {
    if (forestA) forestA.gainNode.gain.value = 0;
    if (forestB) forestB.gainNode.gain.value = 0;
  }
}

function resetForestAudio() {
  destroyForestChannel(forestA);
  destroyForestChannel(forestB);
  forestA = null;
  forestB = null;
  forestCurrentKey = null;
  forestFading = false;
  forestFadeProgress = 0;
  forestInitialized = false;
}

// ============================================================
// PROCEDURAL FOOTSTEP AUDIO SYSTEM
// ============================================================
//
// Generates footstep sounds entirely in code using Web Audio synthesis.
// No sample files needed — uses shaped noise bursts + filters.
//
// Surface types: grass, dirt, gravel, water, wood, stone
// Each has unique filter settings, envelope shape, and optional texture layer.
//
// Footstep cadence is timer-based, tied to movement state:
//   walk → ~0.38s interval, sprint → ~0.22s, sneak → ~0.55s, swim → ~0.50s
//

// ── Footstep Configuration ──────────────────────────────────

const FOOTSTEP_CFG = {
  // Master volume (0-1) — overall footstep loudness
  MASTER_VOL: 0.25,

  // Step interval by movement state (seconds between steps)
  // Jittered ±15% each step to avoid machine-gun repetition
  INTERVAL: {
    walk:   0.38,
    sprint: 0.22,
    sneak:  0.55,
    swim:   0.50,
  },

  // Volume multiplier by movement state (heavier = louder)
  WEIGHT: {
    walk:   0.7,
    sprint: 1.0,
    sneak:  0.25,
    swim:   0.5,
  },

  // Timing jitter — random ±% variation on step interval
  JITTER: 0.15,

  // Chance per step to play an extra texture sound (crunch/snap)
  TEXTURE_CHANCE: 0.15,

  // Surface sound profiles:
  //   freq: lowpass filter cutoff (lower = muffled, higher = crisp)
  //   Q: filter resonance (sharper peak = more character)
  //   attack: gain ramp-up time (seconds)
  //   decay: gain ramp-down time (seconds)
  //   pitch: playback rate center (1.0 = normal)
  //   pitchVar: random pitch variation ±
  //   noiseType: 'white' or 'pink' (pink = warmer, less harsh)
  SURFACES: {
    grass: {
      freq: 800,  Q: 0.8,  attack: 0.005, decay: 0.08,
      pitch: 0.9, pitchVar: 0.15, volMul: 0.8,
    },
    dirt: {
      freq: 1200, Q: 1.0,  attack: 0.003, decay: 0.07,
      pitch: 1.0, pitchVar: 0.12, volMul: 0.9,
    },
    gravel: {
      freq: 3500, Q: 0.6,  attack: 0.002, decay: 0.10,
      pitch: 1.1, pitchVar: 0.2,  volMul: 1.0,
    },
    water: {
      freq: 2000, Q: 1.2,  attack: 0.008, decay: 0.15,
      pitch: 0.7, pitchVar: 0.2,  volMul: 0.7,
    },
    wood: {
      freq: 1800, Q: 2.0,  attack: 0.002, decay: 0.06,
      pitch: 1.2, pitchVar: 0.1,  volMul: 0.85,
    },
    stone: {
      freq: 2500, Q: 1.5,  attack: 0.001, decay: 0.05,
      pitch: 1.3, pitchVar: 0.12, volMul: 0.95,
    },
  },
};

// ── Footstep State ──────────────────────────────────────────

let footstepTimer = 0;        // countdown to next footstep
let footstepAltFoot = false;  // alternates left/right for subtle variation

// ── Tile → Surface Mapping ──────────────────────────────────

function tileToSurface(tileType) {
  switch (tileType) {
    case T.GRASS:
    case T.TALL_GRASS:  return 'grass';
    case T.DIRT:        return 'dirt';
    case T.GRAVEL:      return 'gravel';
    case T.WATER_S:
    case T.WATER_D:     return 'water';
    case T.BRIDGE:      return 'wood';
    case T.PAVEMENT:    return 'stone';
    case T.ENTRANCE:    return 'dirt';
    case T.TRAILER:     return 'wood';
    case T.PICNIC_TABLE:return 'wood';
    default:            return 'dirt'; // fallback
  }
}

// ── Noise Buffer Generator ──────────────────────────────────
// Creates a short buffer of white noise (reusable)

let noiseBuffer = null;

function getNoiseBuffer() {
  if (noiseBuffer) return noiseBuffer;
  if (!audioCtx) return null;
  const len = audioCtx.sampleRate * 0.2; // 200ms of noise
  noiseBuffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < len; i++) {
    data[i] = Math.random() * 2 - 1;
  }
  return noiseBuffer;
}

// ── Synthesize One Footstep ─────────────────────────────────
// Creates a short noise burst shaped by the surface profile.
// Each call creates fresh nodes (they auto-disconnect after playing).

function playFootstep(surface, volume) {
  if (!audioCtx || !audioUnlocked) return;
  const buf = getNoiseBuffer();
  if (!buf) return;

  const prof = FOOTSTEP_CFG.SURFACES[surface];
  if (!prof) return;

  const t = audioCtx.currentTime;
  const vol = volume * prof.volMul * FOOTSTEP_CFG.MASTER_VOL;

  // ── Noise source ──
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  // Random pitch variation
  src.playbackRate.value = prof.pitch + (Math.random() - 0.5) * 2 * prof.pitchVar;
  // Alternate feet get slightly different pitch
  if (footstepAltFoot) src.playbackRate.value *= 0.95;

  // ── Filter (surface character) ──
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = prof.freq * (0.9 + Math.random() * 0.2); // ±10% variation
  filter.Q.value = prof.Q;

  // ── Gain envelope (attack + decay) ──
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + prof.attack);
  gain.gain.exponentialRampToValueAtTime(0.001, t + prof.attack + prof.decay);

  // ── Connect: source → filter → gain → SFX bus ──
  src.connect(filter);
  filter.connect(gain);
  gain.connect(busSFXGain || audioCtx.destination);

  src.start(t);
  src.stop(t + prof.attack + prof.decay + 0.01);
}

// ── Synthesize Texture Sound (crunch/snap) ──────────────────
// A higher-pitched, shorter burst layered on top of some footsteps.

function playFootstepTexture(surface, volume) {
  if (!audioCtx || !audioUnlocked) return;
  const buf = getNoiseBuffer();
  if (!buf) return;

  const t = audioCtx.currentTime;
  // Texture is quieter and crunchier
  const vol = volume * 0.4 * FOOTSTEP_CFG.MASTER_VOL;

  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  // Higher pitch, more variation = crunch/snap character
  src.playbackRate.value = 1.5 + Math.random() * 1.5;

  // Highpass filter for crispy texture
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 2000 + Math.random() * 3000;
  filter.Q.value = 0.5 + Math.random();

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.002);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.03 + Math.random() * 0.04);

  src.connect(filter);
  filter.connect(gain);
  gain.connect(busSFXGain || audioCtx.destination);

  src.start(t);
  src.stop(t + 0.08);
}

// ── Footstep Update (call once per frame) ───────────────────

function updateFootsteps(dt) {
  if (!audioCtx || !audioUnlocked) return;
  if (!bear) return;

  const state = bear.state;

  // Only produce footsteps for movement states
  const isMoving = (state === 'walk' || state === 'sprint' ||
                    state === 'sneak' || state === 'swim');

  if (!isMoving) {
    // Reset timer so first step plays promptly when movement resumes
    footstepTimer = 0;
    return;
  }

  // Count down
  footstepTimer -= dt;
  if (footstepTimer > 0) return;

  // ── Time to play a footstep ──

  // Determine surface
  const tileType = getTileAt(bear.x, bear.y + CFG.BEAR_FOOT_OFS);
  const surface = tileToSurface(tileType);

  // Determine volume from movement weight
  const weight = FOOTSTEP_CFG.WEIGHT[state] || 0.7;
  // Add slight random volume variation (±10%)
  const vol = weight * (0.9 + Math.random() * 0.2);

  // Play the main footstep
  playFootstep(surface, vol);

  // Occasionally play a texture sound (crunch/snap on organic surfaces)
  if (surface !== 'water' && surface !== 'stone' &&
      Math.random() < FOOTSTEP_CFG.TEXTURE_CHANCE) {
    // Slight delay so it layers naturally
    setTimeout(() => playFootstepTexture(surface, vol), 10 + Math.random() * 30);
  }

  // Alternate foot
  footstepAltFoot = !footstepAltFoot;

  // Set next step interval with jitter
  const baseInterval = FOOTSTEP_CFG.INTERVAL[state] || 0.38;
  const jitter = 1 + (Math.random() - 0.5) * 2 * FOOTSTEP_CFG.JITTER;
  footstepTimer = baseInterval * jitter;
}

// ── Footstep Reset ──────────────────────────────────────────

function resetFootsteps() {
  footstepTimer = 0;
  footstepAltFoot = false;
}

// ============================================================
// SFX PLAYBACK SYSTEM
// ============================================================
// Preloads bear action SFX as AudioBuffers for low-latency one-shot playback.
// Running loop managed separately with fade in/out.
// All SFX route through busSFXGain for user volume control.

const sfxBuffers = {};         // key -> decoded AudioBuffer
const sfxNormGain = {};        // key -> normalization multiplier (louder files get lower gain)
let sfxPreloaded = false;

function measureBufferRMS(audioBuffer) {
  // Measure RMS loudness across all channels for normalization
  let sumSq = 0, count = 0;
  for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
    const data = audioBuffer.getChannelData(ch);
    for (let i = 0; i < data.length; i++) {
      sumSq += data[i] * data[i];
      count++;
    }
  }
  return Math.sqrt(sumSq / (count || 1));
}

function preloadSFX() {
  if (sfxPreloaded || !audioCtx) return;
  sfxPreloaded = true;
  // Phase 1: decode all buffers
  const pending = {};
  const loaded = {};
  let remaining = Object.keys(CFG.SFX_FILES).length;
  for (const [key, path] of Object.entries(CFG.SFX_FILES)) {
    fetch(path)
      .then(r => r.arrayBuffer())
      .then(buf => audioCtx.decodeAudioData(buf))
      .then(decoded => {
        sfxBuffers[key] = decoded;
        loaded[key] = measureBufferRMS(decoded);
        remaining--;
        if (remaining <= 0) normalizeSFXLevels(loaded);
      })
      .catch(e => console.warn('SFX load failed:', key, e));
  }
}

function normalizeSFXLevels(rmsMap) {
  // Normalize all attack/combat SFX to the same RMS level
  // Pick the LOWEST RMS among attack sounds as the target (bring loud ones down)
  const attackKeys = ['heavyAttack1','heavyAttack2','heavyAttack3','combatSnarl','campsiteRoar','doorAttack'];
  let targetRMS = Infinity;
  for (const k of attackKeys) {
    if (rmsMap[k] != null && rmsMap[k] > 0) targetRMS = Math.min(targetRMS, rmsMap[k]);
  }
  if (!isFinite(targetRMS)) return;
  // Compute per-sound gain multiplier: quietest sound gets 1.0, louder ones get < 1.0
  for (const k of attackKeys) {
    if (rmsMap[k] > 0) {
      sfxNormGain[k] = targetRMS / rmsMap[k];
    }
  }
  // Non-attack sounds get 1.0 (use manual SFX_VOLUMES as-is)
  for (const k of Object.keys(CFG.SFX_FILES)) {
    if (!sfxNormGain[k]) sfxNormGain[k] = 1.0;
  }
  console.log('SFX normalized:', Object.entries(sfxNormGain).map(([k,v])=>k+':'+v.toFixed(3)).join(', '));
}

function playSFX(key, volMul) {
  if (!audioCtx || !audioUnlocked) return;
  const buffer = sfxBuffers[key];
  if (!buffer) return;
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  const normMul = sfxNormGain[key] || 1.0;
  gain.gain.value = (CFG.SFX_VOLUMES[key] || 0.5) * normMul * (volMul != null ? volMul : 1);
  source.connect(gain);
  gain.connect(busSFXGain || audioCtx.destination);
  source.start(0);
}

function playHeavyAttackSFX() {
  const variants = ['heavyAttack1', 'heavyAttack2', 'heavyAttack3'];
  playSFX(variants[Math.floor(Math.random() * variants.length)]);
}

// ── Running / Breathing Loop ──────────────────────────────────
// Fades in over ~1s when sprinting, fades out slowly over ~3s
// after stopping to imply the bear is catching its breath.
let runLoopSource = null;
let runLoopGain = null;
let runLoopPlaying = false;
let runLoopFading = false;     // true while fade-out is in progress
let runLoopFadeTimer = 0;      // seconds remaining in fade-out

const RUN_FADE_IN  = 1.0;     // seconds to ramp up to full volume
const RUN_FADE_OUT = 3.0;     // seconds to fade out after stopping (catching breath)

function updateRunningLoop(dt) {
  if (!audioCtx || !audioUnlocked || !bear) {
    if (runLoopPlaying) stopRunLoopImmediate();
    return;
  }
  const isSprinting = bear.state === 'sprint' && !interiorState;
  const targetVol = CFG.SFX_VOLUMES.bearRunning || 0.35;

  if (isSprinting && !runLoopPlaying && sfxBuffers.bearRunning) {
    // Start the loop — fade in
    runLoopSource = audioCtx.createBufferSource();
    runLoopSource.buffer = sfxBuffers.bearRunning;
    runLoopSource.loop = true;
    runLoopGain = audioCtx.createGain();
    runLoopGain.gain.setValueAtTime(0, audioCtx.currentTime);
    runLoopGain.gain.linearRampToValueAtTime(targetVol, audioCtx.currentTime + RUN_FADE_IN);
    runLoopSource.connect(runLoopGain);
    runLoopGain.connect(busSFXGain || audioCtx.destination);
    runLoopSource.start(0);
    runLoopPlaying = true;
    runLoopFading = false;
    runLoopFadeTimer = 0;
  } else if (isSprinting && runLoopPlaying && runLoopFading) {
    // Was fading out but bear started sprinting again — ramp back up
    runLoopFading = false;
    runLoopFadeTimer = 0;
    if (runLoopGain) {
      try {
        runLoopGain.gain.cancelScheduledValues(audioCtx.currentTime);
        runLoopGain.gain.setValueAtTime(runLoopGain.gain.value, audioCtx.currentTime);
        runLoopGain.gain.linearRampToValueAtTime(targetVol, audioCtx.currentTime + 0.5);
      } catch(e) {}
    }
  } else if (!isSprinting && runLoopPlaying && !runLoopFading) {
    // Just stopped sprinting — begin slow fade-out (catching breath)
    runLoopFading = true;
    runLoopFadeTimer = RUN_FADE_OUT;
    if (runLoopGain) {
      try {
        runLoopGain.gain.cancelScheduledValues(audioCtx.currentTime);
        runLoopGain.gain.setValueAtTime(runLoopGain.gain.value, audioCtx.currentTime);
        runLoopGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + RUN_FADE_OUT);
      } catch(e) {}
    }
  } else if (runLoopFading) {
    // Count down fade-out timer, then stop the source
    runLoopFadeTimer -= dt;
    if (runLoopFadeTimer <= 0) {
      stopRunLoopImmediate();
    }
  }
}

function stopRunLoopImmediate() {
  if (runLoopSource) {
    try { runLoopSource.stop(); } catch(e) {}
  }
  if (runLoopGain) {
    try { runLoopGain.disconnect(); } catch(e) {}
  }
  runLoopSource = null;
  runLoopGain = null;
  runLoopPlaying = false;
  runLoopFading = false;
  runLoopFadeTimer = 0;
}

function resetSFX() {
  stopRunLoopImmediate();
}

// ── Contextual SFX Helpers ────────────────────────────────────

function isBearNearCampsite() {
  if (!bear || !mapMarkers) return false;
  const tx = Math.floor(bear.x / CFG.TILE);
  const ty = Math.floor((bear.y + CFG.BEAR_FOOT_OFS) / CFG.TILE);
  if (tx < 0 || tx >= CFG.MAP_TILES || ty < 0 || ty >= CFG.MAP_TILES) return false;
  return mapMarkers[ty * CFG.MAP_TILES + tx] === 2;
}

function isBearNearCabinDoor() {
  if (!bear) return false;
  const TS = CFG.TILE, CS = CFG.CHUNK;
  const bx = bear.x, by = bear.y + CFG.BEAR_FOOT_OFS;
  const bcx = Math.floor(bx / (TS * CS));
  const bcy = Math.floor(by / (TS * CS));
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const ck = chunkKey(bcx + dx, bcy + dy);
      const ch = chunks[ck];
      if (!ch || !ch.cabinPositions) continue;
      for (const cab of ch.cabinPositions) {
        const doorX = ((bcx + dx) * CS + cab.x + Math.floor(cab.w / 2)) * TS;
        const doorY = ((bcy + dy) * CS + cab.y + cab.h) * TS;
        const ddx = bx - doorX, ddy = by - doorY;
        if (ddx * ddx + ddy * ddy < (TS * 3) * (TS * 3)) return true;
      }
    }
  }
  return false;
}

// ── SFX Cooldown State ────────────────────────────────────────
let sfxSnarlCD = 0;
let sfxCampsiteCD = 0;
let sfxDoorCD = 0;
let bushRustleCD = 0;        // cooldown between bush rustle sounds

// ── Bush Rustle System ────────────────────────────────────────
// Plays rustling SFX when bear or humans walk on/adjacent to bush tiles.
// Volume scaled by movement state: almost silent when sneaking.

function updateBushRustle(dt) {
  if (!audioCtx || !audioUnlocked || !bear || interiorState) return;
  bushRustleCD -= dt;
  if (bushRustleCD > 0) return;

  const TS = CFG.TILE;
  const isMoving = bear.state === 'walk' || bear.state === 'sprint' || bear.state === 'sneak';

  // ── Bear bush check ──
  if (isMoving) {
    const btx = Math.floor(bear.x / TS);
    const bty = Math.floor((bear.y + CFG.BEAR_FOOT_OFS) / TS);
    let onBush = false;
    for (let dy = -1; dy <= 1 && !onBush; dy++) {
      for (let dx = -1; dx <= 1 && !onBush; dx++) {
        if (getTileAt((btx + dx) * TS, (bty + dy) * TS) === T.BUSH) onBush = true;
      }
    }
    if (onBush) {
      // Volume depends on movement state
      let vol = 1.0;
      if (bear.state === 'sneak') vol = 0.08;       // almost silent
      else if (bear.state === 'walk') vol = 0.6;
      // sprint = full volume (1.0)
      playSFX('bushRustle', vol);
      bushRustleCD = bear.state === 'sprint' ? 0.5 : bear.state === 'sneak' ? 1.2 : 0.7;
      return;
    }
  }

  // ── Human bush check (nearest audible human) ──
  let closestDist = 150 * 150; // only play if within ~150px of bear (audible range)
  let humanOnBush = false;
  for (const h of humans) {
    if (!h.alive) continue;
    const hdx = h.x - bear.x, hdy = h.y - bear.y;
    const dist2 = hdx * hdx + hdy * hdy;
    if (dist2 > closestDist) continue;
    const hMoving = h.vx !== 0 || h.vy !== 0;
    if (!hMoving) continue;
    const htx = Math.floor(h.x / TS), hty = Math.floor(h.y / TS);
    if (getTileAt(htx * TS, hty * TS) === T.BUSH) {
      humanOnBush = true;
      closestDist = dist2;
    }
  }
  if (humanOnBush) {
    // Distance-based volume falloff for human rustling
    const dist = Math.sqrt(closestDist);
    const vol = Math.max(0.1, 1 - dist / 150) * 0.5;
    playSFX('bushRustle', vol);
    bushRustleCD = 0.8;
  }
}

// Interior map factory — creates cabin interior tile layouts
function createCabinInterior(type, hash) {
  let w, h;
  if (type === 'stone') { w = 16; h = 10; }
  else if (type === 'log') { w = 14; h = 9; }
  else { w = 12; h = 8; } // abandoned
  const tiles = new Uint8Array(w * h);
  // Fill with walls
  tiles.fill(T.CABIN);
  // Carve walkable floor inside (1-tile wall border)
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      tiles[y * w + x] = T.DIRT;
    }
  }
  // Exit opening at bottom-center (2 tiles wide)
  const doorX = (w >> 1) - 1;
  tiles[(h - 1) * w + doorX]     = T.DIRT;
  tiles[(h - 1) * w + doorX + 1] = T.DIRT;

  // Fireplace on back wall (stone cabins)
  if (type === 'stone') {
    const fpx = w >> 1;
    tiles[1 * w + fpx] = T.CAMPFIRE;
  }

  // Abandoned cabins: break some walls, make gaps
  if (type === 'abandoned') {
    const rng = hash;
    // Holes in walls
    for (let i = 0; i < 3; i++) {
      const wx = 1 + ((rng * (i + 7) * 13) % (w - 2));
      const wy = ((rng * (i + 3) * 17) % 2 === 0) ? 0 : h - 1;
      // Don't break the door opening
      if (wy === h - 1 && (wx === doorX || wx === doorX + 1)) continue;
      tiles[wy * w + wx] = T.DIRT;
    }
    // Place a mushroom-eligible tile (just mark as GRASS so existing mushroom hash logic works)
    tiles[2 * w + 2] = T.GRASS;
    if (w > 6) tiles[3 * w + (w - 3)] = T.GRASS;
    // Garbage tile
    tiles[2 * w + (w - 3)] = T.GARBAGE;
  }

  // Log cabin: cozy, maybe a table (non-walkable) in the center
  if (type === 'log') {
    const cx = w >> 1, cy = h >> 1;
    tiles[cy * w + cx] = T.CABIN; // table (uses wall tile, just blocks movement)
  }

  // Stone cabin: some furnishing
  if (type === 'stone') {
    // Bed area top-right
    tiles[1 * w + (w - 2)] = T.CABIN;
    tiles[2 * w + (w - 2)] = T.CABIN;
    // Table center-left
    tiles[(h >> 1) * w + 2] = T.CABIN;
  }

  // Exit trigger: the door tiles at bottom row
  const exitTrigger = { tx: doorX, ty: h - 1, tw: 2, th: 1 };

  // Light sources for night overlay
  const lightSources = [];
  if (type === 'stone') {
    lightSources.push({ tx: w >> 1, ty: 1 }); // fireplace
  }

  return { width: w, height: h, tiles, exitTrigger, exitDir: 'S', lightSources };
}

// Interior map factory — creates cave interior tile layouts
function createCaveInterior(hash) {
  const w = 10, h = 8;
  const tiles = new Uint8Array(w * h);
  // Fill with cave wall (impassable border)
  tiles.fill(T.CAVE_WALL);
  // Carve walkable cave floor inside (1-tile wall border)
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      tiles[y * w + x] = T.CAVE_FLOOR;
    }
  }
  // Exit opening at bottom-center (2 tiles wide)
  const doorX = (w >> 1) - 1;
  tiles[(h - 1) * w + doorX]     = T.CAVE_FLOOR;
  tiles[(h - 1) * w + doorX + 1] = T.CAVE_FLOOR;

  // Add some interior details based on hash
  const rng = hash || 1;
  // Rocky pillars (1-2)
  const pillars = 1 + (rng % 2);
  for (let i = 0; i < pillars; i++) {
    const px = 2 + ((rng * (i + 3) * 13) % (w - 4));
    const py = 2 + ((rng * (i + 7) * 17) % (h - 4));
    tiles[py * w + px] = T.CAVE_WALL;
  }
  // Bones on the floor (mark as DIRT for visual distinction)
  const bonesX = 1 + ((rng * 19) % (w - 3));
  const bonesY = 1 + ((rng * 23) % (h - 3));
  if (tiles[bonesY * w + bonesX] === T.CAVE_FLOOR) {
    tiles[bonesY * w + bonesX] = T.DIRT; // bones/debris marker
  }

  // Exit trigger: the door tiles at bottom row
  const exitTrigger = { tx: doorX, ty: h - 1, tw: 2, th: 1 };

  return { width: w, height: h, tiles, exitTrigger, exitDir: 'S', lightSources: [], isCave: true };
}

const ZOOM_SIZES = [
  { w: 426,  h: 240  },   // Level 1: ~27 tiles wide (close-up, default)
  { w: 640,  h: 360  },   // Level 2: ~40 tiles wide
  { w: 1280, h: 720  },   // Level 3: ~80 tiles wide

function resize() {
  const ww = window.innerWidth || 640, wh = window.innerHeight || 360;
  const dpr = window.devicePixelRatio || 1;
  // Internal resolution based on zoom level
  const zs = ZOOM_SIZES[zoomLevel];
  W = zs.w; H = zs.h;
  // Integer scale for crisp pixels
  const physW = ww * dpr, physH = wh * dpr;
  const maxScale = Math.max(1, Math.floor(Math.min(physW / W, physH / H)));
  canvas.width  = W * maxScale;
  canvas.height = H * maxScale;
  // Letterbox: fit 16:9 canvas centered in viewport with black bars
  const fitScale = Math.min(ww / W, wh / H);
  canvas.style.width  = Math.floor(W * fitScale) + 'px';
  canvas.style.height = Math.floor(H * fitScale) + 'px';
  scale = maxScale;
  ctx.imageSmoothingEnabled = false;
  ctx.setTransform(maxScale, 0, 0, maxScale, 0, 0);
  // Resize light map to match
  if (lightMapCanvas) {
    lightMapCanvas.width = W; lightMapCanvas.height = H;
    if (lightMapCtx) lightMapCtx.imageSmoothingEnabled = false;
  }
}

// Convert screen coords from mouse/touch event
function canvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = ((e.clientX || e.touches[0].clientX) - rect.left) / (rect.width / W);
  const cy = ((e.clientY || e.touches[0].clientY) - rect.top) / (rect.height / H);
  return { cx, cy };
}
function hitButton(cx, cy, btn) {
  if (!btn) return false;
  const dx = cx - btn.x, dy = cy - btn.y;
  return dx*dx + dy*dy <= btn.r * btn.r;
}

// Click/tap handler for minimap, map, and action buttons
let mapOpenedAt = 0; // debounce: prevent instant close on same click

canvas.addEventListener('click', e => {
  const { cx: clickX, cy: clickY } = canvasCoords(e);

  if (gameState === 'PLAYING') {
    // Check minimap (HUD is drawn at base 640x360 scale, so scale click coords)
    const hs = W / 640;
    const mmS = 56 * hs, mmX = W - mmS - 6 * hs, mmY = 6 * hs;
    if (clickX >= mmX && clickX <= mmX + mmS && clickY >= mmY && clickY <= mmY + mmS + 10 * hs) {
      gameState = 'MAP'; mapOpenedAt = now; return;
    }
    // Check action buttons (bear paw)
    if (hitButton(clickX, clickY, HUD_BUTTONS.heavy)) { input._heavy = true; return; }
    if (hitButton(clickX, clickY, HUD_BUTTONS.light)) { input._light = true; return; }
    if (hitButton(clickX, clickY, HUD_BUTTONS.interact)) { input._interact = true; return; }
    if (hitButton(clickX, clickY, HUD_BUTTONS.climb)) { input._climb = true; return; }
    if (hitButton(clickX, clickY, HUD_BUTTONS.sneak)) { sneakHeld = !sneakHeld; return; }
  } else if (gameState === 'MAP') {
    // Ignore clicks within 500ms of opening to prevent instant close
    if (now - mapOpenedAt > 500) {
      gameState = 'PLAYING'; lastTime = 0;
    }
  }
});

function pollInput() {
  input.mx = 0; input.my = 0;
  if (keys['ArrowRight'] || keys['KeyD']) input.mx += 1;
  if (keys['ArrowLeft']  || keys['KeyA']) input.mx -= 1;
  if (keys['ArrowDown']  || keys['KeyS']) input.my += 1;
  if (keys['ArrowUp']    || keys['KeyW']) input.my -= 1;
  // Normalize diagonal
  if (input.mx && input.my) { input.mx *= 0.707; input.my *= 0.707; }
  input.sprint = !!(keys['ShiftLeft'] || keys['ShiftRight'] || sprintHeld);
  input.sneak  = !!(keys['ControlLeft'] || keys['ControlRight'] || keys['KeyC'] || sneakHeld);
  input.lightAtk  = input._light;
  input.heavyAtk  = input._heavy;
  input.interact   = input._interact;
  input.climb      = input._climb;
  // Gamepad
  const gp = navigator.getGamepads ? navigator.getGamepads()[0] : null;
  if (gp) {
    if (Math.abs(gp.axes[0]) > 0.2) input.mx = gp.axes[0];
    if (Math.abs(gp.axes[1]) > 0.2) input.my = gp.axes[1];
    if (gp.buttons[0] && gp.buttons[0].pressed) input._light = true;     // A = light
    if (gp.buttons[2] && gp.buttons[2].pressed) input._heavy = true;     // X = heavy
    if (gp.buttons[1] && gp.buttons[1].pressed) input._interact = true;  // B = interact
    if (gp.buttons[4] && gp.buttons[4].pressed) input.sneak = true;      // LB
    if (gp.buttons[5] && gp.buttons[5].pressed) input.sprint = true;     // RB
  }
}

function clearInputFlags() {
  input._light = false;
  input._heavy = false;
  input._interact = false;
  input._climb = false;
}

// ============================================================
// SEEDED RNG
// ============================================================
function rng(seed) {
  let s = seed | 0;
  return function() {
    s = (s * 1664525 + 1013904223) | 0;
    return (s >>> 0) / 0x100000000;
  };
}

// ============================================================
// WORLD — CHUNK SYSTEM
// ============================================================
const chunks = {};
const chunkCanvases = {};
let worldSeed = 42;
let mapTiles = null; // Uint8Array[512*512] parsed from MANNING_TEMPLATE.png
let mapMarkers = null; // Uint8Array[512*512] zone markers: 0=none, 1=dense_forest, 2=campsite, 3=outpost, 4=resort, 5=cave_spawn
let caveSpawnPoints = []; // [{x, y, tx, ty}] world pixel positions for bear spawn
let caveLayout = null; // 6x6 array of tile types parsed from CAVE_SPAWN.png
let spawnFadeAlpha = 0; // fade-from-black alpha on initial spawn (1=black, 0=clear)

function parseMapTemplate() {
  const img = SHEETS.mapTemplate && SHEETS.mapTemplate.img;
  if (!img) return;
  // Image is 256x256, map is 512x512 tiles — each pixel = 2x2 tiles
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  const cx = c.getContext('2d');
  cx.drawImage(img, 0, 0);
  const d = cx.getImageData(0, 0, img.width, img.height).data;
  const MT = CFG.MAP_TILES;
  mapTiles = new Uint8Array(MT * MT);
  mapMarkers = new Uint8Array(MT * MT); // 0=none, 1=dense_forest, 2=campsite, 3=outpost, 4=resort

  for (let py = 0; py < img.height; py++) {
    for (let px = 0; px < img.width; px++) {
      const i = (py * img.width + px) * 4;
      const r = d[i], g = d[i+1], b = d[i+2], a = d[i+3];

      let tileType = T.GRASS; // default
      let marker = 0;

      // Dark blue = deep water (low R, low G, high B)
      if (b > 120 && r < 80 && g < 80) {
        tileType = T.WATER_D;
      }
      // Light blue = shallow water (low R, G and B both elevated)
      else if (b > 140 && g > 140 && r < 100) {
        tileType = T.WATER_S;
      }
      // Green = dense forest (G dominant, R low, B low)
      else if (g > 100 && r < 100 && b < 100) {
        tileType = T.GRASS;
        marker = 1; // dense_forest
      }
      // Red = trail (R high, G low, B low)
      else if (r > 150 && g < 100 && b < 100) {
        tileType = T.DIRT;
      }
      // Pink = ranger outpost (R high, B moderate, G low-moderate)
      else if (r > 180 && b > 100 && b < 200 && g < 130) {
        tileType = T.GRAVEL;
        marker = 3; // outpost
      }
      // Yellow = asphalt road (R high, G high, B low)
      else if (r > 180 && g > 180 && b < 100) {
        tileType = T.PAVEMENT;
      }
      // Orange = main resort (R high, G moderate, B low)
      else if (r > 180 && g > 100 && g < 180 && b < 80) {
        tileType = T.PAVEMENT;
        marker = 4; // resort
      }
      // Purple/magenta = campsite spot (R elevated, B high, G low)
      else if (b > 80 && g < 80 && r > 60) {
        tileType = T.DIRT;
        marker = 2; // campsite
      }
      // Dark gray = cave spawn location (darker than gravel ~53,53,53)
      else if (r > 30 && r < 80 && g > 30 && g < 80 && b > 30 && b < 80
          && Math.abs(r - g) < 20 && Math.abs(r - b) < 20) {
        tileType = T.GRASS;  // base tile stays grass; cave layout stamped in generateChunk
        marker = 5;          // cave_spawn marker
      }
      // Tan = sand (R high, G high, B moderate-high — pale warm tone)
      else if (r > 200 && g > 180 && b > 140 && r > b) {
        tileType = T.GRAVEL;
      }
      // Gray = gravel (R, G, B all similar/mid-range)
      else if (r > 100 && r < 200 && g > 100 && g < 200 && b > 100 && b < 200 && Math.abs(r - g) < 30 && Math.abs(r - b) < 30) {
        tileType = T.GRAVEL;
      }
      // Brown = wood bridge (R moderate, G low, B very low — dark wood tone)
      else if (r > 40 && r < 180 && g < 100 && b < 40 && r > g && r > b) {
        tileType = T.BRIDGE;
      }
      // Black/dark = grass (default)

      // Scale 1 pixel to 2x2 tiles
      const tx = px * 2, ty = py * 2;
      if (tx < MT && ty < MT) {
        mapTiles[ty * MT + tx] = tileType;
        mapTiles[ty * MT + tx + 1] = tileType;
        mapTiles[(ty+1) * MT + tx] = tileType;
        mapTiles[(ty+1) * MT + tx + 1] = tileType;
        mapMarkers[ty * MT + tx] = marker;
        mapMarkers[ty * MT + tx + 1] = marker;
        mapMarkers[(ty+1) * MT + tx] = marker;
        mapMarkers[(ty+1) * MT + tx + 1] = marker;
      }
    }
  }
  console.log('Map template parsed: ' + MT + 'x' + MT + ' tiles from ' + img.width + 'x' + img.height + ' image');

  // ── Detect cave spawn locations (marker===5) and collect top-left of each 6x6 cluster ──
  caveSpawnPoints = [];
  const caveVisited = new Set();
  for (let ty = 0; ty < MT; ty++) {
    for (let tx = 0; tx < MT; tx++) {
      if (caveVisited.has(ty * MT + tx)) continue;
      if (mapMarkers[ty * MT + tx] !== 5) continue;
      // Flood-fill to find full cave cluster, record bounding box top-left
      let minX = tx, minY = ty;
      const cStack = [[tx, ty]];
      while (cStack.length) {
        const [rx, ry] = cStack.pop();
        const rk = ry * MT + rx;
        if (rx < 0 || rx >= MT || ry < 0 || ry >= MT) continue;
        if (caveVisited.has(rk)) continue;
        if (mapMarkers[rk] !== 5) continue;
        caveVisited.add(rk);
        if (rx < minX) minX = rx;
        if (ry < minY) minY = ry;
        cStack.push([rx+1,ry],[rx-1,ry],[rx,ry+1],[rx,ry-1]);
      }
      // Spawn point = center of the 4 CAVE_FLOOR tiles (cols 2-3, rows 3-4 in layout)
      // Center pixel: X between cols 2-3 = (minX+3)*TS, Y between rows 3-4 = (minY+4)*TS
      // bear.y must offset by -BEAR_FOOT_OFS so feet land on floor tiles
      const TS = CFG.TILE;
      const spawnX = (minX + 3) * TS;
      const spawnY = (minY + 4) * TS - CFG.BEAR_FOOT_OFS; // feet will be at (minY+4)*TS
      caveSpawnPoints.push({ x: spawnX, y: spawnY, tx: minX, ty: minY });
    }
  }
  console.log('Cave spawn points found: ' + caveSpawnPoints.length);

  // ── Detect campsite zones and place one 6x6 anchor per contiguous region ──
  campsiteAnchors = [];
  const csVisited = new Set();
  for (let ty = 0; ty < MT; ty++) {
    for (let tx = 0; tx < MT; tx++) {
      if (csVisited.has(ty * MT + tx)) continue;
      if (mapMarkers[ty * MT + tx] !== 2) continue;
      // Flood-fill to find the full contiguous campsite region
      const region = [];
      const stack = [[tx, ty]];
      while (stack.length) {
        const [rx, ry] = stack.pop();
        const rk = ry * MT + rx;
        if (rx < 0 || rx >= MT || ry < 0 || ry >= MT) continue;
        if (csVisited.has(rk)) continue;
        if (mapMarkers[rk] !== 2) continue;
        csVisited.add(rk);
        region.push([rx, ry]);
        stack.push([rx+1,ry],[rx-1,ry],[rx,ry+1],[rx,ry-1]);
      }
      if (region.length < 100) continue; // need roughly 12x12=144 tiles (allow some margin)
      // Find bounding box center and place 12x12 anchor there
      let minX = MT, minY = MT, maxX = 0, maxY = 0;
      for (const [rx, ry] of region) {
        if (rx < minX) minX = rx; if (rx > maxX) maxX = rx;
        if (ry < minY) minY = ry; if (ry > maxY) maxY = ry;
      }
      // Center the 12x12 layout within the region
      const cx = Math.floor((minX + maxX) / 2) - 6;
      const cy = Math.floor((minY + maxY) / 2) - 6;
      // Clamp to map bounds
      const ax = Math.max(0, Math.min(MT - 12, cx));
      const ay = Math.max(0, Math.min(MT - 12, cy));
      campsiteAnchors.push({ tx: ax, ty: ay });
    }
  }
  console.log('Campsite anchors found: ' + campsiteAnchors.length);

  // ── Detect resort/lodge zones (marker=4) — one anchor per contiguous region ──
  lodgeAnchors = [];
  const lgVisited = new Set();
  for (let ty = 0; ty < MT; ty++) {
    for (let tx = 0; tx < MT; tx++) {
      if (lgVisited.has(ty * MT + tx)) continue;
      if (mapMarkers[ty * MT + tx] !== 4) continue;
      const region = [];
      const stack = [[tx, ty]];
      while (stack.length) {
        const [rx, ry] = stack.pop();
        const rk = ry * MT + rx;
        if (rx < 0 || rx >= MT || ry < 0 || ry >= MT) continue;
        if (lgVisited.has(rk)) continue;
        if (mapMarkers[rk] !== 4) continue;
        lgVisited.add(rk);
        region.push([rx, ry]);
        stack.push([rx+1,ry],[rx-1,ry],[rx,ry+1],[rx,ry-1]);
      }
      if (region.length < 100) continue;
      let minX = MT, minY = MT, maxX = 0, maxY = 0;
      for (const [rx, ry] of region) {
        if (rx < minX) minX = rx; if (rx > maxX) maxX = rx;
        if (ry < minY) minY = ry; if (ry > maxY) maxY = ry;
      }
      // Center the 14x14 layout within the region
      const cx = Math.floor((minX + maxX) / 2) - 7;
      const cy = Math.floor((minY + maxY) / 2) - 7;
      const ax = Math.max(0, Math.min(MT - 14, cx));
      const ay = Math.max(0, Math.min(MT - 14, cy));
      lodgeAnchors.push({ tx: ax, ty: ay });
    }
  }
  console.log('Lodge anchors found: ' + lodgeAnchors.length);
}

function parseCaveLayout() {

  caveLayout = [];
  for (let y = 0; y < img.height; y++) {
    const row = [];
    for (let x = 0; x < img.width; x++) {
      const i = (y * img.width + x) * 4;
      const r = d[i], g = d[i+1], b = d[i+2];
      // Yellow (255,211,19) = cave wall
      if (r > 180 && g > 150 && b < 80) row.push(T.CAVE_WALL);
      // Black (0,3,11) = cave floor / entrance
      else if (r < 30 && g < 30 && b < 30) row.push(T.CAVE_FLOOR);

      else row.push(T.GRASS);
    }
    caveLayout.push(row);

// ── Campsite Layout Parsing ────────────────────────────────
let CAMPSITE_LAYOUTS = [];
let campsiteAnchors = [];

function parseCampsiteLayouts() {
  const layoutKeys = ['campsiteLayout1', 'campsiteLayout2', 'campsiteTrailer1'];
  CAMPSITE_LAYOUTS = [];

  for (const key of layoutKeys) {
    const img = SHEETS[key] && SHEETS[key].img;
    if (!img || !img.width) continue;
    const c = document.createElement('canvas');
    c.width = img.width; c.height = img.height;
    const cx = c.getContext('2d');
    cx.drawImage(img, 0, 0);
    const d = cx.getImageData(0, 0, img.width, img.height).data;
    const w = img.width, h = img.height;
    const tiles = new Uint8Array(w * h);
    // Trailer layouts map pink to T.TRAILER instead of T.TENT
    const isTrailer = key.toLowerCase().includes('trailer');
    const pinkTile = isTrailer ? T.TRAILER : T.TENT;

    for (let py = 0; py < h; py++) {
      for (let px = 0; px < w; px++) {
        const i = (py * w + px) * 4;
        const r = d[i], g = d[i+1], b = d[i+2];
        let tile = T.DIRT; // default = trail/dirt

        // Pink → Tent or Trailer (R high, B elevated, G low)
        if (r > 200 && g < 100 && b > 100) {
          tile = pinkTile;
        }
        // Black → Entrance (all channels very low)
        else if (r < 30 && g < 30 && b < 30) {
          tile = T.ENTRANCE;
        }
        // Orange → Campfire (R high, G moderate, B low)
        else if (r > 200 && g > 80 && g < 180 && b < 50) {
          tile = T.CAMPFIRE;
        }
        // Brown → Picnic Table (R>G>B, warm dark-to-mid brown)
        else if (r > 30 && r < 180 && g < 140 && b < 60 && r > g && r > b) {
          tile = T.PICNIC_TABLE;
        }
        // Green → Grass (G dominant, R low, B low)
        else if (g > 100 && r < 100 && b < 100) {
          tile = T.GRASS;
        }
        // Gray → Gravel (R, G, B all similar mid-range)
        else if (r > 80 && r < 200 && g > 80 && g < 200 && b > 80 && b < 200 && Math.abs(r - g) < 30 && Math.abs(r - b) < 30) {
          tile = T.GRAVEL;
        }
        // Tan → Trail/Dirt (R high, G high, B moderate — pale)
        else if (r > 180 && g > 160 && b > 120) {
          tile = T.DIRT;
        }

        tiles[py * w + px] = tile;
      }
    }
    // Find trailer block within layout (top-left corner + dimensions)
    let trailerBlock = null;
    if (isTrailer) {
      for (let py2 = 0; py2 < h && !trailerBlock; py2++) {
        for (let px2 = 0; px2 < w && !trailerBlock; px2++) {
          if (tiles[py2 * w + px2] === T.TRAILER) {
            const hasLeft = px2 > 0 && (tiles[py2 * w + px2 - 1] === T.TRAILER || tiles[py2 * w + px2 - 1] === T.ENTRANCE);
            const hasAbove = py2 > 0 && (tiles[(py2 - 1) * w + px2] === T.TRAILER || tiles[(py2 - 1) * w + px2] === T.ENTRANCE);
            if (!hasLeft && !hasAbove) {
              let tbw = 0, tbh = 0;
              while (px2 + tbw < w && (tiles[py2 * w + px2 + tbw] === T.TRAILER || tiles[py2 * w + px2 + tbw] === T.ENTRANCE)) tbw++;
              while (py2 + tbh < h && (tiles[(py2 + tbh) * w + px2] === T.TRAILER || tiles[(py2 + tbh) * w + px2] === T.ENTRANCE)) tbh++;
              trailerBlock = { lx: px2, ly: py2, w: tbw, h: tbh };
            }
          }
        }
      }
    }
    CAMPSITE_LAYOUTS.push({ w, h, tiles, isTrailer, trailerBlock });
    console.log('Parsed campsite layout: ' + key + ' (' + w + 'x' + h + ')' + (trailerBlock ? ' trailer@' + trailerBlock.lx + ',' + trailerBlock.ly + ' ' + trailerBlock.w + 'x' + trailerBlock.h : ''));
  }
}
