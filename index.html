function chunkKey(cx, cy) { return cx + ',' + cy; }

// ============================================================
// STREAMS — Global sinusoidal water features
// ============================================================
function getStreamInfo(worldSeed) {
  // Determine global stream positions from world seed
  const sr = rng(worldSeed * 31337);
  const streams = [];
  // 3-5 streams in the world
  const count = 3 + Math.floor(sr() * 3);
  for (let i = 0; i < count; i++) {
    streams.push({
      axis: i % 2,        // 0=north-south, 1=east-west
      basePos: Math.floor(CFG.MAP_TILES * 0.2 + sr() * CFG.MAP_TILES * 0.6), // bounded within map
      freq: 0.012 + sr() * 0.008,
      amp: 2.5 + sr() * 2,
      phase: sr() * Math.PI * 2,
      freq2: 0.025 + sr() * 0.01,
      amp2: 1 + sr() * 1.5,
      phase2: sr() * Math.PI * 2,
    });
  }
  return streams;
}

let cachedStreams = null;
function getStreams() {
  if (!cachedStreams) cachedStreams = getStreamInfo(worldSeed);
  return cachedStreams;
}

function getStreamAt(worldTileX, worldTileY) {
  // Returns distance to nearest stream (0 = center, >0 = further)
  const streams = getStreams();
  let minDist = 999;
  for (const s of streams) {
    const along = s.axis === 0 ? worldTileY : worldTileX;
    const perp  = s.axis === 0 ? worldTileX : worldTileY;
    const offset = s.amp * Math.sin(along * s.freq + s.phase)
                 + s.amp2 * Math.sin(along * s.freq2 + s.phase2);
    const streamPerp = s.basePos + offset;
    const dist = Math.abs(perp - streamPerp);
    if (dist < minDist) minDist = dist;
  }
  return minDist;
}

function getStreamFlow(wx, wy) {
  // Returns flow direction vector at a world pixel position
  const streams = getStreams();
  const tileX = wx / CFG.TILE, tileY = wy / CFG.TILE;
  let bestDist = 999, bestStream = null;
  for (const s of streams) {
    const along = s.axis === 0 ? tileY : tileX;
    const perp  = s.axis === 0 ? tileX : tileY;
    const offset = s.amp * Math.sin(along * s.freq + s.phase)
                 + s.amp2 * Math.sin(along * s.freq2 + s.phase2);
    const dist = Math.abs(perp - s.basePos - offset);
    if (dist < bestDist) { bestDist = dist; bestStream = s; }
  }
  if (!bestStream || bestDist > 2.5) return { fx: 0, fy: 0 };
  // Flow along the stream axis
  const strength = 8 * (1 - bestDist / 2.5);
  return bestStream.axis === 0 ? { fx: 0, fy: strength } : { fx: strength, fy: 0 };
}

function placeStreams(tiles, cx, cy, S) {
  const streams = getStreams();
  for (let y = 0; y < S; y++) {
    for (let x = 0; x < S; x++) {
      const worldTX = cx * S + x;
      const worldTY = cy * S + y;
      const dist = getStreamAt(worldTX, worldTY);
      const existing = tiles[y * S + x];
      // Don't overwrite trees, rocks, or camp structures
      if (existing === T.TREE || existing === T.ROCK || existing === T.TENT ||
          existing === T.CAMPFIRE || existing === T.GARBAGE ||
          existing === T.CABIN || existing === T.PAVEMENT ||
          existing === T.LODGE || existing === T.TRAILER || existing === T.PICNIC_TABLE || existing === T.ENTRANCE) continue;
      if (dist < 1.0) tiles[y * S + x] = T.WATER_D;
      else if (dist < 2.0) tiles[y * S + x] = T.WATER_S;
    }
  }
}

// ============================================================
// ZONE SYSTEM — organic difficulty rings
// ============================================================
function getZoneInfo(cx, cy) {
  const centerTX = cx * CFG.CHUNK + CFG.CHUNK / 2;
  const centerTY = cy * CFG.CHUNK + CFG.CHUNK / 2;
  const dx = centerTX - CFG.MAP_CENTER_TILE;
  const dy = centerTY - CFG.MAP_CENTER_TILE;
  const distFromCenter = Math.sqrt(dx * dx + dy * dy);
  const maxDist = CFG.MAP_CENTER_TILE;
  // Noise wobble for organic boundaries
  const noise = Math.sin(cx * 2.3 + cy * 1.7) * 0.08 + Math.sin(cx * 0.7 - cy * 3.1) * 0.05;
  const norm = Math.min(1, distFromCenter / maxDist) + noise;
  // Ring 1=outer(easy), Ring 5=center(hard)
  let zone;
  if (norm > 0.78) zone = 1;
  else if (norm > 0.58) zone = 2;
  else if (norm > 0.38) zone = 3;
  else if (norm > 0.18) zone = 4;
  else zone = 5;
  return { zone, difficulty: 1 - Math.max(0, Math.min(1, norm)) };
}

// ============================================================
// TERRAIN PLACEMENT HELPERS
// ============================================================
function hPlaceTrails(tiles, r, S, chance, width) {
  if (r() >= chance) return;
  const horiz = r() < 0.5;
  const pos = 6 + Math.floor(r() * 20);
  for (let i = 0; i < S; i++) {
    const wobble = Math.floor(Math.sin(i * 0.2) * 2.5);
    for (let w = -width; w <= width; w++) {
      const tx = horiz ? i : pos + wobble + w;
      const ty = horiz ? pos + wobble + w : i;
      if (tx >= 0 && tx < S && ty >= 0 && ty < S) tiles[ty * S + tx] = T.DIRT;
    }
    // Ragged edges
    for (const ew of [-(width+1), width+1]) {
      if (((i * 7 + ew) & 1) === 0) {
        const tx = horiz ? i : pos + wobble + ew;
        const ty = horiz ? pos + wobble + ew : i;
        if (tx >= 0 && tx < S && ty >= 0 && ty < S) tiles[ty * S + tx] = T.DIRT;
      }
    }
  }
}

function hHasAdjacentTree(tiles, S, tx, ty) {
  // Asymmetric spacing: wider vertical gap (4 tiles) because tree canopies are tall,
  // narrower horizontal gap (2 tiles) since canopies are less wide
  for (let dy = -4; dy <= 4; dy++) for (let dx = -2; dx <= 2; dx++) {
    if (dx === 0 && dy === 0) continue;
    const nx = tx+dx, ny = ty+dy;
    if (nx >= 0 && nx < S && ny >= 0 && ny < S && tiles[ny*S+nx] === T.TREE) return true;
  }
  return false;
}

function hPlaceTreeClusters(tiles, r, S, clusters, perCluster, spread) {
  for (let c = 0; c < clusters; c++) {
    const tcx = Math.floor(r() * S), tcy = Math.floor(r() * S);
    const count = Math.floor(perCluster * 0.6 + r() * perCluster * 0.8);
    for (let t = 0; t < count; t++) {
      const tx = tcx + Math.floor(r() * spread - spread/2);
      const ty = tcy + Math.floor(r() * spread - spread/2);
      if (tx >= 0 && tx < S && ty >= 0 && ty < S && tiles[ty*S+tx] === T.GRASS
          && !hHasAdjacentTree(tiles, S, tx, ty))
        tiles[ty*S+tx] = T.TREE;
    }
  }
}

function hPlaceScatterTrees(tiles, r, S, count) {
  for (let i = 0; i < count; i++) {
    const tx = Math.floor(r() * S), ty = Math.floor(r() * S);
    if (tiles[ty*S+tx] === T.GRASS && !hHasAdjacentTree(tiles, S, tx, ty))
      tiles[ty*S+tx] = T.TREE;
  }
}

function hPlaceRocks(tiles, r, S, count) {
  for (let i = 0; i < count; i++) {
    const rx = Math.floor(r() * S), ry = Math.floor(r() * S);
    if (tiles[ry*S+rx] === T.GRASS) tiles[ry*S+rx] = T.ROCK;
  }
}

function hPlaceTallGrass(tiles, r, S, patches, radius) {
  for (let p = 0; p < patches; p++) {
    const gx = Math.floor(r() * S), gy = Math.floor(r() * S);
    const gr = Math.floor(radius * 0.6 + r() * radius * 0.8);
    for (let dy = -gr; dy <= gr; dy++) for (let dx = -gr; dx <= gr; dx++) {
      if (dx*dx + dy*dy <= gr*gr + r()*4 && gx+dx >= 0 && gx+dx < S && gy+dy >= 0 && gy+dy < S)
        if (tiles[(gy+dy)*S + (gx+dx)] === T.GRASS) tiles[(gy+dy)*S + (gx+dx)] = T.TALL_GRASS;
    }
  }
}

function hPlaceBushes(tiles, r, S, groups) {
  for (let i = 0; i < groups; i++) {
    const bx = Math.floor(r() * S), by = Math.floor(r() * S);
    if (tiles[by*S+bx] === T.GRASS || tiles[by*S+bx] === T.TALL_GRASS) tiles[by*S+bx] = T.BUSH;
    const bx2 = bx + Math.floor(r()*3-1), by2 = by + Math.floor(r()*3-1);
    if (bx2>=0 && bx2<S && by2>=0 && by2<S && (tiles[by2*S+bx2]===T.GRASS||tiles[by2*S+bx2]===T.TALL_GRASS))
      tiles[by2*S+bx2] = T.BUSH;
  }
}

// Dense bush thickets — clusters of 3-6 bushes surrounded by tall grass ring
function hPlaceBushThickets(tiles, r, S, count) {
  for (let i = 0; i < count; i++) {
    const cx = 3 + Math.floor(r() * (S-6)), cy = 3 + Math.floor(r() * (S-6));
    const bushCount = 3 + Math.floor(r() * 4); // 3-6 bushes
    // Tall grass ring (radius 3-4)
    const gr = 3 + Math.floor(r() * 2);
    for (let dy = -gr; dy <= gr; dy++) for (let dx = -gr; dx <= gr; dx++) {
      const d2 = dx*dx + dy*dy;
      if (d2 <= gr*gr && cx+dx >= 0 && cx+dx < S && cy+dy >= 0 && cy+dy < S) {
        const ti = (cy+dy)*S + (cx+dx);
        if (tiles[ti] === T.GRASS) tiles[ti] = T.TALL_GRASS;
      }
    }
    // Bush cluster in center
    for (let b = 0; b < bushCount; b++) {
      const bx = cx + Math.floor(r()*3-1), by = cy + Math.floor(r()*3-1);
      if (bx >= 0 && bx < S && by >= 0 && by < S) {
        const ti = by*S + bx;
        if (tiles[ti] === T.GRASS || tiles[ti] === T.TALL_GRASS) tiles[ti] = T.BUSH;
      }
    }
  }
}

function hPlaceGravel(tiles, r, S, count) {
  for (let p = 0; p < count; p++) {
    const gx = Math.floor(r()*S), gy = Math.floor(r()*S);
    const gr = 2 + Math.floor(r()*3);
    for (let dy = -gr; dy <= gr; dy++) for (let dx = -gr; dx <= gr; dx++)
      if (dx*dx+dy*dy<=gr*gr && gx+dx>=0 && gx+dx<S && gy+dy>=0 && gy+dy<S)
        tiles[(gy+dy)*S+(gx+dx)] = T.GRAVEL;
  }
}

function hPlacePond(tiles, r, S) {
  const wx = 6+Math.floor(r()*20), wy = 6+Math.floor(r()*20);
  const wr = 2+Math.floor(r()*3);
  for (let dy = -wr-1; dy <= wr+1; dy++) for (let dx = -wr-1; dx <= wr+1; dx++) {
    const d2 = dx*dx+dy*dy, tx = wx+dx, ty = wy+dy;
    if (tx>=0 && tx<S && ty>=0 && ty<S) {
      if (d2<=wr*wr) tiles[ty*S+tx] = T.WATER_D;
      else if (d2<=(wr+1)*(wr+1)) tiles[ty*S+tx] = T.WATER_S;
    }
  }
}

function hPlaceLogs(tiles, r, S) {
  if (r() >= 0.3) return;
  const lx = Math.floor(r()*S), ly = Math.floor(r()*S), horiz = r()<0.5;
  for (let i = 0; i < 3; i++) {
    const tx = horiz?lx+i:lx, ty = horiz?ly:ly+i;
    if (tx>=0 && tx<S && ty>=0 && ty<S && TDATA[tiles[ty*S+tx]].walk) tiles[ty*S+tx] = T.LOG;
  }
}

function hPlaceCampsite(tiles, r, S, large) {
  const sx = 6+Math.floor(r()*(S-12)), sy = 6+Math.floor(r()*(S-12));
  const rad = large ? 4 : 3;
  // Clear dirt area
  for (let dy = -rad; dy <= rad; dy++) for (let dx = -rad; dx <= rad; dx++) {
    const tx = sx+dx, ty = sy+dy;
    if (tx>=0 && tx<S && ty>=0 && ty<S) tiles[ty*S+tx] = T.DIRT;
  }
  // Campfire (1x1) at center
  tiles[sy*S+sx] = T.CAMPFIRE;
  // Tent — 3 wide x 5 tall sprite, bottom 3 rows are the base (T.TENT)
  // Top 2 rows: clear obstacles (trees/bushes/rocks) but preserve walkable ground (dirt, grass)
  const tentOx = sx - 4, tentOy = sy - 2;
  for (let dy = 0; dy < 2; dy++) for (let dx = 0; dx < 3; dx++) {
    const tx = tentOx+dx, ty = tentOy+dy;
    if (tx>=0 && tx<S && ty>=0 && ty<S && !TDATA[tiles[ty*S+tx]].walk) {
      tiles[ty*S+tx] = T.GRASS;
    }
  }
  for (let dy = 2; dy < 5; dy++) for (let dx = 0; dx < 3; dx++) {
    const tx = tentOx+dx, ty = tentOy+dy;
    if (tx>=0 && tx<S && ty>=0 && ty<S) tiles[ty*S+tx] = T.TENT;
  }
  // Second tent for large camps — clear obstacles in top 2 rows, bottom 3 rows are base
  if (large) {
    const t2w = 3, t2h = 5;
    const t2ox = sx+2, t2oy = sy-2;
    for (let dy=0; dy<2; dy++) for (let dx=0; dx<t2w; dx++) {
      const tx=t2ox+dx, ty=t2oy+dy;
      if (tx>=0 && tx<S && ty>=0 && ty<S && !TDATA[tiles[ty*S+tx]].walk) {
        tiles[ty*S+tx] = T.GRASS;
      }
    }
    for (let dy=2; dy<t2h; dy++) for (let dx=0; dx<t2w; dx++) {
      const tx=t2ox+dx, ty=t2oy+dy;
      if (tx>=0 && tx<S && ty>=0 && ty<S) tiles[ty*S+tx] = T.TENT;
    }
    // Garbage placed AFTER both tents to avoid disrupting tent tile blocks
    if (sx-2>=0) tiles[(sy+1)*S+(sx-2)] = T.GARBAGE;
    if (sx+5<S && sy+3<S) tiles[(sy+3)*S+(sx+5)] = T.GARBAGE;
  } else {
    // Small camp: single garbage near campfire (away from tent)
    if (sx+2<S) tiles[sy*S+(sx+2)] = T.GARBAGE;
  }
}

function hSpawnHumans(humans, tiles, r, S, cx, cy, classes, count) {
  for (let i = 0; i < count; i++) {
    for (let attempt = 0; attempt < 20; attempt++) {
      const hx = Math.floor(r()*S), hy = Math.floor(r()*S);
      if (TDATA[tiles[hy*S+hx]].walk) {
        const worldX = (cx*CFG.CHUNK+hx)*CFG.TILE+CFG.TILE/2;
        const worldY = (cy*CFG.CHUNK+hy)*CFG.TILE+CFG.TILE/2;
        const cls = classes[Math.floor(r()*classes.length)];
        humans.push(mkHuman(cls, worldX, worldY, r()*Math.PI*2));
        break;
      }
    }
  }
}

// Spawn humans only on trail-like tiles (DIRT, GRAVEL, PAVEMENT, BRIDGE, near TENT/CAMPFIRE)
function hSpawnHumansOnTrails(humans, tiles, r, S, cx, cy, classes, count) {
  // Collect valid trail/path tiles
  const trailTiles = [];
  for (let y = 0; y < S; y++) {
    for (let x = 0; x < S; x++) {
      const t = tiles[y * S + x];
      if (t === T.DIRT || t === T.GRAVEL || t === T.PAVEMENT || t === T.BRIDGE || t === T.ENTRANCE) {
        trailTiles.push({ x, y });
      }
    }
  }
  if (trailTiles.length === 0) return;
  for (let i = 0; i < count; i++) {
    const tp = trailTiles[Math.floor(r() * trailTiles.length)];
    const worldX = (cx * CFG.CHUNK + tp.x) * CFG.TILE + CFG.TILE / 2;
    const worldY = (cy * CFG.CHUNK + tp.y) * CFG.TILE + CFG.TILE / 2;
    const cls = classes[Math.floor(r() * classes.length)];
    humans.push(mkHuman(cls, worldX, worldY, r() * Math.PI * 2));
  }
}

// ============================================================
// CHUNK GENERATION — zone-based dispatch
// ============================================================
function generateChunk(cx, cy) {
  if (cx < 0 || cx >= CFG.MAP_CHUNKS || cy < 0 || cy >= CFG.MAP_CHUNKS) return null;
  const S = CFG.CHUNK;
  const tiles = new Uint8Array(S * S);
  const r = rng(cx * 73856093 ^ cy * 19349669 ^ worldSeed);
  const { zone, difficulty } = getZoneInfo(cx, cy);
  const humans = [];
  var _layoutTrailers = []; // trailer positions registered during layout stamping
  const MT = CFG.MAP_TILES;

  // Track all tiles that belong to stamped layouts (prevent trees/decorations)
  const campsiteFootprint = new Set();

  // === MAP-DRIVEN TERRAIN ===
  if (mapTiles) {
    // Read tile types from parsed map template
    for (let y = 0; y < S; y++) {
      for (let x = 0; x < S; x++) {
        const worldTX = cx * S + x, worldTY = cy * S + y;
        if (worldTX < MT && worldTY < MT) {
          tiles[y * S + x] = mapTiles[worldTY * MT + worldTX];
        } else {
          tiles[y * S + x] = T.GRASS;
        }
      }
    }

    // Check mapMarkers for this chunk — count marker types
    let denseForestTiles = 0, campsiteTiles = 0, outpostTiles = 0, resortTiles = 0;
    if (mapMarkers) {
      for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
        const m = mapMarkers[(cy * S + y) * CFG.MAP_TILES + (cx * S + x)];
        if (m === 1) denseForestTiles++;
        else if (m === 2) campsiteTiles++;
        else if (m === 3) outpostTiles++;
        else if (m === 4) resortTiles++;
      }
    }
    // Stamp cave layouts onto tiles where marker===5
    if (mapMarkers && caveLayout) {
      for (const cp of caveSpawnPoints) {
        // Check if this cave overlaps with this chunk
        const caveW = caveLayout[0].length, caveH = caveLayout.length;
        for (let ly = 0; ly < caveH; ly++) {
          for (let lx = 0; lx < caveW; lx++) {
            const wtx = cp.tx + lx, wty = cp.ty + ly;
            const localX = wtx - cx * S, localY = wty - cy * S;
            if (localX >= 0 && localX < S && localY >= 0 && localY < S) {
              const ct = caveLayout[ly][lx];
              tiles[localY * S + localX] = ct;
              campsiteFootprint.add(localY * S + localX); // prevent decorations
            }
          }
        }
      }
    }

    // Expand cave clearance — temporarily mark GRASS tiles near ANY cave as VOID
    // Uses world-tile distance to ALL caves (handles cross-chunk boundaries)
    const caveClearance = 10;
    const caveProtected = new Set();
    if (caveSpawnPoints.length > 0) {
      const chunkTX = cx * S, chunkTY = cy * S;
      for (const cp of caveSpawnPoints) {
        // Cave occupies tiles cp.tx..cp.tx+5, cp.ty..cp.ty+5 (6x6 layout)
        // Clearance zone: caveClearance tiles around the 6x6 bounding box
        const minWX = cp.tx - caveClearance, maxWX = cp.tx + 5 + caveClearance;
        const minWY = cp.ty - caveClearance, maxWY = cp.ty + 5 + caveClearance;
        // Clip to this chunk's local coords
        const lx0 = Math.max(0, minWX - chunkTX), lx1 = Math.min(S - 1, maxWX - chunkTX);
        const ly0 = Math.max(0, minWY - chunkTY), ly1 = Math.min(S - 1, maxWY - chunkTY);
        if (lx0 > S - 1 || lx1 < 0 || ly0 > S - 1 || ly1 < 0) continue; // no overlap
        for (let ly = ly0; ly <= ly1; ly++) {
          for (let lx = lx0; lx <= lx1; lx++) {
            const ni = ly * S + lx;
            if (tiles[ni] === T.GRASS && !campsiteFootprint.has(ni)) {
              tiles[ni] = T.VOID;
              caveProtected.add(ni);
            }
          }
        }
      }
    }

    const isDenseForest = denseForestTiles > S * S * 0.3;
    const isCampsite = campsiteTiles > S * S * 0.1;
    const isOutpost = outpostTiles > S * S * 0.1;
    const isResort = resortTiles > S * S * 0.1;

    // Scatter trees — dense forest gets many more trees
    const treeDensity = isDenseForest ? 12 + Math.floor(r()*4) : zone <= 2 ? 7 : zone <= 3 ? 5 : zone <= 4 ? 3 : 1;
    const treeClusterSize = isDenseForest ? 8 + Math.floor(r()*5) : 6 + Math.floor(r()*4);
    hPlaceTreeClusters(tiles, r, S, treeDensity + Math.floor(r()*3), treeClusterSize, 7);
    hPlaceScatterTrees(tiles, r, S, isDenseForest ? treeDensity : Math.floor(treeDensity * 0.5 + r()*2));

    // Tall grass meadows — minimal in developed zones
    const grassPatches = (isOutpost || isResort) ? 1 + Math.floor(r()*2) : zone <= 1 ? 7 + Math.floor(r()*4) : zone <= 2 ? 5 + Math.floor(r()*4) : 3 + Math.floor(r()*3);
    const grassRadius = zone <= 2 ? 6 : 5;
    hPlaceTallGrass(tiles, r, S, grassPatches, grassRadius);

    // Dense bush thickets — fewer in developed zones
    const thicketCount = (isOutpost || isResort) ? Math.floor(r()*2) : zone <= 1 ? 6 + Math.floor(r()*3) : zone <= 2 ? 4 + Math.floor(r()*3) : zone <= 3 ? 2 + Math.floor(r()*2) : Math.floor(r()*2);
    hPlaceBushThickets(tiles, r, S, thicketCount);

    // Scattered individual bushes — fewer in developed zones
    const bushGroups = (isOutpost || isResort) ? 1 + Math.floor(r()*2) : zone <= 1 ? 8 + Math.floor(r()*4) : zone <= 2 ? 6 + Math.floor(r()*3) : zone <= 3 ? 3 + Math.floor(r()*3) : 2 + Math.floor(r()*2);
    hPlaceBushes(tiles, r, S, bushGroups);
    const rockCount = zone <= 2 ? 2 + Math.floor(r()*3) : Math.floor(r()*2);
    hPlaceRocks(tiles, r, S, rockCount);
    if (r() < (zone <= 2 ? 0.35 : 0.15)) hPlaceLogs(tiles, r, S);

    // Restore cave clearance tiles back to GRASS and add to footprint for ground cover
    for (const idx of caveProtected) {
      if (tiles[idx] === T.VOID) tiles[idx] = T.GRASS;
      campsiteFootprint.add(idx);
    }

    // Campsites + cabins — ONLY in map-marked zones (purple=campsite, pink=outpost, orange=resort)
    let hasTrail = false;
    for (let i = 0; i < S*S; i++) {
      if (tiles[i]===T.DIRT || tiles[i]===T.GRAVEL || tiles[i]===T.PAVEMENT) { hasTrail = true; break; }
    }
    if (CAMPSITE_LAYOUTS.length > 0) {
      // Stamp template-based campsite layouts at anchor points (check all chunks — layouts may span boundaries)
      const chunkTX = cx * S, chunkTY = cy * S;
      for (const anchor of campsiteAnchors) {
        const localX = anchor.tx - chunkTX;
        const localY = anchor.ty - chunkTY;
        const layoutIdx = ((anchor.tx >> 1) * 7 + (anchor.ty >> 1) * 13) % CAMPSITE_LAYOUTS.length;
        const layout = CAMPSITE_LAYOUTS[layoutIdx];
        // Skip if no overlap with this chunk
        if (localX + layout.w <= 0 || localX >= S || localY + layout.h <= 0 || localY >= S) continue;
        // Stamp tiles and mark footprint
        for (let dy = 0; dy < layout.h; dy++) {
          for (let dx = 0; dx < layout.w; dx++) {
            const tx = localX + dx, ty = localY + dy;
            if (tx >= 0 && tx < S && ty >= 0 && ty < S) {
              tiles[ty * S + tx] = layout.tiles[dy * layout.w + dx];
              campsiteFootprint.add(ty * S + tx);
            }
          }
        }
        // Register trailer position from layout metadata (avoids chunk-boundary detection issues)
        if (layout.trailerBlock) {
          const tb = layout.trailerBlock;
          const ttx = localX + tb.lx, tty = localY + tb.ly;
          // Only register if the top-left corner falls within this chunk
          if (ttx >= 0 && ttx < S && tty >= 0 && tty < S) {
            _layoutTrailers.push({ x: ttx, y: tty, w: tb.w, h: tb.h, hash: (ttx*7+tty*13+cx*3+cy*5) });
          }
        }
      }
    } else if (isCampsite) {
      // Fallback: old procedural campsite if no layouts loaded
      hPlaceCampsite(tiles, r, S, r() < 0.4);
    }

    // Lodge — stamp layout in resort zones
    let lodgePlaced = false;
    if (isResort && LODGE_LAYOUTS.length > 0) {
      const chunkTX = cx * S, chunkTY = cy * S;
      for (const anchor of lodgeAnchors) {
        const localX = anchor.tx - chunkTX;
        const localY = anchor.ty - chunkTY;
        if (localX + 14 <= 0 || localX >= S || localY + 14 <= 0 || localY >= S) continue;
        const layoutIdx = ((anchor.tx >> 1) * 7 + (anchor.ty >> 1) * 13) % LODGE_LAYOUTS.length;
        const layout = LODGE_LAYOUTS[layoutIdx];
        for (let dy = 0; dy < layout.h; dy++) {
          for (let dx = 0; dx < layout.w; dx++) {
            const tx = localX + dx, ty = localY + dy;
            if (tx >= 0 && tx < S && ty >= 0 && ty < S) {
              tiles[ty * S + tx] = layout.tiles[dy * layout.w + dx];
              campsiteFootprint.add(ty * S + tx);
            }
          }
        }
        lodgePlaced = true;
      }
    }

    // Cabins — only in outpost marker zones (skip resort if lodge placed)
    if (isOutpost || (isResort && !lodgePlaced)) {
      for (let attempt = 0; attempt < 10; attempt++) {
        const bx = 3+Math.floor(r()*(S-10)), by = 3+Math.floor(r()*(S-12));
        let overlap = false;
        for (let dy = -2; dy < 8 && !overlap; dy++) for (let dx = -2; dx < 7 && !overlap; dx++) {
          const tx = bx+dx, ty = by+dy;
          if (tx>=0 && tx<S && ty>=0 && ty<S) {
            const t = tiles[ty*S+tx];
            if (t===T.TENT || t===T.CAMPFIRE || t===T.CABIN || t===T.LODGE || t===T.TRAILER || t===T.PICNIC_TABLE) overlap = true;
          }
        }
        if (!overlap) {
          for (let dy = 0; dy < 6; dy++) for (let dx = 0; dx < 5; dx++) {
            const tx = bx+dx, ty = by+dy;
            if (tx<S && ty<S) {
              if (dy >= 2) {
                const existing = tiles[ty*S+tx];
                if (existing===T.GRASS || existing===T.DIRT || existing===T.GRAVEL || existing===T.TALL_GRASS || existing===T.PAVEMENT)
                  tiles[ty*S+tx] = T.CABIN;
              }
            }
          }
          break;
        }
      }
    }

    // Humans — only spawn near trails, campsites, outposts, resorts
    if (isOutpost) {
      hSpawnHumansOnTrails(humans, tiles, r, S, cx, cy, ['RANGER','RANGER','HUNTER'], 2+Math.floor(r()*3));
    } else if (isResort) {
      hSpawnHumansOnTrails(humans, tiles, r, S, cx, cy, ['TOURIST','TOURIST','CASUAL_CAMPER','RANGER'], 3+Math.floor(r()*4));
    } else if (isCampsite) {
      hSpawnHumansOnTrails(humans, tiles, r, S, cx, cy, ['CASUAL_CAMPER','GROUP_HIKER','SOLO_HIKER'], 1+Math.floor(r()*3));
    } else if (hasTrail) {
      // Spawn hikers on trail tiles only
      const trailClasses = zone >= 4 ? ['HUNTER','RANGER','SOLO_HIKER'] : ['SOLO_HIKER','GROUP_HIKER'];
      const trailCount = r() < 0.4 ? 1 : 0;
      if (trailCount > 0) hSpawnHumansOnTrails(humans, tiles, r, S, cx, cy, trailClasses, trailCount);
    }

  } else {
    // === FALLBACK: old procedural generation if no map loaded ===
    for (let i = 0; i < S * S; i++) tiles[i] = T.GRASS;
    hPlaceTreeClusters(tiles, r, S, 4+Math.floor(r()*4), 6, 8);
    hPlaceScatterTrees(tiles, r, S, 4+Math.floor(r()*4));
    hPlaceBushes(tiles, r, S, 4+Math.floor(r()*4));
    hPlaceTallGrass(tiles, r, S, 2+Math.floor(r()*3), 4);
    hPlaceRocks(tiles, r, S, Math.floor(r()*3));
    hPlaceLogs(tiles, r, S);
    if (r()<0.3) hPlacePond(tiles, r, S);
    placeStreams(tiles, cx, cy, S);
  }

  // Cache positions for sprite overlay rendering
  const treePositions = [], bushPositions = [], cabinPositions = [];
  const rockPositions = [], logPositions = [], garbagePositions = [];
  const bushOccupied = new Set(); // track 2x2 bush footprints to prevent overlap
  for (let y = 0; y < S; y++)
    for (let x = 0; x < S; x++) {
      const tt = tiles[y * S + x];
      const h = (x*7 + y*13 + cx*3 + cy*5);
      if (tt === T.TREE || tt === T.TREE_CLIMB) treePositions.push({ x, y, hash: h });
      if (tt === T.BUSH) {
        const bh = (x*11+y*7+cx*9+cy*3);
        const isLarge = bh % 3 === 0;
        if (isLarge) {
          // Check if any of the 2x2 footprint tiles are already claimed by another large bush

      } else if (t === T.GRAVEL && spritesLoaded && SHEETS.gravelCentre && SHEETS.gravelCentre.img) {
        // Gravel tiles: sprite-based with variants
        const wtx = cx * S + x, wty = cy * S + y;
        const gv = spriteVar(wtx, wty, 8, 53);
        let gravelImg = SHEETS.gravelCentre.img;
        if (gv === 0 && SHEETS.gravelEdge.img) gravelImg = SHEETS.gravelEdge.img;
        else if (gv === 1 && SHEETS.gravelEdgeAlt.img) gravelImg = SHEETS.gravelEdgeAlt.img;
        else if (gv === 2 && SHEETS.gravelEdgeAlt2.img) gravelImg = SHEETS.gravelEdgeAlt2.img;
        else if (gv === 3 && SHEETS.gravelCentreAlt && SHEETS.gravelCentreAlt.img) gravelImg = SHEETS.gravelCentreAlt.img;
        ox.drawImage(gravelImg, 0, 0, 16, 16, x * TS, y * TS, TS, TS);
        // Overlay dark gravel cover on edge/alt tiles + ~20% of centre tiles
        if ((gv <= 2 || gv >= 5) && SHEETS.darkGravelCover && SHEETS.darkGravelCover.img) {
          ox.drawImage(SHEETS.darkGravelCover.img, 0, 0, 16, 16, x * TS, y * TS, TS, TS);
        }
      } else {
        ox.fillStyle = td.col;
        ox.fillRect(x * TS, y * TS, TS, TS);
      }
      // Trail transition tiles — adjacency-based sprite selection
      if (t === T.DIRT && spritesLoaded) {
        const wtx = cx * S + x, wty = cy * S + y;
        const gN = isGrassLike(getWorldTile(wtx, wty - 1)) ? 1 : 0;
        const gS = isGrassLike(getWorldTile(wtx, wty + 1)) ? 1 : 0;
        const gW = isGrassLike(getWorldTile(wtx - 1, wty)) ? 1 : 0;
        const gE = isGrassLike(getWorldTile(wtx + 1, wty)) ? 1 : 0;
        const mask = (gN << 3) | (gS << 2) | (gW << 1) | gE;
        let sheetKey = TRAIL_TILES[mask] || 'trailCentre';
        // Sprinkle trail centre variants for visual variety
        if (sheetKey === 'trailCentre') {
          const tv = spriteVar(wtx, wty, 12, 77);
          if (tv === 0) sheetKey = 'trailRocks';
          else if (tv === 1) sheetKey = 'trailRocksAlt';
          else if (tv === 2) sheetKey = 'trailGrass';
          else if (tv === 3) sheetKey = 'trailGrassRocks';
          else if (tv === 4) sheetKey = 'trailGrassRocksAlt';
        }
        const img = SHEETS[sheetKey] && SHEETS[sheetKey].img;
        if (img) {
          ox.drawImage(img, 0, 0, 16, 16, x * TS, y * TS, TS, TS);
        }
        // Outside corners — per-diagonal grass notches with proper flipping
        // topCornOut has grass notch at bottom-left; botCornOut has grass at top-left
        // Flip horizontally to get the right-side variants
        const gNW = !gN && !gW && isGrassLike(getWorldTile(wtx - 1, wty - 1));
        const gNE = !gN && !gE && isGrassLike(getWorldTile(wtx + 1, wty - 1));
        const gSW = !gS && !gW && isGrassLike(getWorldTile(wtx - 1, wty + 1));
        const gSE = !gS && !gE && isGrassLike(getWorldTile(wtx + 1, wty + 1));
        const topOImg = SHEETS.gtTopCornOut && SHEETS.gtTopCornOut.img;
        const botOImg = SHEETS.gtBotCornOut && SHEETS.gtBotCornOut.img;
        const px = x * TS, py = y * TS;
        // NW: grass in top-left → botCornOut (grass at top-left), no flip, clip top-left
        if (gNW && botOImg) {
          ox.save(); ox.beginPath(); ox.rect(px, py, TS >> 1, TS >> 1); ox.clip();
          ox.drawImage(botOImg, 0, 0, 16, 16, px, py, TS, TS);
          ox.restore();
        }
        // NE: grass in top-right → botCornOut flipped H, clip top-right
        if (gNE && botOImg) {
          ox.save(); ox.beginPath(); ox.rect(px + (TS >> 1), py, TS >> 1, TS >> 1); ox.clip();
          ox.translate(px + TS, py); ox.scale(-1, 1);
          ox.drawImage(botOImg, 0, 0, 16, 16, 0, 0, TS, TS);
          ox.restore();
        }
        // SW: grass in bottom-left → topCornOut (grass at bottom-left), clip bottom-left
        if (gSW && topOImg) {
          ox.save(); ox.beginPath(); ox.rect(px, py + (TS >> 1), TS >> 1, TS >> 1); ox.clip();
          ox.drawImage(topOImg, 0, 0, 16, 16, px, py, TS, TS);
          ox.restore();
        }
        // SE: grass in bottom-right → topCornOut flipped H, clip bottom-right
        if (gSE && topOImg) {
          ox.save(); ox.beginPath(); ox.rect(px + (TS >> 1), py + (TS >> 1), TS >> 1, TS >> 1); ox.clip();
          ox.translate(px + TS, py); ox.scale(-1, 1);
          ox.drawImage(topOImg, 0, 0, 16, 16, 0, 0, TS, TS);
          ox.restore();
        }
      }
      // Dark gravel cover on grass/trail tiles adjacent to gravel (sparse scatter)
      if ((t === T.GRASS || t === T.TALL_GRASS || t === T.DIRT) && SHEETS.darkGravelCover && SHEETS.darkGravelCover.img) {
        var wtx2 = cx * S + x, wty2 = cy * S + y;
        var adjGravel = getWorldTile(wtx2, wty2 - 1) === T.GRAVEL ||
                        getWorldTile(wtx2, wty2 + 1) === T.GRAVEL ||
                        getWorldTile(wtx2 - 1, wty2) === T.GRAVEL ||
                        getWorldTile(wtx2 + 1, wty2) === T.GRAVEL;
        if (adjGravel && spriteVar(wtx2, wty2, 8, 47) === 0) {
          ox.drawImage(SHEETS.darkGravelCover.img, 0, 0, 16, 16, x * TS, y * TS, TS, TS);
        }
      }
      // Ground decorations — only ONE per tile, no overlapping, skip occupied tiles
      if ((t === T.GRASS || t === T.TALL_GRASS) && spritesLoaded &&
          !(chunk.occupied2x2 && chunk.occupied2x2.has(y*S+x)) &&
          !(chunk.occupied1x1 && chunk.occupied1x1.has(y*S+x))) {
        // Dense grasses — 3-in-4 tiles, 1-3 sprites per tile, randomized placement
        var grassDeco = spriteVar(cx*S+x, cy*S+y, 4, 99);
        if (grassDeco !== 0 && SHEETS.grasses.img) {
          var wx = cx*S+x, wy = cy*S+y;
          var grassCount = 1 + spriteVar(wx, wy, 3, 88);
          for (var gi = 0; gi < grassCount; gi++) {
            var g = ATLAS.grass[spriteVar(wx + gi * 137, wy + gi * 311, ATLAS.grass.length, 31 + gi * 7)];
            var gx = spriteVar(wx + gi * 251, wy + gi * 439, TS - g.w, 50 + gi * 13);
            var gy = spriteVar(wx + gi * 353, wy + gi * 197, TS - g.h, 60 + gi * 17);
            ox.drawImage(SHEETS.grasses.img, g.x, g.y, g.w, g.h,
              x*TS + gx, y*TS + gy, g.w, g.h);
          }
        }
        const deco = spriteVar(cx*S+x, cy*S+y, 30, 71); // 1-in-30 hash picks type
        if (deco === 1 && SHEETS.mushrooms.img) {
          // Mushroom — ~3.3% of grass tiles (deco 1 only), half size, pixel-snapped
          const mKey = (cx*S+x) + ',' + (cy*S+y);
          const mEaten = eatenMushrooms[mKey];
          const mGone = mEaten && (now/1000 - mEaten) < MUSHROOM_REPLENISH;
          if (!mGone) {
            if (mEaten && !mGone) delete eatenMushrooms[mKey]; // cleanup expired
            const m = ATLAS.mushrooms[spriteVar(cx*S+x, cy*S+y, ATLAS.mushrooms.length, 41)];
            const mw = m.w >> 1, mh = m.h >> 1; // half size, integer division
            ox.drawImage(SHEETS.mushrooms.img, m.x, m.y, m.w, m.h,
              x*TS + ((TS - mw) >> 1), y*TS + ((TS - mh) >> 1), mw, mh);
          }
        } else if (deco === 2 && SHEETS.slrg.img) {
          // Stick/rock only (reduced — no loose logs on ground)
          const items = [ATLAS.stick, ATLAS.rock];
          const itm = items[spriteVar(cx*S+x, cy*S+y, items.length, 59)];
          ox.drawImage(SHEETS.slrg.img, itm.x, itm.y, itm.w, itm.h,
            x*TS + Math.floor((TS-itm.w)/2), y*TS + Math.floor((TS-itm.h)/2), itm.w, itm.h);
        }
      }
      // (Dirt edge softening and tall grass blades removed — sprites handle these now)
      // Tree, Bush, Rock, Log, Garbage — sprites drawn in Y-sort pass, just grass base here
      // Tent + Campfire — sprites drawn in Y-sort pass, just dirt base here
      if (t === T.CAMPFIRE) {
        // Minimal ground mark (sprite drawn in Y-sort)
        ox.fillStyle = '#5a5a5a';
        for (let i = 0; i < 8; i++) {
          const a = i * Math.PI / 4;
          ox.fillRect(x*TS+7+Math.cos(a)*6, y*TS+7+Math.sin(a)*6, 3, 3);
        }
        // Logs
        ox.fillStyle = '#4a2a10';
        ox.fillRect(x*TS+4, y*TS+7, 8, 2);
        ox.fillRect(x*TS+7, y*TS+4, 2, 8);
        // Fire
        ox.fillStyle = '#e06020';
        ox.fillRect(x*TS+5, y*TS+4, 6, 7);
        ox.fillStyle = '#ff9030';
        ox.fillRect(x*TS+6, y*TS+3, 4, 5);
        ox.fillStyle = '#ffcc40';
        ox.fillRect(x*TS+7, y*TS+2, 2, 4);
      }
      // Pavement — sprite-based road transitions with adjacency mirroring
      if (t === T.PAVEMENT && spritesLoaded) {
        const wtx = cx * S + x, wty = cy * S + y;
        const gN = !isRoadLike(getTile(wtx, wty - 1)) ? 1 : 0;
        const gS = !isRoadLike(getTile(wtx, wty + 1)) ? 1 : 0;
        const gW = !isRoadLike(getTile(wtx - 1, wty)) ? 1 : 0;
        const gE = !isRoadLike(getTile(wtx + 1, wty)) ? 1 : 0;
        const mask = (gN << 3) | (gS << 2) | (gW << 1) | gE;
        const entry = ROAD_TILES[mask] || { key: 'roadCentre' };
        // Pick variant for top edge tiles
        let sheetKey = entry.key;
        if (entry.variants) {
          const rv = spriteVar(wtx, wty, 4, 99);
          if (rv === 0 && SHEETS.roadTop2 && SHEETS.roadTop2.img) sheetKey = 'roadTop2';
        }
        const rImg = SHEETS[sheetKey] && SHEETS[sheetKey].img;
        if (rImg) {
          const px = x * TS, py = y * TS;
          if (entry.flipH || entry.flipV) {
            ox.save();
            if (entry.flipH && entry.flipV) {
              ox.translate(px + TS, py + TS); ox.scale(-1, -1);
              ox.drawImage(rImg, 0, 0, 16, 16, 0, 0, TS, TS);
            } else if (entry.flipH) {
              ox.translate(px + TS, py); ox.scale(-1, 1);
              ox.drawImage(rImg, 0, 0, 16, 16, 0, 0, TS, TS);
            } else {
              ox.translate(px, py + TS); ox.scale(1, -1);
              ox.drawImage(rImg, 0, 0, 16, 16, 0, 0, TS, TS);
            }
            ox.restore();
          } else {
            ox.drawImage(rImg, 0, 0, 16, 16, px, py, TS, TS);
          }
        } else {
          // Fallback: procedural gray
          ox.fillStyle = '#707070';
          ox.fillRect(x*TS, y*TS, TS, TS);
        }
      } else if (t === T.PAVEMENT) {
        ox.fillStyle = '#707070';
        ox.fillRect(x*TS, y*TS, TS, TS);
      }
      // Cave tiles — dark rock walls and floor
      if (t === T.CAVE_WALL) {
        ox.fillStyle = '#3a3a3a';
        ox.fillRect(x*TS, y*TS, TS, TS);
        // Procedural stone texture
        const sh = (x * 17 + y * 31 + cx * 7) % 5;
        if (sh < 2) { ox.fillStyle = '#333'; ox.fillRect(x*TS + (sh*3)%8, y*TS + (sh*5)%10, 3, 2); }
        if (sh === 3) { ox.fillStyle = '#444'; ox.fillRect(x*TS+4, y*TS+6, 2, 3); }
      }
      if (t === T.CAVE_FLOOR) {
        ox.fillStyle = '#2a2a2a';
        ox.fillRect(x*TS, y*TS, TS, TS);
        // Subtle floor variation
        const fh = (x * 11 + y * 23 + cx * 5) % 7;
        if (fh < 2) { ox.fillStyle = '#252525'; ox.fillRect(x*TS + fh*4, y*TS + 3, 2, 2); }
      }
      // Cabin/Lodge footprint — render as grass in overworld (sprite covers it visually)
      if (t === T.CABIN || t === T.LODGE || t === T.TRAILER) {
        if (useGrassSprite) {
          const wtx2 = cx * S + x, wty2 = cy * S + y;
          const gv2 = spriteVar(wtx2, wty2, 12, 91);
          let cabinGrassImg = SHEETS.grassCentre.img;
          if (gv2 === 0 && SHEETS.grassCentreAlt && SHEETS.grassCentreAlt.img) cabinGrassImg = SHEETS.grassCentreAlt.img;
          else if ((gv2 === 1 || gv2 === 3) && SHEETS.grassGrass && SHEETS.grassGrass.img) cabinGrassImg = SHEETS.grassGrass.img;
          else if (gv2 === 2 && SHEETS.grassWeed && SHEETS.grassWeed.img) cabinGrassImg = SHEETS.grassWeed.img;
          ox.drawImage(cabinGrassImg, 0, 0, 16, 16, x * TS, y * TS, TS, TS);
        } else {
          ox.fillStyle = '#3a8a3a';
          ox.fillRect(x*TS, y*TS, TS, TS);
        }
      }
      // Void (dead zone)
      if (t === T.VOID) {
        ox.fillStyle = '#0a0a2a';
        ox.fillRect(x*TS, y*TS, TS, TS);
      }
      // Water shimmer
      if (t === T.WATER_S || t === T.WATER_D) {
        ox.fillStyle = 'rgba(255,255,255,0.1)';
        if ((x+y) % 2 === 0) ox.fillRect(x*TS+2, y*TS+4, 5, 1);
        if ((x+y) % 3 === 0) ox.fillRect(x*TS+8, y*TS+10, 4, 1);
        // Deeper water darker center highlight
        if (t === T.WATER_D) {
          ox.fillStyle = 'rgba(0,20,60,0.1)';
          ox.fillRect(x*TS+3, y*TS+3, 10, 10);
        }
      }
      // Water edge sprites — decorations where shallow water meets land
      if (t === T.WATER_S && spritesLoaded) {
        // Check if adjacent to land
        const hasLandN = y > 0 && TDATA[chunk.tiles[(y-1)*S+x]] && TDATA[chunk.tiles[(y-1)*S+x]].walk && !TDATA[chunk.tiles[(y-1)*S+x]].swim && chunk.tiles[(y-1)*S+x] !== T.WATER_S;
        const hasLandS = y < S-1 && TDATA[chunk.tiles[(y+1)*S+x]] && TDATA[chunk.tiles[(y+1)*S+x]].walk && !TDATA[chunk.tiles[(y+1)*S+x]].swim && chunk.tiles[(y+1)*S+x] !== T.WATER_S;
        const hasLandW = x > 0 && TDATA[chunk.tiles[y*S+(x-1)]] && TDATA[chunk.tiles[y*S+(x-1)]].walk && !TDATA[chunk.tiles[y*S+(x-1)]].swim && chunk.tiles[y*S+(x-1)] !== T.WATER_S;
        const hasLandE = x < S-1 && TDATA[chunk.tiles[y*S+(x+1)]] && TDATA[chunk.tiles[y*S+(x+1)]].walk && !TDATA[chunk.tiles[y*S+(x+1)]].swim && chunk.tiles[y*S+(x+1)] !== T.WATER_S;
        if (hasLandN || hasLandS || hasLandW || hasLandE) {
          const wtx = cx * S + x, wty = cy * S + y;
          const wv = spriteVar(wtx, wty, 5, 67);
          const weKeys = ['waterEdge1','waterEdge2','waterEdge3','waterEdge4','waterEdge5'];
          const weImg = SHEETS[weKeys[wv]] && SHEETS[weKeys[wv]].img;
          if (weImg) {
            ox.drawImage(weImg, 0, 0, 16, 16, x * TS, y * TS, TS, TS);
          }
        }
      }
    }
  }
  chunkCanvases[key] = oc;
}

function ensureChunks(wx, wy) {
  if (!wx && !wy) return; // no-op call
  const TS = CFG.TILE, CS = CFG.CHUNK;
  const ccx = Math.floor(wx / (TS * CS));
  const ccy = Math.floor(wy / (TS * CS));
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const ncx = ccx + dx, ncy = ccy + dy;
      if (ncx < 0 || ncx >= CFG.MAP_CHUNKS || ncy < 0 || ncy >= CFG.MAP_CHUNKS) continue;
      const key = chunkKey(ncx, ncy);
      if (!chunks[key]) {
        const chunk = generateChunk(ncx, ncy);
        if (chunk) { chunks[key] = chunk; prerenderChunk(ncx, ncy); }
      }
    }
  }
}

function getTile(worldTileX, worldTileY) {
  // Interior override — use interior map tiles instead of chunk data
  if (interiorState) {
    const m = interiorState.map;
    if (worldTileX < 0 || worldTileX >= m.width || worldTileY < 0 || worldTileY >= m.height)
      return T.VOID;
    return m.tiles[worldTileY * m.width + worldTileX];
  }
  return getWorldTile(worldTileX, worldTileY);
}

// Direct world tile lookup — bypasses interiorState (used by prerenderChunk)
function getWorldTile(worldTileX, worldTileY) {
  if (worldTileX < 0 || worldTileX >= CFG.MAP_TILES || worldTileY < 0 || worldTileY >= CFG.MAP_TILES)
    return T.VOID;
  const CS = CFG.CHUNK;
  const cx = Math.floor(worldTileX / CS);
  const cy = Math.floor(worldTileY / CS);
  const key = chunkKey(cx, cy);
  const chunk = chunks[key];
  if (!chunk) {
    // Fall back to map template for adjacency during background generation
    if (mapTiles) return mapTiles[worldTileY * CFG.MAP_TILES + worldTileX];
    return T.VOID;
  }
  const lx = worldTileX - cx * CS;
  const ly = worldTileY - cy * CS;
  return chunk.tiles[ly * CS + lx];
}

function getTileAt(wx, wy) {
  return getTile(Math.floor(wx / CFG.TILE), Math.floor(wy / CFG.TILE));
}

// ============================================================
// BEAR
// ============================================================
function mkBear() {
  return {
    x: CFG.MAP_CENTER_PX,
    y: CFG.MAP_CENTER_PX,
    vx: 0, vy: 0,
    facing: 0,           // angle in radians
    facingX: 0, facingY: 1,
    state: 'idle',       // idle, walk, sprint, sneak, swim, light, heavy, eat, hurt, climbing
    hp:     CFG.MAX_HP,
    stam:   CFG.MAX_STAM,
    hunger: CFG.MAX_HUNGER,
    noise:  0,
    attackCD: 0,
    attackType: null,     // 'light' or 'heavy' — for render
    eatTimer: 0,
    eatStart: 0,
    hurtTimer: 0,
    climbing: false,      // in a tree
    climbTree: null,      // {tx, ty} tile coords of tree being climbed
    jumping: false,       // mantling over 2x2 stump/log
    jumpStart: 0,         // timestamp when jump began
    animFrame: 0,
    animTimer: 0,
    buffs: [],           // {type, duration, strength}
    // Stats for death screen
    stats: { tilesWalked:0, humansEaten:0, berriesEaten:0, fishEaten:0, garbageEaten:0, foodEaten:0, treesClimbed:0, attacks:0 },
    skin: 'default',
  };
}

let bear = null;

function updateBear(dt) {
  const b = bear;
  pollInput();

  // Determine movement state
  let spd = 0;
  let moveState = 'idle';
  const moving = input.mx !== 0 || input.my !== 0;

  // Snap camera back to bear when player moves
  if (panDetached && moving) { panDetached = false; panActive = false; }

  if (b.attackCD > 0) b.attackCD -= dt;
  if (b.hurtTimer > 0) { b.hurtTimer -= dt; }
  if (b.eatTimer > 0) {
    b.eatTimer -= dt;
    b.state = 'eat';
    clearInputFlags();
    return;
  }

  // Climbing state — bear is in a tree
  if (b.climbing) {
    b.state = 'climbing';
    // Can descend with E or any movement
    if (input.interact || moving) {
      b.climbing = false;
      b.climbTree = null;
      // Push bear to nearest walkable tile adjacent to the tree
      const TS = CFG.TILE;
      const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      for (const [ddx,ddy] of dirs) {
        const checkX = Math.floor(b.x/TS) + ddx;
        const checkY = Math.floor((b.y + CFG.BEAR_FOOT_OFS)/TS) + ddy;
        const ct = getTile(checkX, checkY);
        if (TDATA[ct].walk) {
          b.x = checkX * TS + TS/2;
          b.y = checkY * TS + TS/2 - CFG.BEAR_FOOT_OFS;
          break;
        }
      }
    }
    clearInputFlags();
    // Still tick hunger/buffs while climbing
    b.hunger = Math.max(0, b.hunger - CFG.HUNGER_RATE * dt * 0.5);
    b.stam = Math.min(CFG.MAX_STAM, b.stam + CFG.STAM_REGEN * 0.5 * dt);
    updateNoise(dt);
    return;
  }

  // Check terrain for swimming — use foot offset so tile matches visual feet
  const terrainTile = getTileAt(b.x, b.y + CFG.BEAR_FOOT_OFS);
  const td = TDATA[terrainTile];
  const tileIsWater = !!td.swim;
  // Hysteresis: once swimming, stay swimming for a short grace period to prevent edge flickering
  if (tileIsWater) {
    b._swimTimer = 0.3; // 300ms grace period
  } else if (b._swimTimer > 0) {
    b._swimTimer -= dt;
  }
  const swimming = tileIsWater || (b._swimTimer > 0);

  // Set swim state even when idle so rendering stays consistent
  if (swimming && !moving) moveState = 'swim';

  if (moving) {
    if (swimming) {
      moveState = 'swim';
      spd = CFG.BEAR_SWIM;
    } else if (input.sneak) {
      moveState = 'sneak';
      spd = CFG.BEAR_SNEAK;
    } else if (input.sprint && b.stam > CFG.SPRINT_MIN) {
      moveState = 'sprint';
      spd = CFG.BEAR_SPRINT;
      b.stam = Math.max(0, b.stam - CFG.STAM_SPRINT * dt);
    } else {
      moveState = 'walk';
      spd = CFG.BEAR_WALK;
    }
    b.facingX = input.mx;
    b.facingY = input.my;
    b.facing = Math.atan2(input.my, input.mx);
  }

  // Apply terrain speed modifier (swim already handled)
  if (!swimming) spd *= td.spd;

  // Apply buff/debuff speed modifiers
  for (const buff of b.buffs) {
    if (buff.type === 'speed') spd *= buff.strength;
    if (buff.type === 'slow')  spd *= buff.strength;
  }

  // Slow down 20% when mantling over stumps/logs
  if (b.jumping) spd *= 0.8;

  // Move
  let nx = b.x + input.mx * spd * dt;
  let ny = b.y + input.my * spd * dt;

  // Collision with solid tiles — check corners
  // Bears can walk into swim tiles but not other non-walkable tiles
  const hw = CFG.BEAR_W / 2, hh = CFG.BEAR_H / 2;
  const fo = CFG.BEAR_FOOT_OFS; // collision box aligned to visual feet (-16)
  function canEnter(wx, wy) {
    const t = getTileAt(wx, wy);
    return TDATA[t].walk; // trees block movement — climb only via E interact
  }
  // X axis
  if (input.mx !== 0) {
    const testX = input.mx > 0 ? nx + hw : nx - hw;
    if (!canEnter(testX, b.y + fo - hh + 1) || !canEnter(testX, b.y + fo + hh - 1)) nx = b.x;
  }
  // Y axis
  if (input.my !== 0) {
    const testY = input.my > 0 ? ny + fo + hh : ny + fo - hh;
    if (!canEnter(nx - hw + 1, testY) || !canEnter(nx + hw - 1, testY)) ny = b.y;
  }
  // Track distance
  const distMoved = Math.sqrt((nx-b.x)*(nx-b.x)+(ny-b.y)*(ny-b.y));
  b.stats.tilesWalked += distMoved / CFG.TILE;
  b.x = nx; b.y = ny;
  // Clamp to map/interior boundaries
  if (interiorState) {
    const mw = interiorState.map.width * CFG.TILE;
    const mh = interiorState.map.height * CFG.TILE;
    b.x = Math.max(hw, Math.min(mw - hw, b.x));
    // Y clamp accounts for foot offset: collision box (y+fo±hh) stays within map
    b.y = Math.max(hh - fo, Math.min(mh - hh - fo, b.y));
  } else {
    const bMin = CFG.BEAR_W / 2, bMax = CFG.MAP_PX - CFG.BEAR_W / 2;
    b.x = Math.max(bMin, Math.min(bMax, b.x));
    b.y = Math.max(bMin, Math.min(bMax, b.y));
  }
  b.state = moveState;

  // Jump animation — trigger when bear walks over a 2x2 stump or large log
  if (b.jumping) {
    // Jump plays for 7 frames at 0.08s each = 0.56s total
    if (now - b.jumpStart > 7 * 80) {
      b.jumping = false;
    }
  }
  if (!b.jumping && moving && !swimming && (now - b.jumpStart > 1000)) {
    const TS = CFG.TILE, fo = CFG.BEAR_FOOT_OFS;
    const ftx = Math.floor(b.x / TS), fty = Math.floor((b.y + fo) / TS);
    const ck = chunkKey(Math.floor(ftx / CFG.CHUNK), Math.floor(fty / CFG.CHUNK));
    const ch = chunks[ck];
    if (ch) {
      const lx = ftx - Math.floor(ftx / CFG.CHUNK) * CFG.CHUNK;
      const ly = fty - Math.floor(fty / CFG.CHUNK) * CFG.CHUNK;
      const idx = ly * CFG.CHUNK + lx;
      if (ch.occupied2x2 && ch.occupied2x2.has(idx)) {
        // Check it's a stump or log (not a bush/tree/cabin which also occupy 2x2)
        const isStump = ch.stump2x2Positions && ch.stump2x2Positions.some(p =>
          lx >= p.x && lx <= p.x + 1 && ly >= p.y && ly <= p.y + 1);
        const isLog = ch.logLgPositions && ch.logLgPositions.some(p =>
          lx >= p.x && lx <= p.x + 1 && ly >= p.y && ly <= p.y + 1);
        if (isStump || isLog) {
          b.jumping = true;
          b.jumpStart = now;
        }
      }
    }
  }

  // Stamina regen when not sprinting
  if (moveState !== 'sprint') {
    b.stam = Math.min(CFG.MAX_STAM, b.stam + CFG.STAM_REGEN * dt);
  }
  // Swimming drains stamina slowly
  if (swimming) {
    b.stam = Math.max(0, b.stam - 5 * dt);
    if (b.stam <= 0) {
      b.hp = Math.max(0, b.hp - 8 * dt); // drowning
    }
  }
  // Focus listening drains stamina
  if (focusListening) {
    b.stam = Math.max(0, b.stam - CFG.SOUND_FOCUS_STAMINA * dt);
    if (b.stam <= 0) focusListening = false;
  }

  // Light attack (Space)
  if (input.lightAtk && b.attackCD <= 0 && b.stam >= CFG.STAM_LIGHT && !swimming) {
    b.state = 'light';
    b.attackType = 'light';
    b.attackCD = CFG.LIGHT_CD;
    b.stam -= CFG.STAM_LIGHT;
    performAttack('light');
  }

  // Heavy attack (Q)
  if (input.heavyAtk && b.attackCD <= 0 && b.stam >= CFG.STAM_HEAVY && !swimming) {
    b.state = 'heavy';
    b.attackType = 'heavy';
    b.attackCD = CFG.HEAVY_CD;
    b.stam -= CFG.STAM_HEAVY;
    performAttack('heavy');
  }

  // Interact (E key) — cabin entry, food, garbage, or climb tree
  if (input.interact) {
    if (!tryEnterCabin()) {
      tryInteract();
    }
  }
  if (input.climb) {
    tryClimbTree();
  }

  // Auto cave entry/exit — no prompt needed, walk in and out
  if (moving && !transition && transitionCooldown <= 0) {
    tryAutoCave();
  }

  // Noise
  updateNoise(dt);

  // Hunger
  if (CFG.GOD_MODE) {
    b.hp = CFG.MAX_HP; b.stam = CFG.MAX_STAM; b.hunger = CFG.MAX_HUNGER;
  } else {
    b.hunger = Math.max(0, b.hunger - CFG.HUNGER_RATE * dt);
    if (b.hunger <= 0) b.hp = Math.max(0, b.hp - 2 * dt);
  }

  // Buffs tick down
  for (let i = b.buffs.length - 1; i >= 0; i--) {
    b.buffs[i].duration -= dt;
    if (b.buffs[i].duration <= 0) b.buffs.splice(i, 1);
  }

  // Nausea wobble (from garbage)
  // (handled in render)

  // Animation
  if (moving) {
    b.animTimer += dt;
    if (b.animTimer > 0.15) { b.animTimer = 0; b.animFrame = (b.animFrame + 1) % 4; }
  } else {
    b.animFrame = 0; b.animTimer = 0;
  }

  // SFX cooldowns
  if (sfxSnarlCD > 0) sfxSnarlCD -= dt;
  if (sfxCampsiteCD > 0) sfxCampsiteCD -= dt;
  if (sfxDoorCD > 0) sfxDoorCD -= dt;

  // Game over
  if (b.hp <= 0 && !CFG.GOD_MODE) {
    gameState = 'GAME_OVER';
    saveScore();
  }

  clearInputFlags();
}

function updateNoise(dt) {
  let target = CFG.NOISE_IDLE;
  switch (bear.state) {
    case 'sneak':    target = CFG.NOISE_SNEAK;  break;
    case 'walk':     target = CFG.NOISE_WALK;   break;
    case 'sprint':   target = CFG.NOISE_SPRINT; break;
    case 'swim':     target = CFG.NOISE_SWIM;   break;
    case 'light':    target = CFG.NOISE_LIGHT;  break;
    case 'heavy':    target = CFG.NOISE_HEAVY;  break;
    case 'eat':      target = 0.3; break;
    case 'climbing': target = 0.02; break;
  }
  // Terrain modifier — use foot offset for correct tile
  const t = getTileAt(bear.x, bear.y + CFG.BEAR_FOOT_OFS);
  target *= TDATA[t].noise || 1;
  bear.noise += (target - bear.noise) * Math.min(1, CFG.NOISE_DECAY * dt);
}

// ============================================================
// HUMANS
// ============================================================
let humans = [];

function mkHuman(classKey, x, y, facing) {
  const cls = HCLASS[classKey];
  return {
    x, y, vx:0, vy:0,
    w:10, h:14,
    classKey,
    facing: facing || 0,
    hp: cls.hp,
    aiState: 'UNAWARE',
    lockedState: null,
    detection: 0,
    lastKnownX: 0, lastKnownY: 0,
    investigateTimer: 0,
    patrolPoints: [],
    patrolIdx: 0,
    patrolWait: 0,
    animFrame: 0,
    animTimer: 0,
    state: 'idle',
    inventory: [...cls.drops],
    alive: true,
    chunk: null, // which chunk spawned this
  };
}

// Build the global humans array from all chunks (called once after map loads)
function buildHumansList() {
  humans = [];
  for (const key in chunks) {
    for (const h of chunks[key].humans) {
      if (h.alive) humans.push(h);
    }
  }
}

function updateHumans(dt) {
  // Remove dead humans (swap-and-pop for O(1) removal)
  for (let i = humans.length - 1; i >= 0; i--) {
    if (!humans[i].alive) {
      humans[i] = humans[humans.length - 1];
      humans.pop();
    }
  }

  // Night sheltering — humans enter tents/cabins/trailers when darkness > 0.5
  const isNightTime = dayNightDarkness > 0.5;
  const shelterRange = 64; // px — humans within 4 tiles of shelter will go inside
  const shelterRangeSq = shelterRange * shelterRange;

  // Only run AI for humans within ~5 chunks of the bear
  const aiRange = CFG.CHUNK * CFG.TILE * 5;
  const aiRangeSq = aiRange * aiRange;
  for (const h of humans) {
    // Night shelter check — shelter/unshelter based on darkness
    if (isNightTime && !h._sheltered && h.aiState === 'UNAWARE') {
      // Find nearby shelter tile (tent, cabin, trailer, entrance)
      const TS = CFG.TILE;
      const htx = Math.floor(h.x / TS), hty = Math.floor(h.y / TS);
      let foundShelter = false;
      for (let dy = -4; dy <= 4 && !foundShelter; dy++) {
        for (let dx = -4; dx <= 4 && !foundShelter; dx++) {
          const st = getWorldTile(htx + dx, hty + dy);
          if (st === T.TENT || st === T.CABIN || st === T.TRAILER || st === T.ENTRANCE) {
            // Move to shelter and hide
            h._sheltered = true;
            h._shelterReturnX = h.x;
            h._shelterReturnY = h.y;
            h.x = (htx + dx) * TS + (TS >> 1);
            h.y = (hty + dy) * TS + (TS >> 1);
            h.vx = 0; h.vy = 0;
            foundShelter = true;
          }
        }
      }
    } else if (!isNightTime && h._sheltered) {
      // Dawn — return to original position
      h.x = h._shelterReturnX;
      h.y = h._shelterReturnY;
      h._sheltered = false;
    }

    // Sheltered humans skip AI and are invisible/silent
    if (h._sheltered) continue;

    const dx = h.x - bear.x, dy = h.y - bear.y;
    if (dx * dx + dy * dy > aiRangeSq) continue;
    updateHumanAI(h, dt);
    // Animation
    const moving = h.vx !== 0 || h.vy !== 0;
    if (moving) {
      h.animTimer += dt;
      if (h.animTimer > 0.2) { h.animTimer = 0; h.animFrame = (h.animFrame + 1) % 4; }
    } else { h.animFrame = 0; }
  }
}

function updateHumanAI(h, dt) {
  const cls = HCLASS[h.classKey];
  const b = bear;

  // Detection
  const noiseInput = calcNoise(b, h);
  const visionInput = calcVision(h, b);
  const combined = Math.max(noiseInput, visionInput) * cls.detectRate;

  if (combined > 0.01) {
    h.detection = Math.min(1, h.detection + combined * dt);
    h.lastKnownX = b.x;
    h.lastKnownY = b.y + CFG.BEAR_FOOT_OFS;
  } else {
    h.detection = Math.max(0, h.detection - 0.15 * dt);
  }

  // State transitions — once locked into PANICKED or DEFENSIVE, stay until detection drops low
  const prev = h.aiState;
  if (h.lockedState) {
    // Stay locked until detection drops below suspicious
    if (h.detection < CFG.DETECT_SUSPICIOUS) {
      h.lockedState = null;
      h.aiState = 'UNAWARE';
    } else {
      h.aiState = h.lockedState;
    }
  } else if (h.detection >= CFG.DETECT_ALERT) {
    h.aiState = cls.aggro ? 'DEFENSIVE' : 'PANICKED';
    h.lockedState = h.aiState; // lock the choice
  } else if (h.detection >= CFG.DETECT_INVESTIGATE) {
    h.aiState = 'INVESTIGATING';
  } else if (h.detection >= CFG.DETECT_SUSPICIOUS) {
    h.aiState = 'SUSPICIOUS';
  } else {
    h.aiState = 'UNAWARE';
  }

  // Behavior per state
  h.vx = 0; h.vy = 0;
  switch (h.aiState) {
    case 'UNAWARE':
      aiPatrol(h, dt, cls);
      break;
    case 'SUSPICIOUS':
      aiLookAround(h, dt);
      break;
    case 'INVESTIGATING':
      aiInvestigate(h, dt, cls);
      break;
    case 'PANICKED':
      aiFlee(h, b, dt, cls);
      break;
    case 'DEFENSIVE':
      aiDefend(h, b, dt, cls);
      break;
  }

  // Move
  h.x += h.vx * dt;
  h.y += h.vy * dt;

  // Clamp to map bounds
  h.x = Math.max(8, Math.min(CFG.MAP_PX - 8, h.x));
  h.y = Math.max(8, Math.min(CFG.MAP_PX - 8, h.y));
  // Keep in walkable terrain + block large obstacles for humans
  const t = getTileAt(h.x, h.y);
  let blocked = !TDATA[t].walk || t === T.WATER_S || t === T.WATER_D;
  if (!blocked) {
    // Check per-chunk humanBlocked set (stumps, large logs, etc.)
    const TS = CFG.TILE, CS = CFG.CHUNK;
    const htx = Math.floor(h.x / TS), hty = Math.floor(h.y / TS);
    const hcx = Math.floor(htx / CS), hcy = Math.floor(hty / CS);
    const hChunk = chunks[chunkKey(hcx, hcy)];
    if (hChunk && hChunk.humanBlocked) {
      const lx = htx - hcx * CS, ly = hty - hcy * CS;
      if (hChunk.humanBlocked.has(ly * CS + lx)) blocked = true;
    }
  }
  if (blocked) {
    h.x -= h.vx * dt;
    h.y -= h.vy * dt;
    h.vx = 0; h.vy = 0;
  }
}

function calcNoise(b, h) {
  const dx = b.x - h.x, dy = b.y - h.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const cls = HCLASS[h.classKey];
  if (dist > cls.hearingRange) return 0;
  const atten = 1 - dist / cls.hearingRange;
  return b.noise * atten * atten;
}

function calcVision(h, b) {
  const cls = HCLASS[h.classKey];
  const dx = b.x - h.x, dy = b.y - h.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > cls.sightRange) return 0;

  // Cone check
  const angleToBear = Math.atan2(dy, dx);
  let diff = Math.abs(angleToBear - h.facing);
  if (diff > Math.PI) diff = 2 * Math.PI - diff;
  if (diff > cls.sightCone) return 0;

  // LOS raycast
  const steps = Math.ceil(dist / CFG.TILE);
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    const tile = getTileAt(h.x + dx * t, h.y + dy * t);
    if (TDATA[tile].vision) return 0;
  }

  // Bush/tall grass hiding + tree climbing
  const bearTile = getTileAt(b.x, b.y + CFG.BEAR_FOOT_OFS);
  let hidden = 1;
  if (b.climbing) hidden = 0.05;          // nearly invisible in tree
  else if (TDATA[bearTile].hide) hidden = 0.15;

  return (1 - dist / cls.sightRange) * hidden;
}

// ── Sound Perception: Wave Emission & Update ─────────────────
function emitSoundWave(human) {
  if (!human.alive || !bear) return;
  // Silent at night when sheltered
  if (human._sheltered) return;
  const profile = SOUND_EMIT[human.aiState];
  if (!profile) return;

  // Only emit if human is within 2x max radius of bear (saves pool space)
  const mult = focusListening ? CFG.SOUND_FOCUS_RANGE_MULT : 1;
  const maxR = profile.radius * mult;
  const hdx = human.x - bear.x, hdy = human.y - bear.y;
  if (hdx * hdx + hdy * hdy > maxR * maxR * 4) return;

  // Use wall-clock time (seconds) for frame-rate-independent timing
  const wallNow = performance.now() * 0.001;
  // Stagger initial emission so all humans don't burst simultaneously
  if (human._nextSoundEmit === undefined) {
    human._nextSoundEmit = wallNow + Math.random() * profile.interval;
    return;
  }
  if (wallNow < human._nextSoundEmit) return;

  // Group proximity bonus — more frequent pulses when humans are near each other
  let nearbyCount = 0;
  const groupRange = 80; // px — count humans within ~5 tiles
  const groupRangeSq = groupRange * groupRange;
  for (const other of humans) {
    if (other === human || !other.alive) continue;
    const dx2 = human.x - other.x, dy2 = human.y - other.y;
    if (dx2 * dx2 + dy2 * dy2 < groupRangeSq) nearbyCount++;
  }
  // Each nearby human reduces interval by 15%, min 70% of base (groups pulse slightly faster)
  const groupMult = Math.max(0.7, 1 - nearbyCount * 0.15);
  human._nextSoundEmit = wallNow + profile.interval * groupMult * (0.85 + Math.random() * 0.3);

  if (soundWaves.length >= CFG.SOUND_WAVE_MAX) soundWaves.shift();
  soundWaves.push({
    x: human.x, y: human.y,
    radius: 0,
    maxRadius: profile.radius * mult,
    color: profile.color,
    alpha: 1,
    speed: CFG.SOUND_WAVE_SPEED,
    born: now,
  });
}

function updateSoundWaves(dt) {
  // Prune expired indicators (persist across frames for 2s fade)
  const now2 = performance.now() / 1000;
  for (let i = soundIndicators.length - 1; i >= 0; i--) {
    if (now2 - soundIndicators[i].time > 2.0) soundIndicators.splice(i, 1);
  }
  if (!bear) return;
  const bearFoot = bear.y + CFG.BEAR_FOOT_OFS;

  for (let i = soundWaves.length - 1; i >= 0; i--) {
    const w = soundWaves[i];
    const prevRadius = w.radius;
    w.radius += w.speed * dt;

    // Terrain attenuation: sample N points on ring circumference
    let attenuation = 0;
    const N = CFG.SOUND_SAMPLE_PTS;
    for (let s = 0; s < N; s++) {
      const ang = (s / N) * Math.PI * 2;
      const px = w.x + Math.cos(ang) * w.radius;
      const py = w.y + Math.sin(ang) * w.radius;
      const tt = getTileAt(px, py);
      const td = TDATA[tt];
      if (td && td.noise != null && td.noise < 1) {
        attenuation += (1 - td.noise) * 0.15; // only dense/solid tiles dampen
      }
    }
    w.alpha = Math.max(0, w.alpha - attenuation * dt);

    // Fade as ring approaches max radius
    const progress = w.radius / w.maxRadius;
    if (progress > CFG.SOUND_FADE_START) {
      const fadeProg = (progress - CFG.SOUND_FADE_START) / (1 - CFG.SOUND_FADE_START);
      w.alpha = Math.min(w.alpha, 1 - fadeProg);
    }

    // Kill expired
    if (w.radius >= w.maxRadius || w.alpha <= 0.01) {
      soundWaves.splice(i, 1);
      continue;
    }

    // Bear intersection: did the ring just cross the bear?
    const dx = bear.x - w.x, dy = bearFoot - w.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (prevRadius <= dist && w.radius >= dist && w.alpha > 0.05) {
      const angle = Math.atan2(w.y - bearFoot, w.x - bear.x); // point TOWARD source
      const normDist = dist / w.maxRadius;
      soundIndicators.push({
        angle, dist, normDist,
        color: w.color,
        strength: w.alpha,
        time: performance.now() / 1000
      });
    }
  }
}

function aiPatrol(h, dt, cls) {
  // Generate patrol points along nearby trail/path tiles (within +/- 5 tiles)
  if (h.patrolPoints.length === 0) {
    const r = rng(Math.floor(h.x) ^ Math.floor(h.y));
    const TS = CFG.TILE;
    // Search for trail tiles within 5 tiles — keep humans close to trails
    const trailPts = [];
    const searchR = 5;
    const htx = Math.floor(h.x / TS), hty = Math.floor(h.y / TS);
    for (let dy = -searchR; dy <= searchR; dy++) {
      for (let dx = -searchR; dx <= searchR; dx++) {
        const wx = htx + dx, wy = hty + dy;
        const t = getTile(wx, wy);
        // Trail/path tiles + tent entrances — humans walk in/out of tents
        if (t === T.DIRT || t === T.GRAVEL || t === T.PAVEMENT || t === T.BRIDGE || t === T.ENTRANCE) {
          trailPts.push({ x: wx * TS + TS / 2, y: wy * TS + TS / 2 });
        }
      }
    }
    if (trailPts.length >= 3) {
      // Pick 4-5 trail points for a longer patrol route along the path
      const numPts = 4 + Math.floor(r() * 2);
      for (let i = 0; i < numPts; i++) {
        h.patrolPoints.push(trailPts[Math.floor(r() * trailPts.length)]);
      }
    } else {
      // Fallback: small patrol near spawn
      for (let i = 0; i < 3; i++) {
        h.patrolPoints.push({
          x: h.x + (r() - 0.5) * 40,
          y: h.y + (r() - 0.5) * 40,
        });
      }
    }
  }

  if (h.patrolWait > 0) {
    h.patrolWait -= dt;
    return;
  }

  const target = h.patrolPoints[h.patrolIdx];
  const dx = target.x - h.x, dy = target.y - h.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 4) {
    h.patrolIdx = (h.patrolIdx + 1) % h.patrolPoints.length;
    h.patrolWait = 1 + Math.random() * 2;
    return;
  }
  const spd = cls.speed;
  h.vx = (dx / dist) * spd;
  h.vy = (dy / dist) * spd;
  h.facing = Math.atan2(dy, dx);
  h.state = 'walk';
}

function aiLookAround(h, dt) {
  h.state = 'idle';
  // Slowly rotate facing
  h.facing += 1.5 * dt;
}

function aiInvestigate(h, dt, cls) {
  const dx = h.lastKnownX - h.x, dy = h.lastKnownY - h.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 10) {
    // Reached last known pos, look around
    aiLookAround(h, dt);
    h.investigateTimer += dt;
    if (h.investigateTimer > 3) {
      h.detection = Math.max(0, h.detection - 0.3);
      h.investigateTimer = 0;
    }
    return;
  }
  const spd = cls.speed * 1.2;
  h.vx = (dx / dist) * spd;
  h.vy = (dy / dist) * spd;
  h.facing = Math.atan2(dy, dx);
  h.state = 'walk';
}

function aiFlee(h, b, dt, cls) {
  const dx = h.x - b.x, dy = h.y - b.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  h.vx = (dx / dist) * cls.fleeSpeed;
  h.vy = (dy / dist) * cls.fleeSpeed;
  h.facing = Math.atan2(dy, dx);
  h.state = 'flee';
}

function aiDefend(h, b, dt, cls) {
  const dx = b.x - h.x, dy = b.y - h.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  h.facing = Math.atan2(dy, dx);
  h.state = 'defend';
  // Armed humans hold ground; attack if close
  if (cls.armed && dist < 30) {
    // Attack bear
    if (bear.hurtTimer <= 0) {
      bear.hp -= CFG.HUMAN_DMG;
      bear.hurtTimer = 0.5;
    }
  }
}

// ============================================================
// COMBAT
// ============================================================
function performAttack(type) {
  const b = bear;
  b.stats.attacks++;
  const isHeavy = type === 'heavy';
  const dmg   = isHeavy ? CFG.HEAVY_DMG   : CFG.LIGHT_DMG;
  const range = isHeavy ? CFG.HEAVY_RANGE  : CFG.LIGHT_RANGE;
  const kb    = isHeavy ? CFG.HEAVY_KB     : CFG.LIGHT_KB;

  // ── SFX triggers ──
  if (isHeavy) playHeavyAttackSFX();
  // Contextual layered SFX (priority: door > campsite)
  if (sfxDoorCD <= 0 && isBearNearCabinDoor()) {
    playSFX('doorAttack'); sfxDoorCD = CFG.SFX_DOOR_CD;
  } else if (sfxCampsiteCD <= 0 && isBearNearCampsite()) {
    playSFX('campsiteRoar'); sfxCampsiteCD = CFG.SFX_CAMPSITE_CD;
  }

  const ax = b.x + b.facingX * range;
  const ay = b.y + CFG.BEAR_FOOT_OFS + b.facingY * range;
  let hitAlertHuman = false;
  for (const h of humans) {
    if (!h.alive) continue;
    const dx = h.x - ax, dy = h.y - ay;
    if (dx*dx + dy*dy < range * range) {
      h.hp -= dmg;
      // Track if we hit a combat-aware human (for snarl SFX)
      if (h.aiState === 'DEFENSIVE' || h.aiState === 'PANICKED') hitAlertHuman = true;
      // Knockback — push away from bear, capped distance
      const bx = h.x - b.x, by = h.y - b.y;
      const bd = Math.sqrt(bx*bx + by*by) || 1;
      h.x += (bx / bd) * kb;
      h.y += (by / bd) * kb;
      if (h.hp <= 0) {
        h.alive = false;
        const deathX = h.x, deathY = h.y;
        spawnDrop(deathX, deathY, 'HUMAN_MEAT');
        // Drop 2-4 human bone sprites at 50% scale (pile of bones)
        const hbCount = 2 + Math.floor(Math.random() * 3);
        for (let bi = 0; bi < hbCount; bi++) {
          boneDrops.push({ x: deathX + (Math.random()-0.5)*14, y: deathY + (Math.random()-0.5)*14, boneType: Math.floor(Math.random()*6) });
        }
        // Gore drops: intestines, leg, alt intestines — 2-3 pieces scattered around death
        const goreOptions = [ATLAS.intestines, ATLAS.intestinesAlt, ATLAS.leg];
        const goreCount = 2 + Math.floor(Math.random() * 2);
        for (let gi = 0; gi < goreCount; gi++) {
          const gAtlas = goreOptions[Math.floor(Math.random() * goreOptions.length)];
          goreDrops.push({ x: deathX + (Math.random()-0.5)*20, y: deathY + (Math.random()-0.5)*20, atlas: gAtlas, scale: 0.35 + Math.random() * 0.15 });
        }
        // Additional human bone sprites at 50% scale for the pile
        const hbExtra = 1 + Math.floor(Math.random() * 2);
        for (let hbi = 0; hbi < hbExtra; hbi++) {
          goreDrops.push({ x: deathX + (Math.random()-0.5)*16, y: deathY + (Math.random()-0.5)*16, atlas: ATLAS.humanBones[Math.floor(Math.random()*4)], scale: 0.3 });
        }
        // Blood stain persists 1-2 in-game days (270-540s)
        const stainLife = 270 + Math.random() * 270;
        bloodStains.push({ x: deathX, y: deathY, life: stainLife, maxLife: stainLife, age: 0 });
        const pCount = isHeavy ? 12 : 6;
        for (let i = 0; i < pCount; i++) addParticle(deathX, deathY, '#c02020', 1.5);
      } else {
        h.detection = 1;
        for (let i = 0; i < 4; i++) addParticle(h.x, h.y, '#c04040', 1);
      }
    }
  }
  // Combat snarl — play when hitting alert/panicked humans
  if (hitAlertHuman && sfxSnarlCD <= 0) {
    playSFX('combatSnarl'); sfxSnarlCD = CFG.SFX_SNARL_CD;
  }
}

function dropItem(h) {
  if (h.inventory.length === 0) return;
  const item = h.inventory.pop();
  spawnDrop(h.x, h.y, item);
}

// ============================================================
// ITEMS / DROPS
// ============================================================
let drops = [];
let boneDrops = []; // permanent bones left after human kills
let goreDrops = []; // intestines, legs, human bone sprites from kills
let bloodStains = []; // blood stains on ground, fade over 1-2 in-game days

function spawnDrop(x, y, foodKey) {
  drops.push({ x, y, key: foodKey, bobTimer: Math.random() * 6 });
}

function tryEnterCabin() {
  if (transition || transitionCooldown > 0 || !bear || bear.climbing) return false;
  const b = bear;
  const TS = CFG.TILE;
  const fo = CFG.BEAR_FOOT_OFS;
  const footTX = Math.floor(b.x / TS);
  const footTY = Math.floor((b.y + fo) / TS);

  // Inside an interior — check exit trigger
  if (interiorState) {
    const et = interiorState.map.exitTrigger;
    // Allow ±1 tile tolerance (foot offset + clamping can prevent exact match)
    if (footTX >= et.tx - 1 && footTX < et.tx + et.tw + 1 &&
        footTY >= et.ty - 1 && footTY < et.ty + et.th) {
      startTransition('exit');
      return true;
    }
    return false;
  }

  // Exterior — check cabin doorways in nearby chunks
  const CS = CFG.CHUNK;
  const ccx = Math.floor(b.x / (TS * CS));
  const ccy = Math.floor((b.y + fo) / (TS * CS));
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const key = chunkKey(ccx + dx, ccy + dy);
      const chunk = chunks[key];
      if (!chunk || !chunk.cabinPositions) continue;
      for (const cp of chunk.cabinPositions) {
        // Door tile in world tile coords
        const doorWTX = (ccx + dx) * CS + cp.doorTile.x;
        const doorWTY = (ccy + dy) * CS + cp.doorTile.y;
        // Bear must be within 1 tile of the door
        if (Math.abs(footTX - doorWTX) <= 1 && Math.abs(footTY - doorWTY) <= 1) {
          startTransition('enter', {
            type: cp.cabinType,
            hash: cp.hash,
            doorWorldX: doorWTX * TS + TS / 2,
            doorWorldY: doorWTY * TS + TS / 2
          });
          return true;
        }
      }
    }
  }

  return false;
}

function tryAutoCave() {
  if (transition || transitionCooldown > 0 || !bear || bear.climbing) return;
  const b = bear;
  const TS = CFG.TILE, fo = CFG.BEAR_FOOT_OFS;
  const footTX = Math.floor(b.x / TS);
  const footTY = Math.floor((b.y + fo) / TS);

  if (interiorState) {
    // Inside cave interior — auto-exit when walking south through bottom door
    if (!interiorState.map.isCave) return; // only auto for caves, cabins still need E
    const et = interiorState.map.exitTrigger;
    if (b.facingY > 0 && footTX >= et.tx && footTX < et.tx + et.tw && footTY >= et.ty) {
      startTransition('exit');
    }
    return;
  }

  // Exterior — only top 2 cave floor tiles (row 3) trigger entry when walking north
  // Track whether bear was on row 3 trigger tiles last frame (not just any cave floor)
  const footTile = getTile(footTX, footTY);
  let onTriggerRow = false;
  if (footTile === T.CAVE_FLOOR && b.facingY < 0) {
    for (const cp of caveSpawnPoints) {
      if (footTY === cp.ty + 3 && footTX >= cp.tx + 2 && footTX <= cp.tx + 3) {
        onTriggerRow = true;
        if (!b._wasOnCaveTrigger) {
          const caveHash = cp.tx * 1000 + cp.ty;
          startTransition('enter_cave', {
            caveHash,
            doorWorldX: b.x,
            doorWorldY: b.y,
            cp
          });
          b._wasOnCaveTrigger = true;
          return;
        }
        break;
      }
    }
  }
  b._wasOnCaveTrigger = onTriggerRow;
}

function tryClimbTree() {
  const b = bear;
  const TS = CFG.TILE;
  // Check adjacent tiles for climbable trees
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const tx = Math.floor(b.x / TS) + dx;
      const ty = Math.floor((b.y + CFG.BEAR_FOOT_OFS) / TS) + dy;
      const t = getTile(tx, ty);
      if (TDATA[t] && TDATA[t].climbable) {
        b.climbing = true;
        b.climbTree = { tx, ty };
        b.stats.treesClimbed++;
        // Snap bear to tree center (offset back so feet align with tree)
        b.x = tx * TS + TS / 2;
        b.y = ty * TS + TS / 2 - CFG.BEAR_FOOT_OFS;
        b.noise = 0.3; // brief noise from climbing
        for (let i = 0; i < 3; i++) addParticle(b.x, b.y - 38, '#3a5a1a', 0.6);
        return true;
      }
    }
  }
  return false;
}

function tryInteract() {
  const b = bear;
  // Check nearby drops (larger radius for meat to make corpse eating easier)
  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    const dx = d.x - b.x, dy = d.y - b.y;
    const pickupR = d.key === 'HUMAN_MEAT' ? 40 : 30;
    if (dx*dx + dy*dy < pickupR*pickupR) {
      consumeFood(d.key);
      drops.splice(i, 1);
      return;
    }
  }
  // Check dead human bodies directly — eat corpse if standing on/near one
  for (const h of humans) {
    if (h.alive) continue;
    const dx = h.x - b.x, dy = h.y - b.y;
    if (dx*dx + dy*dy < 40*40) {
      consumeFood('HUMAN_MEAT');
      // Remove the corpse after eating
      h.x = -9999; h.y = -9999; // move offscreen so bones/blood remain but body is gone
      return;
    }
  }
  // Check garbage cans — use foot offset for correct tile detection
  const footY = b.y + CFG.BEAR_FOOT_OFS;
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const tx = Math.floor(b.x / CFG.TILE) + dx;
      const ty = Math.floor(footY / CFG.TILE) + dy;
      if (getTile(tx, ty) === T.GARBAGE) {
        raidGarbage();
        return;
      }
    }
  }
  // Forage berries from berry bushes
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const tx = Math.floor(b.x / CFG.TILE) + dx;
      const ty = Math.floor(footY / CFG.TILE) + dy;
      if (getTile(tx, ty) === T.BUSH) {
        // Match the hash used in generateChunk bushPositions: local coords + chunk coords
        const chCx = Math.floor(tx / CFG.CHUNK), chCy = Math.floor(ty / CFG.CHUNK);
        const lx = tx - chCx * CFG.CHUNK, ly = ty - chCy * CFG.CHUNK;
        const bh = (lx*11 + ly*7 + chCx*9 + chCy*3);
        const isLarge = bh % 3 === 0;
        const hasBerrySlot = isLarge && (bh % 5 < 3);
        const bushKey = tx + ',' + ty;
        const eaten = eatenBushes[bushKey];
        const berriesGone = eaten && (now/1000 - eaten) < BERRY_REPLENISH;
        if (hasBerrySlot && !berriesGone) {
          consumeFood('BERRIES');
          playSFX('eatingBerries');
          bear.noise = Math.max(bear.noise, 0.3);
          eatenBushes[bushKey] = now / 1000; // mark as eaten
          for (let i = 0; i < 3; i++) addParticle(b.x, b.y - 38, '#8040a0', 0.6);
          return;
        }
      }
      // Forage mushrooms from grass tiles — match prerenderChunk hash
      const tile = getTile(tx, ty);
      if (tile === T.GRASS || tile === T.TALL_GRASS) {
        const chCx = Math.floor(tx / CFG.CHUNK), chCy = Math.floor(ty / CFG.CHUNK);
        const deco = spriteVar(tx, ty, 30, 71);
        const mushroomExists = (deco === 1);
        const mKey = tx + ',' + ty;
        const mEaten = eatenMushrooms[mKey];
        const mushroomGone = mEaten && (now/1000 - mEaten) < MUSHROOM_REPLENISH;
        if (mushroomExists && !mushroomGone) {
          consumeFood('MUSHROOM');
          bear.noise = Math.max(bear.noise, 0.15);
          eatenMushrooms[mKey] = now / 1000;
          // Re-render chunk so mushroom disappears from baked canvas
          const ck = chCx + ',' + chCy;
          if (chunks[ck]) { delete chunkCanvases[ck]; prerenderChunk(chCx, chCy); }
          for (let i = 0; i < 2; i++) addParticle(b.x, b.y - 38, '#a08040', 0.5);
          return;
        }
      }
    }
  }
}

function consumeFood(key) {
  const f = FOOD[key];
  if (!f) return;
  let hungerRestore = f.hunger;
  if (key === 'GARBAGE') hungerRestore = 5 + Math.floor(Math.random() * 35);
  bear.hunger = Math.min(CFG.MAX_HUNGER, bear.hunger + hungerRestore);
  // Full 11-frame eat animation at 0.12s/frame = 1.32s; double for human meat
  const eatCycle = 11 * 0.12;
  bear.eatTimer = key === 'HUMAN_MEAT' ? eatCycle * 2 : eatCycle;
  bear.eatStart = now;
  // Track stats
  if (key === 'HUMAN_MEAT') bear.stats.humansEaten++;
  else if (key === 'BERRIES') bear.stats.berriesEaten++;
  else if (key === 'FISH') bear.stats.fishEaten++;
  else if (key === 'GARBAGE') bear.stats.garbageEaten++;
  else bear.stats.foodEaten++;

  // Effects
  if (f.fx === 'stam_regen') {
    bear.buffs.push({ type: 'stam_regen', duration: 10, strength: 2 });
  }
  if (f.fx === 'random' || key === 'GARBAGE') {
    applyGarbageFx();
  }
}

function applyGarbageFx() {
  const roll = Math.random();
  if (roll < 0.25) {
    // Speed boost
    bear.buffs.push({ type: 'speed', duration: 8, strength: 1.3 });
  } else if (roll < 0.45) {
    // Stamina regen
    bear.buffs.push({ type: 'stam_regen', duration: 10, strength: 2 });
  } else if (roll < 0.65) {
    // Slow debuff
    bear.buffs.push({ type: 'slow', duration: 8, strength: 0.6 });
  } else if (roll < 0.8) {
    // Nausea
    bear.buffs.push({ type: 'nausea', duration: 6, strength: 1 });
  } else {
    // Reduced stamina regen
    bear.buffs.push({ type: 'stam_drain', duration: 10, strength: 0.5 });
  }
}

function raidGarbage() {
  consumeFood('GARBAGE');
  bear.noise = Math.max(bear.noise, 0.8); // Loud!
  for (let i = 0; i < 3; i++) addParticle(bear.x, bear.y - 5, '#808080', 1);
}

// ============================================================
// PARTICLES
// ============================================================
let particles = [];

function addParticle(x, y, col, life) {
  particles.push({
    x, y,
    vx: (Math.random() - 0.5) * 40,
    vy: (Math.random() - 0.5) * 40 - 15,
    col, life, maxLife: life,
    size: 1 + Math.random() * 2,
  });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 30 * dt; // mini gravity
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  // Dust/splash particles from bear movement
  if (bear && (bear.state === 'walk' || bear.state === 'sprint' || bear.state === 'swim')) {
    const rate = bear.state === 'swim' ? 0.5 : bear.noise * 0.3;
    if (Math.random() < rate) {
      const t = getTileAt(bear.x, bear.y + CFG.BEAR_FOOT_OFS);
      let col = '#8a7a60';
      if (t === T.WATER_S || t === T.WATER_D) col = '#4a8ab0';
      if (t === T.GRAVEL) col = '#9a8a7a';
      if (t === T.DIRT) col = '#7a5a30';
      addParticle(bear.x + (Math.random()-0.5)*12, bear.y + CFG.BEAR_FOOT_OFS, col, 0.4 + Math.random()*0.3);
    }
  }
}

// ============================================================
// DAY/NIGHT UPDATE
// ============================================================
function updateDayNight(dt) {
  dayTime = (dayTime + dt) % DAY_CYCLE_TOTAL;
  const D = CFG.DAY_LENGTH, DK = D + CFG.DUSK_LENGTH;
  const N = DK + CFG.NIGHT_LENGTH, DN = N + CFG.DAWN_LENGTH;
  if (dayTime < D) {
    dayNightDarkness = 0;
  } else if (dayTime < DK) {
    const t = (dayTime - D) / CFG.DUSK_LENGTH;
    // smootherstep (6t⁵ - 15t⁴ + 10t³) — more gradual ease in/out than smoothstep
    dayNightDarkness = t * t * t * (t * (t * 6 - 15) + 10);
  } else if (dayTime < N) {
    dayNightDarkness = 1;
  } else {
    const t = (dayTime - N) / CFG.DAWN_LENGTH;
    dayNightDarkness = 1 - t * t * t * (t * (t * 6 - 15) + 10);
  }

  // Firefly spawning — only when dark enough
  if (dayNightDarkness > 0.3 && bear && fireflies.length < CFG.FIREFLY_MAX) {
    const rate = CFG.FIREFLY_RATE * dayNightDarkness;
    if (Math.random() < rate * dt) {
      fireflies.push({
        x: bear.x + (Math.random() - 0.5) * W * 1.2,
        y: bear.y + (Math.random() - 0.5) * H * 1.2,
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 6,
        life: 48 + Math.random() * 72,
        maxLife: 48 + Math.random() * 72,
        phase: Math.random() * Math.PI * 2,
        brightness: 0.5 + Math.random() * 0.5,
        size: 1 + Math.random() * 0.5,
      });
    }
  }

  // Update fireflies
  for (let i = fireflies.length - 1; i >= 0; i--) {
    const f = fireflies[i];
    f.x += f.vx * dt;
